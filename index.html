<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVS Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#AAFF00;--green-dim:rgba(170,255,0,0.12);--green-dk:#88CC00;
  --bg:#f8fafc;--card:#ffffff;--card2:#f1f5f9;--card3:#e2e8f0;
  --border:rgba(0,0,0,0.08);--muted:#64748b;--txt:#0f172a;
}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN ── */
#login-overlay{
  position:fixed;inset:0;z-index:999;display:flex;
  align-items:center;justify-content:center;background:var(--bg);
}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 15% 50%,rgba(170,255,0,0.06) 0%,transparent 60%);}
.login-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,0,0,0.04) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,0,0,0.04) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}
.login-box{position:relative;z-index:1;width:360px;max-width:92vw;animation:fadeUp .5s both;}
.login-logo-wrap{text-align:center;margin-bottom:32px;}
.login-logo{font-family:'Anton',sans-serif;font-size:60px;color:#0f172a;letter-spacing:3px;}
.login-logo span{color:var(--green);}
.login-tagline{font-size:9px;color:var(--muted);letter-spacing:5px;text-transform:uppercase;margin-top:6px;}
.login-card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:18px;padding:28px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.07);}
.login-field{width:100%;background:#f8fafc;border:1px solid rgba(0,0,0,0.09);border-radius:11px;padding:13px 15px;color:var(--txt);font-size:13px;font-family:'Inter',sans-serif;margin-bottom:10px;outline:none;transition:border .2s,background .2s;}
.login-field:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(170,255,0,0.12);}
.login-field::placeholder{color:#94a3b8;}
.login-btn{width:100%;background:var(--green);color:#0f172a;border:none;border-radius:11px;padding:14px;font-family:'Anton',sans-serif;font-size:17px;letter-spacing:1px;cursor:pointer;transition:background .2s;margin-top:4px;}
.login-btn:hover{background:var(--green-dk);}
.login-error{color:#dc2626;font-size:12px;margin-top:8px;min-height:16px;text-align:center;font-weight:600;}
.login-spinner{width:18px;height:18px;border:2px solid rgba(15,23,42,0.15);border-top-color:#0f172a;border-radius:50%;animation:spin .7s linear infinite;display:none;margin:10px auto 0;}

/* ── PLATFORM ── */
#platform{display:none;min-height:100vh;background:var(--bg);}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:56px;background:#fff;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-logo{font-family:'Anton',sans-serif;font-size:21px;letter-spacing:1px;}
.tb-logo span{color:var(--green);}
.tb-divider{width:1px;height:16px;background:var(--border);}
.tb-name{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-user{display:flex;align-items:center;gap:8px;padding:5px 12px;background:var(--card2);border:1px solid var(--border);border-radius:99px;}
.tb-avatar{width:22px;height:22px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#3a6b00;}
.tb-uname{font-size:12px;font-weight:600;color:var(--txt);}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;font-weight:600;}
.btn-logout:hover{border-color:rgba(0,0,0,0.18);color:var(--txt);}

/* ── HUB LAYOUT ── */
.hub-wrap{
  max-width:900px;margin:0 auto;padding:40px 24px 60px;
  display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start;
}
@media(max-width:820px){.hub-wrap{grid-template-columns:1fr;}.hub-aside{display:none;}}

/* LEFT: MODULE LIST */
.hub-main{}
.hub-header{margin-bottom:28px;animation:fadeUp .4s both;}
.hub-greeting{font-size:11px;font-weight:700;color:#3a6b00;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.hub-title{font-family:'Anton',sans-serif;font-size:38px;letter-spacing:.3px;line-height:1.05;color:var(--txt);}
.hub-title span{color:var(--green);}
.hub-date{font-size:12px;color:var(--muted);font-weight:500;margin-top:8px;display:flex;align-items:center;gap:8px;}
.hub-live{display:flex;align-items:center;gap:5px;font-size:10px;color:#3a6b00;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}

.mod-list-label{font-size:9px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-left:2px;animation:fadeUp .4s .1s both;}

/* MODULE ROWS */
.mod-list{display:flex;flex-direction:column;gap:8px;animation:fadeUp .4s .15s both;}
.mod-row{
  display:flex;align-items:center;gap:16px;
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;cursor:pointer;text-decoration:none;color:inherit;
  transition:all .18s;position:relative;overflow:hidden;
}
.mod-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--row-accent,transparent);border-radius:3px 0 0 3px;}
.mod-row:hover{border-color:var(--row-accent-border,rgba(0,0,0,0.14));box-shadow:0 4px 20px rgba(0,0,0,0.07);transform:translateX(3px);}
.mod-row.disabled{opacity:.45;cursor:default;}
.mod-row.disabled:hover{transform:none;box-shadow:none;border-color:var(--border);}
.mod-row-icon{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:var(--row-icon-bg);display:flex;align-items:center;justify-content:center;font-size:20px;
}
.mod-row-body{flex:1;min-width:0;}
.mod-row-name{font-family:'Anton',sans-serif;font-size:17px;letter-spacing:.3px;color:var(--txt);margin-bottom:3px;}
.mod-row-desc{font-size:11px;color:var(--muted);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mod-row-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.mod-row-badge{font-size:10px;font-weight:700;padding:4px 11px;border-radius:99px;background:var(--row-icon-bg);color:var(--row-accent);}
.mod-row-arrow{
  width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  background:var(--row-icon-bg);color:var(--row-accent);font-size:14px;font-weight:700;
  transition:background .15s;flex-shrink:0;
}
.mod-row:hover .mod-row-arrow{background:var(--row-accent);color:#fff;}
.mod-row-soon{font-size:10px;font-weight:700;color:var(--muted);padding:4px 11px;border-radius:99px;background:var(--card2);border:1px solid var(--border);}

/* RIGHT ASIDE */
.hub-aside{display:flex;flex-direction:column;gap:16px;animation:fadeUp .4s .2s both;}
.aside-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;}
.aside-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac-top,transparent);}
.aside-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.aside-big{font-family:'Anton',sans-serif;font-size:52px;color:var(--green);line-height:1;}
.aside-big-lbl{font-size:13px;font-weight:700;color:#334155;margin-top:4px;}
.aside-big-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.aside-live{display:flex;align-items:center;gap:6px;font-size:10px;color:#3a6b00;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:12px;}

.aside-time{font-family:'Anton',sans-serif;font-size:34px;color:var(--txt);letter-spacing:1px;}
.aside-date-lbl{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500;}

/* FIN STATS CARD */
.fin-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);}
.fin-row:last-of-type{border-bottom:none;}
.fin-lbl{font-size:11px;font-weight:600;color:var(--muted);}
.fin-val{font-size:13px;font-weight:800;color:var(--txt);font-family:'Inter',sans-serif;}
.fin-val.green{color:#16a34a;}
.fin-val.red{color:#dc2626;}
.fin-divider{height:1px;background:var(--border);margin:6px 0;}
.fin-balance-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.fin-balance-lbl{font-size:12px;font-weight:700;color:var(--txt);}
.fin-balance-val{font-family:'Anton',sans-serif;font-size:20px;}
.fin-margen-pill{display:inline-flex;align-items:center;justify-content:center;border-radius:99px;padding:4px 14px;font-size:12px;font-weight:800;margin-top:10px;width:100%;letter-spacing:.3px;}

/* PIN MODAL */
#pin-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.5);display:none;align-items:center;justify-content:center;z-index:600;backdrop-filter:blur(8px);}
#pin-overlay.open{display:flex;}
.pin-box{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:24px;padding:36px 28px 24px;width:300px;max-width:92vw;text-align:center;animation:fadeUp .25s ease both;box-shadow:0 8px 40px rgba(0,0,0,0.12);}
.pin-module-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-bottom:6px;}
.pin-title{font-family:'Anton',sans-serif;font-size:24px;margin-bottom:28px;color:var(--txt);}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:28px;}
.pin-dot{width:12px;height:12px;border-radius:50%;background:#f1f5f9;border:2px solid rgba(0,0,0,0.12);transition:all .12s;}
.pin-dot.filled{background:var(--green);border-color:var(--green);}
.pin-dot.error{background:#dc2626;border-color:#dc2626;}
@keyframes pinshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:10px;}
.pin-key{background:#f8fafc;border:1px solid rgba(0,0,0,0.10);border-radius:12px;padding:16px 8px;font-family:'Anton',sans-serif;font-size:22px;color:var(--txt);cursor:pointer;transition:all .12s;user-select:none;}
.pin-key:hover{background:#f1f5f9;border-color:rgba(0,0,0,0.16);}
.pin-key:active{background:#e2e8f0;transform:scale(.94);}
.pin-key.zero{grid-column:2;}
.pin-key.del{font-family:'Inter',sans-serif;font-size:18px;color:var(--muted);}
.pin-key.del:hover{color:var(--txt);}
.pin-error-msg{color:#dc2626;font-size:12px;height:16px;margin-bottom:10px;font-weight:600;}
.pin-cancel{background:none;border:none;color:#94a3b8;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;padding:8px 16px;font-weight:600;}
.pin-cancel:hover{color:var(--muted);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-bg"><div class="login-grid"></div></div>
  <div class="login-box">
    <div class="login-logo-wrap">
      <div class="login-logo">NV<span>S</span></div>
      <div class="login-tagline">New Vision Sports · Platform</div>
    </div>
    <div class="login-card">
      <input id="login-email"    class="login-field" type="email"    placeholder="Email" autocomplete="email">
      <input id="login-password" class="login-field" type="password" placeholder="Contraseña" autocomplete="current-password">
      <button class="login-btn" id="login-btn" onclick="doLogin()">ENTRAR</button>
      <div class="login-error" id="login-error"></div>
      <div class="login-spinner" id="login-spinner"></div>
    </div>
  </div>
</div>

<!-- PLATFORM -->
<div id="platform">

  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-logo">NV<span>S</span></div>
      <div class="tb-divider"></div>
      <div class="tb-name">Platform</div>
    </div>
    <div class="tb-right">
      <div class="tb-user">
        <div class="tb-avatar" id="tb-avatar">—</div>
        <span class="tb-uname" id="tb-uname">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Salir →</button>
    </div>
  </div>

  <div class="hub-wrap">

    <!-- LEFT: Modules list -->
    <div class="hub-main">
      <div class="hub-header">
        <div class="hub-greeting" id="hero-greeting">Bienvenido</div>
        <div class="hub-title">New Vision<br><span>Sports</span> Platform</div>
        <div class="hub-date">
          <span id="hero-date">—</span>
          <div class="hub-live"><div class="live-dot"></div>Live</div>
        </div>
      </div>

      <div class="mod-list-label">Módulos activos</div>
      <div class="mod-list" id="mod-list"></div>
    </div>

    <!-- RIGHT: Stats sidebar -->
    <div class="hub-aside">

      <div id="hub-stats" class="aside-card" style="--ac-top:linear-gradient(90deg,var(--green),transparent)">
        <div class="aside-label">Atletas APL</div>
        <div class="aside-big" id="s-total">—</div>
        <div class="aside-big-lbl">en el sistema</div>
        <div class="aside-big-sub">Placements activos</div>
        <div class="aside-live"><div class="live-dot"></div>En vivo</div>
      </div>

      <!-- MARGEN DE GANANCIA -->
      <div class="aside-card" id="fin-stats-card" style="--ac-top:linear-gradient(90deg,var(--green),transparent);display:none;">
        <div class="aside-label">💰 Margen de Ganancia</div>
        <div class="fin-row">
          <span class="fin-lbl">Ingresos</span>
          <span class="fin-val green" id="fin-ingresos">—</span>
        </div>
        <div class="fin-row">
          <span class="fin-lbl">Gastos</span>
          <span class="fin-val red" id="fin-gastos">—</span>
        </div>
        <div class="fin-balance-row">
          <span class="fin-balance-lbl">Balance Neto</span>
          <span class="fin-balance-val" id="fin-balance">—</span>
        </div>
        <div class="fin-margen-pill" id="fin-margen">— %</div>
        <div class="aside-live" style="margin-top:10px;"><div class="live-dot"></div>En vivo · Todas las transacciones</div>
      </div>

      <div class="aside-card" style="--ac-top:linear-gradient(90deg,#6366f1,transparent)">
        <div class="aside-label">Fecha y hora</div>
        <div class="aside-time" id="aside-time">—</div>
        <div class="aside-date-lbl" id="aside-date">—</div>
      </div>

    </div>

  </div>
</div>

<!-- PIN MODAL -->
<div id="pin-overlay">
  <div class="pin-box">
    <div class="pin-module-lbl" id="pin-module-lbl">Módulo</div>
    <div class="pin-title">Ingresa tu PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key zero" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error-msg" id="pin-error-msg"></div>
    <button class="pin-cancel" onclick="closePin()">Cancelar</button>
  </div>
</div>

<script>
const sb=supabase.createClient('https://mwefvjvvitsondqghgsx.supabase.co','sb_publishable_GuFFI-viJquULQCSY_Bd6Q_WoLf0cZk');

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-password').value;
  const err=document.getElementById('login-error');
  const spin=document.getElementById('login-spinner');
  const btn=document.getElementById('login-btn');
  err.textContent='';
  if(!email||!pass){err.textContent='Ingresa email y contraseña.';return;}
  btn.style.opacity='.6';btn.style.pointerEvents='none';spin.style.display='block';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  spin.style.display='none';btn.style.opacity='';btn.style.pointerEvents='';
  if(error){err.textContent='Credenciales incorrectas.';return;}
  showPlatform(data.user);
}

async function doLogout(){
  await sb.auth.signOut();
  Object.keys(sessionStorage).filter(k=>k.startsWith('pin_ok_')).forEach(k=>sessionStorage.removeItem(k));
  document.getElementById('platform').style.display='none';
  document.getElementById('login-overlay').style.display='flex';
  document.getElementById('login-email').value='';
  document.getElementById('login-password').value='';
}

const SD_EMAIL='sd@cervicalservices.com';
const IH_EMAIL='ih@decolatam.com';
const MARKETING_EMAILS=['julio@playwithnewvision.com','andy@playwithnewvision.com','floyd@playwithnewvision.com'];
const MARKETING_HIDDEN=['finanzas','pagos'];
const SD_MODULES=['finanzas','pagos','servicios'];
const IH_MODULES=['finanzas'];

const ALL_MODULES=[
  {id:'finanzas', icon:'💰', name:'Dashboard Financiero', desc:'Ingresos, pagos, contratos y balance general de la agencia',
   accent:'#AAFF00', dim:'rgba(170,255,0,.10)', border:'rgba(170,255,0,.4)',
   pin:true, badgeTxt:'🔒 PIN', badgeColor:'#3a6b00'},
  {id:'crm', icon:'🎓', name:'APL · Placements', desc:'Pipeline de college placement, boarding schools y transfers',
   accent:'#6366f1', dim:'rgba(99,102,241,.10)', border:'rgba(99,102,241,.35)', href:'crm.html', statId:'mod-crm-stat'},
  {id:'leads', icon:'🎯', name:'Leads Pipeline', desc:'Prospectos del formulario web y recruiters — Kanban en tiempo real',
   accent:'#f472b6', dim:'rgba(244,114,182,.10)', border:'rgba(244,114,182,.35)', href:'leads.html'},
  {id:'pagos', icon:'💸', name:'Pagos', desc:'Payroll del equipo, proveedores de software y mantenimiento',
   accent:'#0d9488', dim:'rgba(13,148,136,.10)', border:'rgba(13,148,136,.35)', href:'pagos.html'},
  {id:'media', icon:'🎬', name:'Media Pipeline', desc:'Kanban y calendario de contenido para Instagram y TikTok',
   accent:'#ec4899', dim:'rgba(236,72,153,.10)', border:'rgba(236,72,153,.35)', href:'media.html'},
  {id:'proyectos', icon:'📋', name:'Proyectos', desc:'Documenta y gestiona proyectos activos del equipo NVS',
   accent:'#f59e0b', dim:'rgba(245,158,11,.10)', border:'rgba(245,158,11,.35)', href:'proyectos.html'},
  {id:'servicios', icon:'📖', name:'Guía de Servicios', desc:'Procesos de pago, responsabilidades y contactos del equipo',
   accent:'#0ea5e9', dim:'rgba(14,165,233,.10)', border:'rgba(14,165,233,.35)', href:'servicios.html'},
  {id:'tareas', icon:'✅', name:'Tareas', desc:'Crea y gestiona tus tareas del equipo, asigna prioridades y fechas',
   accent:'#06b6d4', dim:'rgba(6,182,212,.10)', border:'rgba(6,182,212,.35)', href:'tareas.html'},
  {id:'guias', icon:'📖', name:'Guías', desc:'Elegibilidad, onboarding, visado y recursos del equipo NVS',
   accent:'#8b5cf6', dim:'rgba(139,92,246,.10)', border:'rgba(139,92,246,.35)', href:'guias.html'},
  {id:'reportes', icon:'📊', name:'Reportes', desc:'Métricas avanzadas de rendimiento y análisis de atletas',
   accent:'#8b5cf6', dim:'rgba(139,92,246,.08)', disabled:true},
];

function buildModules(email){
  const em=email.toLowerCase();
  const isSD=em===SD_EMAIL;
  const isIH=em===IH_EMAIL;
  const isMkt=MARKETING_EMAILS.includes(em);
  const visible=isIH
    ? ALL_MODULES.filter(m=>IH_MODULES.includes(m.id))
    : isSD
      ? ALL_MODULES.filter(m=>SD_MODULES.includes(m.id))
      : isMkt
        ? ALL_MODULES.filter(m=>!MARKETING_HIDDEN.includes(m.id))
        : ALL_MODULES;
  const list=document.getElementById('mod-list');
  list.innerHTML=visible.map(m=>{
    const style=`--row-accent:${m.accent};--row-accent-border:${m.border||m.accent};--row-icon-bg:${m.dim};`;
    const right=m.disabled
      ? `<span class="mod-row-soon">⏳ Próximamente</span>`
      : m.pin
        ? `<span class="mod-row-badge" style="color:${m.badgeColor}">${m.badgeTxt}</span><div class="mod-row-arrow" style="color:${m.badgeColor}">→</div>`
        : `${m.statId?`<span class="mod-row-badge" id="${m.statId}">— atletas</span>`:''}
           <div class="mod-row-arrow">→</div>`;
    const tag=m.href?'a':'div';
    const hrefAttr=m.href?`href="${m.href}"`:'';
    const clickAttr=m.pin?`onclick="openModule('Dashboard Financiero','pin_finanzas','finanzas.html')"`:'';
    const disClass=m.disabled?' disabled':'';
    return `<${tag} class="mod-row${disClass}" style="${style}" ${hrefAttr} ${clickAttr}>
      <div class="mod-row-icon">${m.icon}</div>
      <div class="mod-row-body">
        <div class="mod-row-name">${m.name}</div>
        <div class="mod-row-desc">${m.desc}</div>
      </div>
      <div class="mod-row-right">${right}</div>
    </${tag}>`;
  }).join('');
}

async function showPlatform(user){
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('platform').style.display='block';
  const name=user.email.split('@')[0];
  const display=name.charAt(0).toUpperCase()+name.slice(1);
  document.getElementById('tb-uname').textContent=display;
  document.getElementById('tb-avatar').textContent=display.charAt(0).toUpperCase();
  const h=new Date().getHours();
  const gr=h<12?'Buenos días':h<18?'Buenas tardes':'Buenas noches';
  document.getElementById('hero-greeting').textContent=gr+', '+display;
  updateClock();setInterval(updateClock,30000);
  buildModules(user.email);
  const em=user.email.toLowerCase();
  const isSD=em===SD_EMAIL;
  const isIH=em===IH_EMAIL;
  const isMkt=MARKETING_EMAILS.includes(em);
  if(!isSD&&!isMkt&&!isIH){loadStats();subscribeStats();}
  if(isSD||isIH){const sa=document.getElementById('hub-stats');if(sa)sa.style.display='none';}
  const FIN_STATS_ALLOWED=['stefano@playwithnewvision.com','ih@decolatam.com','sd@cervicalservices.com'];
  if(FIN_STATS_ALLOWED.includes(em)){const fc=document.getElementById('fin-stats-card');if(fc)fc.style.display='block';loadFinanceStats();}
}

function updateClock(){
  const now=new Date();
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const date=`${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  const el=document.getElementById('aside-time');if(el)el.textContent=time;
  const dl=document.getElementById('aside-date');if(dl)dl.textContent=date;
  const hd=document.getElementById('hero-date');if(hd)hd.textContent=date+' · '+time;
}

async function loadStats(){
  const {count:total}=await sb.from('placements').select('*',{count:'exact',head:true});
  const el=document.getElementById('s-total');
  if(el)el.innerHTML=`<span style="animation:fadeIn .4s both">${total??'—'}</span>`;
  const cs=document.getElementById('mod-crm-stat');
  if(cs)cs.textContent=`${total??'—'} atletas`;
}

function subscribeStats(){
  sb.channel('placements-live').on('postgres_changes',{event:'*',schema:'public',table:'placements'},()=>loadStats()).subscribe();
  sb.channel('trans-live').on('postgres_changes',{event:'*',schema:'public',table:'transacciones'},()=>loadFinanceStats()).subscribe();
}

async function loadFinanceStats(){
  const card=document.getElementById('fin-stats-card');
  if(!card)return;
  const {data,error}=await sb.from('transacciones').select('ingreso,gasto');
  if(error){return;}
  const rows=data||[];
  const ingresos=rows.reduce((s,r)=>s+(parseFloat(r.ingreso)||0),0);
  const gastos=rows.reduce((s,r)=>s+(parseFloat(r.gasto)||0),0);
  const balance=ingresos-gastos;
  const margen=ingresos>0?((balance/ingresos)*100):0;
  card.style.display='block';
  document.getElementById('fin-ingresos').textContent='$'+fmtMoney(ingresos);
  document.getElementById('fin-gastos').textContent='$'+fmtMoney(gastos);
  const bEl=document.getElementById('fin-balance');
  bEl.textContent=(balance>=0?'+':'')+' $'+fmtMoney(Math.abs(balance));
  bEl.style.color=balance>=0?'#16a34a':'#dc2626';
  const mEl=document.getElementById('fin-margen');
  mEl.textContent='Margen: '+margen.toFixed(1)+'%';
  if(margen>=50){mEl.style.background='rgba(170,255,0,.15)';mEl.style.color='#3a6b00';}
  else if(margen>0){mEl.style.background='rgba(245,158,11,.15)';mEl.style.color='#92400e';}
  else{mEl.style.background='rgba(239,68,68,.1)';mEl.style.color='#dc2626';}
}
function fmtMoney(n){
  if(n>=1000000)return(n/1000000).toFixed(2)+'M';
  if(n>=1000)return(n/1000).toFixed(1)+'K';
  return n.toLocaleString('es-PA',{minimumFractionDigits:2,maximumFractionDigits:2});
}

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(session)showPlatform(session.user);
  else document.getElementById('login-overlay').style.display='flex';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login-overlay').style.display==='flex')doLogin();
  if(document.getElementById('pin-overlay').classList.contains('open')){
    if(e.key>='0'&&e.key<='9')pinKey(e.key);
    if(e.key==='Backspace')pinDel();
    if(e.key==='Escape')closePin();
  }
});
document.addEventListener('DOMContentLoaded',init);

/* PIN */
let _pinValue='',_pinTarget='',_pinKey='';
const MODULE_PINS={pin_finanzas:'0905'};

function openModule(label,configKey,url){
  if(sessionStorage.getItem('pin_ok_'+configKey)==='1'){window.location.href=url;return;}
  _pinValue='';_pinTarget=url;_pinKey=configKey;
  document.getElementById('pin-module-lbl').textContent=label;
  document.getElementById('pin-error-msg').textContent='';
  _dots();
  document.getElementById('pin-overlay').classList.add('open');
}
function closePin(){document.getElementById('pin-overlay').classList.remove('open');_pinValue='';_dots();}
function pinKey(d){if(_pinValue.length>=4)return;_pinValue+=d;_dots();if(_pinValue.length===4)_verify();}
function pinDel(){_pinValue=_pinValue.slice(0,-1);_dots();document.getElementById('pin-error-msg').textContent='';document.querySelectorAll('.pin-dot').forEach(el=>el.classList.remove('error'));}
function _dots(){for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);d.classList.toggle('filled',i<_pinValue.length);d.classList.remove('error');}}
function _verify(){
  if(_pinValue===MODULE_PINS[_pinKey]){
    sessionStorage.setItem('pin_ok_'+_pinKey,'1');closePin();window.location.href=_pinTarget;
  } else {
    document.getElementById('pin-error-msg').textContent='PIN incorrecto';
    document.querySelectorAll('.pin-dot').forEach(el=>{el.classList.remove('filled');el.classList.add('error');});
    setTimeout(()=>{_pinValue='';_dots();document.getElementById('pin-error-msg').textContent='';},900);
  }
}
