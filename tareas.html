<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVS · Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#AAFF00;--green-dim:rgba(170,255,0,0.12);--green-dk:#88CC00;
  --bg:#f8fafc;--card:#fff;--card2:#f1f5f9;--border:rgba(0,0,0,0.08);
  --muted:#64748b;--txt:#0f172a;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* LOGIN */
#login-overlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 15% 50%,rgba(170,255,0,.06) 0%,transparent 60%);}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);}
.login-box{position:relative;z-index:1;width:360px;max-width:92vw;animation:fadeUp .5s both;}
.login-logo-wrap{text-align:center;margin-bottom:28px;}
.login-logo{font-family:'Anton',sans-serif;font-size:56px;color:#0f172a;letter-spacing:3px;}
.login-logo span{color:var(--green);}
.login-sub{font-size:10px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-top:6px;}
.login-card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:18px;padding:26px 22px;box-shadow:0 4px 20px rgba(0,0,0,.06);}
.lf{width:100%;background:#f8fafc;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:12px 14px;color:var(--txt);font-size:13px;font-family:'Inter',sans-serif;margin-bottom:10px;outline:none;transition:border .2s;}
.lf:focus{border-color:var(--green);background:#fff;}
.lf::placeholder{color:#94a3b8;}
.login-btn{width:100%;background:var(--green);color:#0f172a;border:none;border-radius:10px;padding:13px;font-family:'Anton',sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer;margin-top:4px;transition:background .2s;}
.login-btn:hover{background:var(--green-dk);}
.login-error{color:#dc2626;font-size:12px;margin-top:8px;min-height:14px;text-align:center;font-weight:600;}
.login-spinner{width:16px;height:16px;border:2px solid rgba(15,23,42,.15);border-top-color:#0f172a;border-radius:50%;animation:spin .7s linear infinite;display:none;margin:8px auto 0;}

/* SHELL */
#app{display:none;height:100vh;flex-direction:column;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:52px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;}
.tb-left{display:flex;align-items:center;gap:9px;}
.tb-back{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;padding:5px 9px;border-radius:7px;transition:all .15s;text-decoration:none;}
.tb-back:hover{background:var(--card2);color:var(--txt);}
.tb-divider{width:1px;height:16px;background:var(--border);}
.tb-title{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:.5px;}
.tb-title span{color:var(--green);}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-user{display:flex;align-items:center;gap:7px;padding:5px 11px;background:var(--card2);border:1px solid var(--border);border-radius:99px;}
.tb-avatar{width:20px;height:20px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#3a6b00;}
.tb-uname{font-size:11px;font-weight:600;color:var(--txt);}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:5px 12px;font-size:11px;cursor:pointer;transition:all .15s;font-weight:600;font-family:'Inter',sans-serif;}
.btn-logout:hover{border-color:rgba(0,0,0,.18);color:var(--txt);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}

/* TOP-LEVEL VIEW TABS */
.view-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);flex-shrink:0;}
.view-tab{flex:1;padding:13px 10px;text-align:center;cursor:pointer;font-size:13px;font-weight:800;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;letter-spacing:.3px;user-select:none;}
.view-tab:hover{color:var(--txt);background:var(--bg);}
.view-tab.active{color:#0f172a;border-bottom-color:#AAFF00;background:rgba(170,255,0,.04);}

/* ───────── EQUIPO VIEW ───────── */
#view-equipo{flex:1;display:none;flex-direction:column;min-height:0;overflow:hidden;}
#view-equipo.active{display:flex;}

/* MEMBER PILLS */
.members-bar{padding:10px 18px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;overflow-x:auto;flex-shrink:0;}
.members-bar::-webkit-scrollbar{height:3px;}
.members-bar::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.member-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;border:1.5px solid var(--border);cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;transition:all .14s;background:var(--card);color:var(--muted);flex-shrink:0;}
.member-pill:hover{border-color:rgba(0,0,0,.18);color:var(--txt);}
.member-pill.active{background:#AAFF00;border-color:#AAFF00;color:#0f172a;}
.member-pill.todos.active{background:#0f172a;border-color:#0f172a;color:#AAFF00;}
.member-avatar{width:18px;height:18px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#3a6b00;flex-shrink:0;}
.member-pill.active .member-avatar{background:rgba(15,23,42,.15);color:#0f172a;}
.member-pill.todos.active .member-avatar{background:rgba(170,255,0,.2);color:#AAFF00;}
.pill-count{font-size:9px;opacity:.7;}

/* EQUIPO SCROLL */
.equipo-scroll{flex:1;overflow-y:auto;padding:16px 18px 80px;}

/* MEMBER GROUP */
.member-group{margin-bottom:20px;}
.member-group-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.member-group-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#AAFF00,#88CC00);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0f172a;flex-shrink:0;}
.member-group-name{font-size:13px;font-weight:800;}
.member-group-stats{font-size:10px;color:var(--muted);font-weight:600;}
.member-group-bar{flex:1;height:4px;background:var(--card2);border-radius:99px;overflow:hidden;max-width:100px;}
.member-group-fill{height:100%;background:#AAFF00;border-radius:99px;transition:width .4s;}

/* ───────── SEMANAL VIEW ───────── */
#view-semanal{flex:1;display:none;flex-direction:column;min-height:0;overflow:hidden;}
#view-semanal.active{display:flex;}

.week-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;}
.week-arrow{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif;}
.week-arrow:hover{background:var(--card2);color:var(--txt);}
.week-center{text-align:center;}
.week-label{font-family:'Anton',sans-serif;font-size:14px;letter-spacing:.3px;}
.week-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;margin-top:2px;background:var(--green-dim);color:#3a6b00;}
.week-badge.past{background:var(--card2);color:var(--muted);}

.dept-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;}
.dept-tab{flex:1;padding:10px 8px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;transition:all .15s;user-select:none;}
.dept-tab:hover{background:var(--bg);}
.dept-tab.active[data-dept="placement"]{color:#3a6b00;border-bottom-color:#AAFF00;background:rgba(170,255,0,.04);}
.dept-tab.active[data-dept="marketing"]{color:#6d28d9;border-bottom-color:#8b5cf6;background:rgba(139,92,246,.04);}
.dept-tab.active[data-dept="onboarding"]{color:#1d4ed8;border-bottom-color:#3b82f6;background:rgba(59,130,246,.04);}
.tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:16px;padding:0 4px;border-radius:99px;font-size:9px;font-weight:800;margin-left:5px;background:var(--card2);color:var(--muted);}
.dept-tab.active[data-dept="placement"] .tab-count{background:rgba(170,255,0,.2);color:#3a6b00;}
.dept-tab.active[data-dept="marketing"] .tab-count{background:rgba(139,92,246,.15);color:#6d28d9;}
.dept-tab.active[data-dept="onboarding"] .tab-count{background:rgba(59,130,246,.15);color:#1d4ed8;}

.semanal-scroll{flex:1;overflow-y:auto;padding:16px 18px 80px;}

/* ───────── SHARED TASK COMPONENTS ───────── */
.progress-wrap{background:#fff;border:1px solid var(--border);border-radius:11px;padding:13px 15px;margin-bottom:12px;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-info{font-size:12px;font-weight:600;color:var(--muted);}
.progress-info strong{color:var(--txt);}
.progress-pct{font-size:20px;font-weight:800;font-family:'Anton',sans-serif;}
.pct-placement{color:#3a6b00;}.pct-marketing{color:#6d28d9;}.pct-onboarding{color:#1d4ed8;}.pct-equipo{color:#0f172a;}
.progress-track{height:7px;background:var(--card2);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.fill-placement{background:linear-gradient(90deg,#88CC00,#AAFF00);}
.fill-marketing{background:linear-gradient(90deg,#7c3aed,#a78bfa);}
.fill-onboarding{background:linear-gradient(90deg,#1d4ed8,#60a5fa);}
.fill-equipo{background:linear-gradient(90deg,#374151,#6b7280);}

.task-list{display:flex;flex-direction:column;gap:5px;}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid var(--border);border-radius:10px;transition:all .13s;animation:slideUp .2s both;}
.task-item:hover{border-color:rgba(0,0,0,.12);box-shadow:0 2px 6px rgba(0,0,0,.04);}
.task-item.done{opacity:.45;}
.task-cb{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.task-cb:hover{border-color:#AAFF00;}
.task-cb.checked{border-color:#AAFF00;background:#AAFF00;}
.task-cb .ck{display:none;width:12px;height:12px;}
.task-cb.checked .ck{display:block;}
.task-body{flex:1;min-width:0;}
.task-title{font-size:13px;font-weight:600;line-height:1.3;}
.task-item.done .task-title{text-decoration:line-through;color:var(--muted);}
.task-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.badge-assignee{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--card2);color:var(--muted);}
.badge-due{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.badge-due.overdue{background:rgba(239,68,68,.1);color:#b91c1c;}
.badge-due.today{background:rgba(245,158,11,.12);color:#b45309;}
.badge-due.upcoming{background:rgba(59,130,246,.1);color:#1d4ed8;}
.badge-pri{font-size:9px;font-weight:800;padding:2px 6px;border-radius:99px;text-transform:uppercase;letter-spacing:.4px;}
.pri-alta{background:rgba(239,68,68,.1);color:#b91c1c;}
.pri-media{background:rgba(245,158,11,.1);color:#b45309;}
.pri-baja{background:rgba(148,163,184,.15);color:#64748b;}
.task-del{opacity:0;width:24px;height:24px;border:none;background:transparent;cursor:pointer;color:#94a3b8;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .13s;flex-shrink:0;}
.task-item:hover .task-del{opacity:1;}
.task-del:hover{background:#fee2e2;color:#dc2626;}

.add-btn{display:flex;align-items:center;gap:8px;padding:10px 13px;border:2px dashed var(--border);border-radius:10px;cursor:pointer;color:var(--muted);font-size:12px;font-weight:700;transition:all .15s;background:transparent;width:100%;margin-top:8px;font-family:'Inter',sans-serif;}
.add-btn:hover{border-color:#AAFF00;color:#3a6b00;background:var(--green-dim);}

.add-form{background:#fff;border:1px solid var(--border);border-radius:12px;padding:15px;margin-top:8px;animation:slideUp .2s both;box-shadow:0 4px 14px rgba(0,0,0,.06);}
.f-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;}
.tf{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'Inter',sans-serif;color:var(--txt);outline:none;transition:border .2s;}
.tf:focus{border-color:#AAFF00;background:#fff;}
.tf::placeholder{color:#94a3b8;}
.tf-row{display:flex;gap:8px;margin-top:8px;}
.tf-sel{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;font-family:'Inter',sans-serif;color:var(--txt);outline:none;cursor:pointer;}
.tf-sel:focus{border-color:#AAFF00;}
.form-btns{display:flex;gap:8px;margin-top:10px;}
.btn-save{flex:1;background:#AAFF00;color:#0f172a;border:none;border-radius:8px;padding:10px;font-family:'Anton',sans-serif;font-size:13px;cursor:pointer;transition:background .2s;}
.btn-save:hover{background:#88CC00;}
.btn-cancel{padding:10px 14px;background:var(--card2);color:var(--muted);border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-cancel:hover{background:#e2e8f0;color:var(--txt);}

.section-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#94a3b8;padding:8px 2px 4px;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);animation:fadeIn .3s both;}
.empty-icon{font-size:34px;margin-bottom:8px;}
.empty-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:3px;}
.empty-sub{font-size:11px;}
.loading-wrap{display:flex;align-items:center;justify-content:center;gap:10px;padding:50px;color:var(--muted);font-size:13px;}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:#AAFF00;border-radius:50%;animation:spin .7s linear infinite;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-bg"></div><div class="login-grid"></div>
  <div class="login-box">
    <div class="login-logo-wrap">
      <div class="login-logo">NV<span>S</span></div>
      <div class="login-sub">New Vision Sports · Tareas</div>
    </div>
    <div class="login-card">
      <input id="login-email" class="lf" type="email" placeholder="Email" autocomplete="email">
      <input id="login-password" class="lf" type="password" placeholder="Contraseña" autocomplete="current-password">
      <button class="login-btn" id="login-btn" onclick="doLogin()">ENTRAR</button>
      <div class="login-error" id="login-error"></div>
      <div class="login-spinner" id="login-spinner"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <a class="tb-back" href="index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Hub
      </a>
      <div class="tb-divider"></div>
      <div class="tb-title">NV<span>S</span> · Tareas</div>
    </div>
    <div class="tb-right">
      <div class="tb-user">
        <div class="tb-avatar" id="tb-avatar">?</div>
        <div class="tb-uname" id="tb-uname">—</div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="main">
    <!-- TOP-LEVEL TABS -->
    <div class="view-tabs">
      <div class="view-tab active" data-view="equipo" onclick="setView('equipo')">👥 Equipo</div>
      <div class="view-tab" data-view="semanal" onclick="setView('semanal')">📅 Semanal</div>
    </div>

    <!-- ═══ EQUIPO VIEW ═══ -->
    <div id="view-equipo" class="active">
      <div class="members-bar" id="members-bar">
        <div class="loading-wrap" style="padding:6px 0;"><div class="spin"></div></div>
      </div>
      <div class="equipo-scroll" id="equipo-scroll">
        <div class="loading-wrap"><div class="spin"></div> Cargando...</div>
      </div>
    </div>

    <!-- ═══ SEMANAL VIEW ═══ -->
    <div id="view-semanal">
      <div class="week-nav">
        <button class="week-arrow" onclick="changeWeek(-1)">&#8249;</button>
        <div class="week-center">
          <div class="week-label" id="week-label">—</div>
          <div class="week-badge" id="week-badge">Semana actual</div>
        </div>
        <button class="week-arrow" onclick="changeWeek(1)">&#8250;</button>
      </div>
      <div class="dept-tabs">
        <div class="dept-tab active" data-dept="placement" onclick="setDept('placement')">🎯 Placement<span class="tab-count" id="cnt-placement">—</span></div>
        <div class="dept-tab" data-dept="marketing" onclick="setDept('marketing')">📣 Marketing<span class="tab-count" id="cnt-marketing">—</span></div>
        <div class="dept-tab" data-dept="onboarding" onclick="setDept('onboarding')">🎓 Onboarding<span class="tab-count" id="cnt-onboarding">—</span></div>
      </div>
      <div class="semanal-scroll" id="semanal-scroll">
        <div class="loading-wrap"><div class="spin"></div> Cargando...</div>
      </div>
    </div>

  </div>
</div>

<script>
const sb = supabase.createClient(
  'https://mwefvjvvitsondqghgsx.supabase.co',
  'sb_publishable_GuFFI-viJquULQCSY_Bd6Q_WoLf0cZk'
);

/* ── STATE ── */
let VIEW         = 'equipo';
let MEMBER_FILTER= 'todos';
let TEAM_TASKS   = [];          // nvs_team_tasks
let E_SHOW_FORM  = false;

const DEPTS      = ['placement','marketing','onboarding'];
let DEPT         = 'placement';
let WEEK         = getMonday(new Date());
let WEEKLY_TASKS = {placement:[],marketing:[],onboarding:[]};
let S_SHOW_FORM  = false;

/* ── DATE ── */
function getMonday(d){
  const dt=new Date(d), day=dt.getDay();
  dt.setDate(dt.getDate()-day+(day===0?-6:1));
  dt.setHours(0,0,0,0); return dt;
}
function isoDate(d){return d.toISOString().split('T')[0];}
function isThisWeek(d){return isoDate(d)===isoDate(getMonday(new Date()));}
function weekRange(mon){
  const sun=new Date(mon); sun.setDate(sun.getDate()+6);
  const f=mon.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  const t=sun.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
  return `${f} – ${t}`;
}
function fmtDate(str){
  if(!str)return'';
  const d=new Date(str+'T12:00:00');
  return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
}
function dueBadge(str){
  if(!str)return'';
  const today=new Date(); today.setHours(0,0,0,0);
  const due=new Date(str+'T12:00:00');
  const diff=Math.round((due-today)/(1000*60*60*24));
  if(diff<0) return`<span class="badge-due overdue">Vencida ${fmtDate(str)}</span>`;
  if(diff===0)return`<span class="badge-due today">Hoy</span>`;
  if(diff<=3) return`<span class="badge-due upcoming">${fmtDate(str)}</span>`;
  return`<span class="badge-due upcoming">${fmtDate(str)}</span>`;
}

/* ── AUTH ── */
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-password').value;
  const err=document.getElementById('login-error');
  const spin=document.getElementById('login-spinner');
  const btn=document.getElementById('login-btn');
  err.textContent='';
  if(!email||!pass){err.textContent='Ingresa email y contraseña.';return;}
  btn.style.opacity='.6';btn.style.pointerEvents='none';spin.style.display='block';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  spin.style.display='none';btn.style.opacity='1';btn.style.pointerEvents='';
  if(error){err.textContent='Credenciales incorrectas.';return;}
  initApp(data.user);
}
async function doLogout(){await sb.auth.signOut();location.reload();}

function initApp(user){
  document.getElementById('login-overlay').style.display='none';
  const app=document.getElementById('app'); app.style.display='flex';
  const name=user.email.split('@')[0];
  document.getElementById('tb-uname').textContent=name;
  document.getElementById('tb-avatar').textContent=name[0].toUpperCase();
  loadEquipo();
  updateWeekUI(); loadSemanal();
}

/* ── VIEW SWITCHING ── */
function setView(v){
  VIEW=v;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  document.getElementById('view-equipo').classList.toggle('active',v==='equipo');
  document.getElementById('view-semanal').classList.toggle('active',v==='semanal');
}

/* ═══════════════════════════════════════
   EQUIPO
═══════════════════════════════════════ */
async function loadEquipo(){
  const{data,error}=await sb.from('nvs_team_tasks')
    .select('*').order('created_at',{ascending:true});
  if(error){
    console.error(error);
    document.getElementById('members-bar').innerHTML='<span style="font-size:11px;color:#dc2626;padding:4px 8px;">⚠️ Error cargando equipo</span>';
    document.getElementById('equipo-scroll').innerHTML=`<div class="empty">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">No se pudo cargar la tabla</div>
      <div class="empty-sub">Ejecuta el SQL de <strong>nvs_team_tasks</strong> en Supabase y recarga la página.<br><br><code style="font-size:10px;background:#f1f5f9;padding:4px 8px;border-radius:6px;">${error.message}</code></div>
    </div>`;
    return;
  }
  TEAM_TASKS=data||[];
  renderMembersBar();
  renderEquipo();
}

function getMembers(){
  const names=new Set(TEAM_TASKS.map(t=>t.assignee).filter(Boolean));
  return['todos',...Array.from(names).sort()];
}

function renderMembersBar(){
  const members=getMembers();
  const bar=document.getElementById('members-bar');
  bar.innerHTML=members.map(m=>{
    const tasks=m==='todos'?TEAM_TASKS:TEAM_TASKS.filter(t=>t.assignee===m);
    const open=tasks.filter(t=>!t.completed).length;
    const isActive=MEMBER_FILTER===m;
    const avatarLetter=m==='todos'?'★':m[0].toUpperCase();
    const cls=`member-pill${m==='todos'?' todos':''}${isActive?' active':''}`;
    return`<div class="${cls}" onclick="filterMember('${esc(m)}')">
      <div class="member-avatar">${avatarLetter}</div>
      ${m==='todos'?'Todos':esc(m)}
      <span class="pill-count">${open} pend.</span>
    </div>`;
  }).join('');
}

function filterMember(name){
  MEMBER_FILTER=name;
  E_SHOW_FORM=false;
  renderMembersBar();
  renderEquipo();
}

function renderEquipo(){
  const scroll=document.getElementById('equipo-scroll');
  const filtered=MEMBER_FILTER==='todos'
    ? TEAM_TASKS
    : TEAM_TASKS.filter(t=>t.assignee===MEMBER_FILTER);

  const done=filtered.filter(t=>t.completed).length;
  const total=filtered.length;
  const pct=total?Math.round(done/total*100):0;

  let html=`<div class="progress-wrap">
    <div class="progress-top">
      <div class="progress-info"><strong>${done}</strong> de <strong>${total}</strong> tareas completadas</div>
      <div class="progress-pct pct-equipo">${pct}%</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill fill-equipo" style="width:${pct}%"></div>
    </div>
  </div>`;

  if(MEMBER_FILTER==='todos'){
    /* Group by member */
    const members=[...new Set(TEAM_TASKS.map(t=>t.assignee).filter(Boolean))].sort();
    if(members.length===0&&!E_SHOW_FORM){
      html+=`<div class="empty"><div class="empty-icon">👥</div>
        <div class="empty-title">Sin tareas del equipo</div>
        <div class="empty-sub">Añade la primera tarea y asígnala a un integrante</div></div>`;
    } else {
      members.forEach(member=>{
        const mtasks=TEAM_TASKS.filter(t=>t.assignee===member);
        const mdone=mtasks.filter(t=>t.completed).length;
        const mpct=mtasks.length?Math.round(mdone/mtasks.length*100):0;
        html+=`<div class="member-group">
          <div class="member-group-header">
            <div class="member-group-avatar">${member[0].toUpperCase()}</div>
            <div class="member-group-name">${esc(member)}</div>
            <div class="member-group-stats">${mdone}/${mtasks.length}</div>
            <div class="member-group-bar"><div class="member-group-fill" style="width:${mpct}%"></div></div>
          </div>
          <div class="task-list">`;
        const pending=mtasks.filter(t=>!t.completed);
        const done_t=mtasks.filter(t=>t.completed);
        [...pending,...done_t].forEach((t,i)=>{html+=eTaskRow(t,i);});
        html+=`</div></div>`;
      });
    }
  } else {
    /* Single member view */
    const pending=filtered.filter(t=>!t.completed);
    const done_t=filtered.filter(t=>t.completed);
    html+=`<div class="task-list">`;
    if(filtered.length===0&&!E_SHOW_FORM){
      html+=`<div class="empty"><div class="empty-icon">✅</div>
        <div class="empty-title">Sin tareas para ${esc(MEMBER_FILTER)}</div>
        <div class="empty-sub">Añade una nueva tarea para este integrante</div></div>`;
    } else {
      if(pending.length){html+=`<div class="section-lbl">Pendientes — ${pending.length}</div>`;pending.forEach((t,i)=>html+=eTaskRow(t,i));}
      if(done_t.length){html+=`<div class="section-lbl" style="margin-top:8px;">Completadas — ${done_t.length}</div>`;done_t.forEach((t,i)=>html+=eTaskRow(t,pending.length+i));}
    }
    html+=`</div>`;
  }

  /* FORM */
  if(E_SHOW_FORM){
    const preAssignee=MEMBER_FILTER==='todos'?'':MEMBER_FILTER;
    html+=`<div class="add-form">
      <div class="f-label">Nueva tarea del equipo</div>
      <input id="ef-title" class="tf" type="text" placeholder="Nombre de la tarea…" autocomplete="off">
      <div class="tf-row" style="margin-top:8px;">
        <input id="ef-assignee" class="tf" type="text" placeholder="Responsable" style="margin:0;flex:1;" value="${esc(preAssignee)}" autocomplete="off">
        <select id="ef-priority" class="tf-sel">
          <option value="alta">🔴 Alta</option>
          <option value="media" selected>🟡 Media</option>
          <option value="baja">⚫ Baja</option>
        </select>
      </div>
      <input id="ef-due" class="tf" type="date" style="margin-top:8px;" title="Fecha límite (opcional)">
      <div class="form-btns">
        <button class="btn-save" onclick="saveEquipoTask()">Guardar tarea</button>
        <button class="btn-cancel" onclick="cancelEForm()">Cancelar</button>
      </div>
    </div>`;
  } else {
    html+=`<button class="add-btn" onclick="showEForm()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nueva tarea del equipo
    </button>`;
  }

  scroll.innerHTML=html;
  if(E_SHOW_FORM){const inp=document.getElementById('ef-title');if(inp)inp.focus();}
}

function showEForm(){E_SHOW_FORM=true;renderEquipo();}
function cancelEForm(){E_SHOW_FORM=false;renderEquipo();}

async function toggleEquipoTask(id,current){
  const{error}=await sb.from('nvs_team_tasks').update({completed:!current}).eq('id',id);
  if(error){console.error(error);return;}
  const t=TEAM_TASKS.find(x=>x.id===id);
  if(t)t.completed=!current;
  renderMembersBar(); renderEquipo();
}

async function deleteEquipoTask(id){
  if(!confirm('¿Eliminar esta tarea?'))return;
  const{error}=await sb.from('nvs_team_tasks').delete().eq('id',id);
  if(error){console.error(error);return;}
  TEAM_TASKS=TEAM_TASKS.filter(t=>t.id!==id);
  renderMembersBar(); renderEquipo();
}

async function saveEquipoTask(){
  const titleEl=document.getElementById('ef-title');
  const title=titleEl?titleEl.value.trim():'';
  if(!title){if(titleEl){titleEl.focus();titleEl.style.borderColor='#dc2626';}return;}
  const assignee=(document.getElementById('ef-assignee')||{}).value||'';
  const priority=(document.getElementById('ef-priority')||{}).value||'media';
  const due=(document.getElementById('ef-due')||{}).value||null;
  const{data,error}=await sb.from('nvs_team_tasks').insert({
    title, assignee:assignee.trim(), priority,
    due_date:due||null, completed:false
  }).select().single();
  if(error){console.error(error);return;}
  TEAM_TASKS.push(data);
  E_SHOW_FORM=false;
  if(data.assignee&&MEMBER_FILTER==='todos')MEMBER_FILTER=data.assignee;
  renderMembersBar(); renderEquipo();
}

function eTaskRow(t,i){
  return`<div class="task-item${t.completed?' done':''}" style="animation-delay:${i*.03}s">
    <div class="task-cb${t.completed?' checked':''}" onclick="toggleEquipoTask('${t.id}',${t.completed})">
      <svg class="ck" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="task-body">
      <div class="task-title">${esc(t.title)}</div>
      <div class="task-meta">
        ${MEMBER_FILTER==='todos'&&t.assignee?`<span class="badge-assignee">👤 ${esc(t.assignee)}</span>`:''}
        <span class="badge-pri pri-${t.priority}">${priLabel(t.priority)}</span>
        ${t.due_date&&!t.completed?dueBadge(t.due_date):''}
      </div>
    </div>
    <button class="task-del" onclick="deleteEquipoTask('${t.id}')" title="Eliminar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
      </svg>
    </button>
  </div>`;
}

/* ═══════════════════════════════════════
   SEMANAL
═══════════════════════════════════════ */
function changeWeek(dir){
  const d=new Date(WEEK); d.setDate(d.getDate()+dir*7);
  WEEK=d; S_SHOW_FORM=false; updateWeekUI(); loadSemanal();
}
function updateWeekUI(){
  document.getElementById('week-label').textContent=weekRange(WEEK);
  const badge=document.getElementById('week-badge');
  const now=getMonday(new Date());
  if(isThisWeek(WEEK)){badge.textContent='📍 Semana actual';badge.className='week-badge';}
  else if(WEEK<now){badge.textContent='← Semana pasada';badge.className='week-badge past';}
  else{badge.textContent='Semana futura →';badge.className='week-badge past';}
}
function setDept(dept){
  DEPT=dept; S_SHOW_FORM=false;
  document.querySelectorAll('.dept-tab').forEach(t=>t.classList.toggle('active',t.dataset.dept===dept));
  renderSemanal();
}
async function loadSemanal(){
  const ws=isoDate(WEEK);
  const{data,error}=await sb.from('nvs_weekly_tasks')
    .select('*').eq('week_start',ws).order('created_at',{ascending:true});
  if(error){console.error(error);return;}
  WEEKLY_TASKS={placement:[],marketing:[],onboarding:[]};
  (data||[]).forEach(t=>{if(WEEKLY_TASKS[t.department])WEEKLY_TASKS[t.department].push(t);});
  updateSemnalCounts(); renderSemanal();
}
function updateSemnalCounts(){
  DEPTS.forEach(d=>{
    const arr=WEEKLY_TASKS[d];
    const done=arr.filter(t=>t.completed).length;
    document.getElementById('cnt-'+d).textContent=done+'/'+arr.length;
  });
}
async function toggleSemanalTask(id,current){
  const{error}=await sb.from('nvs_weekly_tasks').update({completed:!current}).eq('id',id);
  if(error){console.error(error);return;}
  const t=WEEKLY_TASKS[DEPT].find(x=>x.id===id);
  if(t)t.completed=!current;
  updateSemnalCounts(); renderSemanal();
}
async function deleteSemanalTask(id){
  if(!confirm('¿Eliminar esta tarea?'))return;
  const{error}=await sb.from('nvs_weekly_tasks').delete().eq('id',id);
  if(error){console.error(error);return;}
  WEEKLY_TASKS[DEPT]=WEEKLY_TASKS[DEPT].filter(t=>t.id!==id);
  updateSemnalCounts(); renderSemanal();
}
async function saveSemanalTask(){
  const titleEl=document.getElementById('sf-title');
  const title=titleEl?titleEl.value.trim():'';
  if(!title){if(titleEl){titleEl.focus();titleEl.style.borderColor='#dc2626';}return;}
  const assignee=(document.getElementById('sf-assignee')||{}).value||'';
  const priority=(document.getElementById('sf-priority')||{}).value||'media';
  const{data,error}=await sb.from('nvs_weekly_tasks').insert({
    department:DEPT, week_start:isoDate(WEEK),
    title, assignee:assignee.trim(), priority, completed:false
  }).select().single();
  if(error){console.error(error);return;}
  WEEKLY_TASKS[DEPT].push(data);
  S_SHOW_FORM=false; updateSemnalCounts(); renderSemanal();
}
function renderSemanal(){
  const tasks=WEEKLY_TASKS[DEPT]||[];
  const done=tasks.filter(t=>t.completed).length;
  const total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  const deptNm={placement:'Placement',marketing:'Marketing',onboarding:'Onboarding'}[DEPT];

  let html=`<div class="progress-wrap">
    <div class="progress-top">
      <div class="progress-info"><strong>${done}</strong> de <strong>${total}</strong> tareas completadas</div>
      <div class="progress-pct pct-${DEPT}">${pct}%</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill fill-${DEPT}" style="width:${pct}%"></div>
    </div>
  </div><div class="task-list">`;

  const pending=tasks.filter(t=>!t.completed);
  const done_t=tasks.filter(t=>t.completed);

  if(tasks.length===0&&!S_SHOW_FORM){
    html+=`<div class="empty"><div class="empty-icon">📋</div>
      <div class="empty-title">Sin tareas esta semana</div>
      <div class="empty-sub">Añade la primera tarea para ${deptNm}</div></div>`;
  } else {
    if(pending.length){html+=`<div class="section-lbl">Pendientes — ${pending.length}</div>`;pending.forEach((t,i)=>html+=sTaskRow(t,i));}
    if(done_t.length){html+=`<div class="section-lbl" style="margin-top:8px;">Completadas — ${done_t.length}</div>`;done_t.forEach((t,i)=>html+=sTaskRow(t,pending.length+i));}
  }
  html+=`</div>`;

  if(S_SHOW_FORM){
    html+=`<div class="add-form">
      <div class="f-label">Nueva tarea — ${deptNm}</div>
      <input id="sf-title" class="tf" type="text" placeholder="Nombre de la tarea…" autocomplete="off">
      <div class="tf-row" style="margin-top:8px;">
        <input id="sf-assignee" class="tf" type="text" placeholder="Responsable" style="margin:0;flex:1;" autocomplete="off">
        <select id="sf-priority" class="tf-sel">
          <option value="alta">🔴 Alta</option>
          <option value="media" selected>🟡 Media</option>
          <option value="baja">⚫ Baja</option>
        </select>
      </div>
      <div class="form-btns">
        <button class="btn-save" onclick="saveSemanalTask()">Guardar tarea</button>
        <button class="btn-cancel" onclick="cancelSForm()">Cancelar</button>
      </div>
    </div>`;
  } else {
    html+=`<button class="add-btn" onclick="showSForm()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>Nueva tarea — ${deptNm}
    </button>`;
  }

  document.getElementById('semanal-scroll').innerHTML=html;
  if(S_SHOW_FORM){const inp=document.getElementById('sf-title');if(inp)inp.focus();}
}
function showSForm(){S_SHOW_FORM=true;renderSemanal();}
function cancelSForm(){S_SHOW_FORM=false;renderSemanal();}

function sTaskRow(t,i){
  return`<div class="task-item${t.completed?' done':''}" style="animation-delay:${i*.03}s">
    <div class="task-cb${t.completed?' checked':''}" onclick="toggleSemanalTask('${t.id}',${t.completed})">
      <svg class="ck" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="task-body">
      <div class="task-title">${esc(t.title)}</div>
      <div class="task-meta">
        ${t.assignee?`<span class="badge-assignee">👤 ${esc(t.assignee)}</span>`:''}
        <span class="badge-pri pri-${t.priority}">${priLabel(t.priority)}</span>
      </div>
    </div>
    <button class="task-del" onclick="deleteSemanalTask('${t.id}')" title="Eliminar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
      </svg>
    </button>
  </div>`;
}

/* ── SHARED ── */
function priLabel(p){return{alta:'● Alta',media:'● Media',baja:'● Baja'}[p]||p;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.addEventListener('keydown',e=>{
  const lo=document.getElementById('login-overlay');
  if(lo.style.display!=='none'){if(e.key==='Enter')doLogin();return;}
  if(e.key==='Enter'){
    if(VIEW==='equipo'&&E_SHOW_FORM)saveSemanalTask||saveEquipoTask();
    if(VIEW==='semanal'&&S_SHOW_FORM)saveSemanalTask();
  }
  if(e.key==='Escape'){
    if(E_SHOW_FORM)cancelEForm();
    if(S_SHOW_FORM)cancelSForm();
  }
});

document.addEventListener('DOMContentLoaded',async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session)initApp(session.user);
  else document.getElementById('login-overlay').style.display='flex';
});
</script>
