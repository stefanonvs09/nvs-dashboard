<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVS · APL Placements</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#AAFF00;--green-bg:rgba(170,255,0,0.07);--green-dk:#88CC00;--green-glow:rgba(170,255,0,0.22);
  --bg:#080808;--sb:#0b0b0b;--card:#121212;--card2:#181818;--card3:#1e1e1e;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);
  --txt:#f0f0f0;--m:#484848;--m2:#777;--m3:#aaa;
  --blue:#60a5fa;--amber:#fbbf24;--purple:#a78bfa;--red:#f87171;--teal:#2dd4bf;--pink:#f472b6;--orange:#fb923c;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--txt);display:flex;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px;}

/* LOGIN */
#login-ov{position:fixed;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(170,255,0,0.05) 0%,var(--bg) 55%);z-index:9999;display:flex;align-items:center;justify-content:center;}
.lbox{width:380px;background:rgba(14,14,14,0.96);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.09);border-radius:24px;padding:46px 42px;box-shadow:0 48px 96px rgba(0,0,0,.8);}
.lbox-logo{font-family:'Anton',sans-serif;font-size:58px;text-align:center;letter-spacing:2px;}
.lbox-logo span{color:var(--green);text-shadow:0 0 28px var(--green-glow);}
.lbox-sub{text-align:center;font-size:9px;letter-spacing:3px;color:var(--m2);text-transform:uppercase;margin-bottom:34px;margin-top:4px;}
.lbox-err{color:var(--red);font-size:11px;text-align:center;min-height:16px;margin-bottom:6px;}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--m2);text-transform:uppercase;margin-bottom:5px;}
.fi{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:10px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:13px;padding:11px 14px;outline:none;transition:border .15s,background .15s;}
.fi:focus{border-color:rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);}
.btn-g{background:var(--green);color:#000;border:none;border-radius:11px;padding:13px;width:100%;font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;cursor:pointer;margin-top:8px;transition:all .2s;box-shadow:0 0 28px var(--green-glow);}
.btn-g:hover{background:var(--green-dk);transform:translateY(-1px);}

/* APP */
.app{display:flex;width:100%;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:222px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--b);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.sb-top{padding:22px 18px 18px;border-bottom:1px solid var(--b);}
.sb-logo{font-family:'Anton',sans-serif;font-size:34px;letter-spacing:1px;}
.sb-logo span{color:var(--green);text-shadow:0 0 18px var(--green-glow);}
.sb-logo-tag{display:block;font-size:8px;font-weight:700;letter-spacing:2.5px;color:var(--m2);text-transform:uppercase;margin-top:5px;}
.sb-body{flex:1;overflow-y:auto;padding:16px 12px;}
.sb-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--m);text-transform:uppercase;padding:0 8px;margin:18px 0 8px;}
.sb-lbl:first-child{margin-top:0;}
.fsel{display:block;width:100%;margin-bottom:8px;background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:9px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;padding:9px 11px;outline:none;cursor:pointer;transition:border .15s;}
.fsel:focus{border-color:var(--b2);}
.sb-foot{padding:14px 18px;border-top:1px solid var(--b);}
.sb-foot a{color:var(--m2);font-size:11px;font-weight:700;text-decoration:none;transition:color .15s;}
.sb-foot a:hover{color:var(--txt);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--b);flex-shrink:0;background:rgba(8,8,8,0.97);backdrop-filter:blur(24px);}
.tsearch{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:10px;padding:9px 15px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:all .15s;}
.tsearch:focus{border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.06);}
.tcnt{font-size:11px;color:var(--m2);font-weight:600;white-space:nowrap;}
.view-btns{display:flex;gap:4px;}
.vbtn{background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:13px;transition:all .15s;}
.vbtn.active{background:var(--green-bg);border-color:rgba(170,255,0,0.25);}

/* STATS BAR */
.stats-bar{display:flex;border-bottom:1px solid var(--b);flex-shrink:0;}
.stat{flex:1;padding:12px 8px;cursor:pointer;transition:background .15s;text-align:center;border-right:1px solid var(--b);position:relative;}
.stat:last-child{border-right:none;}
.stat:hover{background:rgba(255,255,255,0.02);}
.stat.sf{background:rgba(255,255,255,0.025);}
.stat.sf::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:2px;border-radius:2px 2px 0 0;background:currentColor;opacity:.5;}
.stat-n{font-family:'Anton',sans-serif;font-size:26px;line-height:1;letter-spacing:-.5px;}
.stat-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--m2);margin-top:3px;}

/* KANBAN */
.kboard-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px;}
.kboard{display:flex;gap:12px;height:100%;min-width:max-content;}
.kol{width:288px;flex-shrink:0;display:flex;flex-direction:column;background:rgba(13,13,13,0.85);backdrop-filter:blur(12px);border-radius:16px;border:1px solid rgba(255,255,255,0.055);overflow:hidden;max-height:100%;}
.kol-hd{padding:13px 15px;display:flex;align-items:center;gap:9px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.045);background:rgba(255,255,255,0.02);}
.kol-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.kol-nm{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;flex:1;}
.kol-cnt{background:rgba(255,255,255,0.07);color:var(--m3);font-size:9px;font-weight:800;padding:3px 9px;border-radius:99px;letter-spacing:.3px;}
.kol-bd{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:7px;}
.kol-empty{display:flex;align-items:center;justify-content:center;flex:1;min-height:60px;color:var(--m);font-size:11px;font-weight:600;text-align:center;padding:16px;}

/* CARDS */
.card{background:linear-gradient(160deg,#1b1b1b 0%,#141414 100%);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:13px;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.5,.64,1),box-shadow .22s ease,border-color .2s ease;border-top-width:2.5px;user-select:none;}
.card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-4px);box-shadow:0 24px 56px rgba(0,0,0,.65);}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.ava{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#000;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.55);}
.card-nm{font-size:12px;font-weight:800;line-height:1.2;letter-spacing:-.1px;}
.card-pos{font-size:10px;color:var(--m2);margin-top:2px;font-weight:600;}
.card-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.tag{font-size:8px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;}
.tag-prog-Standard{background:rgba(255,255,255,0.07);color:var(--m3);border:1px solid rgba(255,255,255,0.1);}
.tag-prog-Scholarship{background:rgba(45,212,191,0.1);color:var(--teal);border:1px solid rgba(45,212,191,0.2);}
.tag-prog-Premium{background:rgba(251,191,36,0.1);color:var(--amber);border:1px solid rgba(251,191,36,0.2);}
.tag-type{background:rgba(96,165,250,0.08);color:var(--blue);border:1px solid rgba(96,165,250,0.15);}
.tag-rec{background:rgba(167,139,250,0.08);color:var(--purple);border:1px solid rgba(167,139,250,0.15);}
.card-ft{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.card-info{font-size:9px;color:var(--m2);display:flex;align-items:center;gap:8px;}
.fam-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.btn-profile{display:inline-flex;align-items:center;gap:3px;background:rgba(170,255,0,0.1);color:var(--green);border:1px solid rgba(170,255,0,0.2);border-radius:6px;padding:4px 8px;font-size:9px;font-weight:700;cursor:pointer;text-decoration:none;flex-shrink:0;transition:all .15s;}
.btn-profile:hover{background:rgba(170,255,0,0.18);}
.card-univ{font-size:9px;color:var(--green);font-weight:700;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* LIST VIEW */
.list-wrap{flex:1;overflow:auto;padding:14px;}
.list-table{width:100%;border-collapse:collapse;}
.list-table th{background:rgba(255,255,255,0.03);backdrop-filter:blur(8px);padding:10px 14px;text-align:left;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--m2);border-bottom:1px solid var(--b);position:sticky;top:0;}
.list-table td{padding:10px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.035);vertical-align:middle;}
.list-table tr:hover td{background:rgba(255,255,255,0.02);cursor:pointer;}
.td-nm{font-weight:700;}

/* DETAIL PANEL */
.dp-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:100;display:none;}
.dp-ov.open{display:block;}
.dp{position:fixed;top:0;right:-480px;width:450px;height:100vh;background:var(--sb);border-left:1px solid var(--b);z-index:101;transition:right .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.dp.open{right:0;}
.dp-hd{padding:22px 20px 17px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:flex-start;gap:14px;flex-shrink:0;background:linear-gradient(160deg,#1e1e1e 0%,#171717 100%);}
.dp-ava{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;color:#000;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,.55);}
.dp-nm{font-weight:800;font-size:18px;line-height:1.2;letter-spacing:-.3px;}
.dp-sub{font-size:11px;color:var(--m2);margin-top:4px;}
.dp-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.dp-x{margin-left:auto;background:rgba(255,255,255,0.06);border:1px solid var(--b);color:var(--m2);font-size:17px;cursor:pointer;padding:4px 9px;line-height:1;transition:all .15s;border-radius:8px;flex-shrink:0;}
.dp-x:hover{color:var(--txt);background:rgba(255,255,255,0.1);}
.dp-body{flex:1;overflow-y:auto;padding:16px 20px;}
.dp-sec{margin-bottom:18px;}
.dp-sec-lbl{font-size:8px;font-weight:700;letter-spacing:1.8px;color:var(--m);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.04);}
.dp-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.035);}
.dp-row:last-child{border-bottom:none;}
.dp-rl{font-size:10px;color:var(--m2);font-weight:600;flex-shrink:0;margin-right:12px;}
.dp-rv{font-size:11px;font-weight:700;text-align:right;max-width:65%;word-break:break-word;}
.dp-rv a{color:var(--green);text-decoration:none;}
.dp-rv a:hover{text-decoration:underline;}
.dp-univ-list{background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:10px;padding:10px 12px;margin-top:8px;}
.dp-univ-item{font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--m3);}
.dp-univ-item:last-child{border-bottom:none;}
.dp-univ-item.committed{color:var(--green);font-weight:700;}
.dp-notas{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:9px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:12px;padding:10px;outline:none;resize:vertical;min-height:80px;margin-top:8px;transition:border .15s;line-height:1.5;}
.dp-notas:focus{border-color:rgba(255,255,255,0.15);}
.dp-ft{padding:15px 20px;border-top:1px solid var(--b);display:flex;gap:8px;flex-shrink:0;}
.dp-btn{flex:1;padding:11px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;cursor:pointer;border:none;transition:all .18s;}
.dp-btn.p{background:var(--green);color:#000;box-shadow:0 0 18px var(--green-glow);}
.dp-btn.p:hover{background:var(--green-dk);}
.dp-sel{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:9px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;padding:9px 11px;outline:none;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(18,18,18,0.96);backdrop-filter:blur(14px);border:1px solid var(--b2);border-radius:12px;padding:10px 22px;font-size:12px;font-weight:700;z-index:999;transition:transform .28s cubic-bezier(.34,1.5,.64,1);white-space:nowrap;box-shadow:0 16px 40px rgba(0,0,0,.55);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{color:var(--green);}
.toast.err{color:var(--red);}

@media(max-width:768px){.sidebar{display:none;}.kol{width:250px;}.dp{width:100%;right:-100%;}.dp.open{right:0;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-ov">
  <div class="lbox">
    <div class="lbox-logo">NV<span>S</span></div>
    <div class="lbox-sub">APL Placements</div>
    <div class="lbox-err" id="l-err"></div>
    <div class="lf"><label>Email</label><input class="fi" id="l-em" type="email" placeholder="tu@email.com"></div>
    <div class="lf"><label>Contraseña</label><input class="fi" id="l-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-g" onclick="doLogin()">Entrar →</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sb-top">
      <div class="sb-logo">NV<span>S</span><span class="sb-logo-tag">APL Placements</span></div>
    </div>
    <div class="sb-body">
      <div class="sb-lbl">Filtros</div>
      <select class="fsel" id="f-sport" onchange="applyFilters()"><option value="">🏅 Todos los deportes</option></select>
      <select class="fsel" id="f-prog" onchange="applyFilters()">
        <option value="">⭐ Todos los programas</option>
        <option>Standard</option><option>Scholarship</option><option>Premium</option>
      </select>
      <select class="fsel" id="f-type" onchange="applyFilters()">
        <option value="">📋 Todos los tipos</option>
        <option>College Placement</option><option>Transfer</option><option>Boarding School</option>
      </select>
      <select class="fsel" id="f-year" onchange="applyFilters()"><option value="">📅 Todos los años</option></select>
      <select class="fsel" id="f-rec" onchange="applyFilters()"><option value="">👤 Todos los recruiters</option></select>
      <select class="fsel" id="f-fam" onchange="applyFilters()">
        <option value="">❤ Relación familiar</option>
        <option>Excellent</option><option>Good</option><option>Mid</option><option>Bad</option>
      </select>
    </div>
    <div class="sb-foot"><a href="index.html">← Volver al Hub</a></div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <input class="tsearch" id="search" placeholder="🔍  Buscar atleta, deporte, universidad..." oninput="applyFilters()">
      <span class="tcnt" id="cnt"></span>
      <div class="view-btns">
        <button class="vbtn active" id="vbtn-k" onclick="setView('kanban')" title="Kanban">⬛</button>
        <button class="vbtn" id="vbtn-l" onclick="setView('list')" title="Lista">☰</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat" id="sf-all" onclick="sfClick('')"><div class="stat-n" id="st-tot">—</div><div class="stat-l">Total</div></div>
      <div class="stat" id="sf-ip" onclick="sfClick('In Process')"><div class="stat-n" id="st-ip" style="color:var(--blue)">—</div><div class="stat-l">En Proceso</div></div>
      <div class="stat" id="sf-is" onclick="sfClick('Interested Schools')"><div class="stat-n" id="st-is" style="color:var(--amber)">—</div><div class="stat-l">Int. Schools</div></div>
      <div class="stat" id="sf-sb" onclick="sfClick('Standby')"><div class="stat-n" id="st-sb" style="color:var(--purple)">—</div><div class="stat-l">Standby</div></div>
      <div class="stat" id="sf-co" onclick="sfClick('Committed')"><div class="stat-n" id="st-co" style="color:var(--green)">—</div><div class="stat-l">Committed</div></div>
      <div class="stat" id="sf-cl" onclick="sfClick('Closed')"><div class="stat-n" id="st-cl" style="color:var(--red)">—</div><div class="stat-l">Closed</div></div>
    </div>

    <!-- KANBAN VIEW -->
    <div class="kboard-wrap" id="view-kanban">
      <div class="kboard" id="kboard"></div>
    </div>

    <!-- LIST VIEW -->
    <div class="list-wrap" id="view-list" style="display:none">
      <table class="list-table">
        <thead>
          <tr>
            <th>Atleta</th><th>Deporte / Pos</th><th>Programa</th><th>Tipo</th>
            <th>Budget</th><th>Start</th><th>Universidad</th><th>Recruiter</th><th>Familia</th>
          </tr>
        </thead>
        <tbody id="list-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="dp-ov" id="dp-ov" onclick="closeDP()"></div>
<div class="dp" id="dp"></div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://mwefvjvvitsondqghgsx.supabase.co';
const SB_KEY = 'sb_publishable_GuFFI-viJquULQCSY_Bd6Q_WoLf0cZk';
const sb = supabase.createClient(SB_URL, SB_KEY);

const STAGES = [
  {k:'In Process',        c:'#60a5fa', label:'En Proceso'},
  {k:'Interested Schools',c:'#fbbf24', label:'Interested Schools'},
  {k:'Standby',           c:'#a78bfa', label:'Standby'},
  {k:'Committed',         c:'#AAFF00', label:'Committed'},
  {k:'Closed',            c:'#f87171', label:'Closed'},
];
const S2C = Object.fromEntries(STAGES.map(s=>[s.k,s.c]));

const FAM_COLORS = {Excellent:'#AAFF00',Good:'#60a5fa',Mid:'#fbbf24',Bad:'#f87171'};
const SP_EM = {Soccer:'⚽',Basketball:'🏀',Tennis:'🎾','Flag Football':'🏈',Volleyball:'🏐',Baseball:'⚾',Gymnastics:'🤸','American Football':'🏈'};
const spIco = d => SP_EM[d]||'🏅';
const ini   = n => (n||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
const esc   = s => (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const PROG_COLORS = {Standard:'rgba(255,255,255,0.7)',Scholarship:'rgba(45,212,191,0.85)',Premium:'rgba(251,191,36,0.85)'};

let ALL=[], FLT=[], SF='', curView='kanban', openId=null;

/* AUTH */
async function init(){
  const {data:{session}} = await sb.auth.getSession();
  if(session) showApp(); else q('#login-ov').style.display='flex';
}
async function doLogin(){
  const {error} = await sb.auth.signInWithPassword({email:q('#l-em').value.trim(),password:q('#l-pw').value});
  if(error){q('#l-err').textContent=error.message;} else showApp();
}
function showApp(){q('#login-ov').style.display='none';q('#app').style.display='flex';loadData();}

/* DATA */
async function loadData(){
  const {data,error} = await sb.from('placements').select('*').order('nombre');
  if(error){console.error(error);return;}
  ALL=data||[];
  buildFilters();
  applyFilters();
}

function buildFilters(){
  const opts = (arr, sel) => {
    const el = q(sel); if(!el) return;
    const cur = el.value;
    const first = el.options[0].outerHTML;
    el.innerHTML = first + [...new Set(arr.filter(Boolean))].sort().map(v=>`<option${v===cur?' selected':''}>${esc(v)}</option>`).join('');
  };
  opts(ALL.map(a=>a.deporte), '#f-sport');
  opts(ALL.map(a=>a.start_year), '#f-year');
  opts(ALL.map(a=>a.working_with).flatMap(w=>(w||'').split(',').map(s=>s.trim())), '#f-rec');
}

/* VIEW */
function setView(v){
  curView=v;
  q('#view-kanban').style.display=v==='kanban'?'':'none';
  q('#view-list').style.display=v==='list'?'':'none';
  q('#vbtn-k').classList.toggle('active',v==='kanban');
  q('#vbtn-l').classList.toggle('active',v==='list');
  render();
}

/* FILTERS */
function sfClick(k){
  SF=SF===k?'':k;
  document.querySelectorAll('.stat').forEach(el=>el.classList.remove('sf'));
  const map={'':'sf-all','In Process':'sf-ip','Interested Schools':'sf-is','Standby':'sf-sb','Committed':'sf-co','Closed':'sf-cl'};
  if(map[SF]) q('#'+map[SF])?.classList.add('sf');
  applyFilters();
}

function applyFilters(){
  const qs  = (q('#search')?.value||'').toLowerCase();
  const sp  = q('#f-sport')?.value||'';
  const pg  = q('#f-prog')?.value||'';
  const tp  = q('#f-type')?.value||'';
  const yr  = q('#f-year')?.value||'';
  const rec = q('#f-rec')?.value||'';
  const fam = q('#f-fam')?.value||'';

  FLT=ALL.filter(a=>{
    if(SF && a.commit_status!==SF) return false;
    if(sp  && a.deporte!==sp) return false;
    if(pg  && a.nvs_program!==pg) return false;
    if(tp  && a.tipo!==tp) return false;
    if(yr  && a.start_year!==yr) return false;
    if(rec && !(a.working_with||'').includes(rec)) return false;
    if(fam && a.family_status!==fam) return false;
    if(qs  && !`${a.nombre} ${a.deporte} ${a.posicion} ${a.committed_university} ${a.universities_interested} ${a.notas} ${a.current_team}`.toLowerCase().includes(qs)) return false;
    return true;
  });
  renderStats();
  render();
  q('#cnt').textContent=`${FLT.length} atleta${FLT.length!==1?'s':''}`;
}

/* STATS */
function renderStats(){
  const cn=k=>ALL.filter(a=>a.commit_status===k).length;
  q('#st-tot').textContent=ALL.length;
  q('#st-ip').textContent=cn('In Process');
  q('#st-is').textContent=cn('Interested Schools');
  q('#st-sb').textContent=cn('Standby');
  q('#st-co').textContent=cn('Committed');
  q('#st-cl').textContent=cn('Closed');
}

function render(){curView==='kanban'?renderKanban():renderList();}

/* KANBAN */
function renderKanban(){
  q('#kboard').innerHTML=STAGES.map(st=>{
    const cards=FLT.filter(a=>a.commit_status===st.k);
    return `<div class="kol">
      <div class="kol-hd">
        <div class="kol-dot" style="background:${st.c};box-shadow:0 0 8px ${st.c}66"></div>
        <div class="kol-nm" style="color:${st.c}">${st.label}</div>
        <div class="kol-cnt">${cards.length}</div>
      </div>
      <div class="kol-bd">
        ${cards.length?cards.map(mkCard).join(''):'<div class="kol-empty">Sin atletas</div>'}
      </div>
    </div>`;
  }).join('');
}

function mkCard(a){
  const col  = S2C[a.commit_status]||'#888';
  const avBg = PROG_COLORS[a.nvs_program]||'rgba(255,255,255,0.7)';
  const famC = FAM_COLORS[a.family_status]||'#555';
  const progClass = 'tag-prog-'+(a.nvs_program||'Standard');
  return `<div class="card" style="border-top-color:${col}" onclick="openDP(${a.id})">
    <div class="card-top">
      <div class="ava" style="background:${avBg}">${ini(a.nombre)}</div>
      <div style="flex:1;min-width:0">
        <div class="card-nm">${esc(a.nombre)}</div>
        <div class="card-pos">${spIco(a.deporte)} ${esc(a.deporte)||'—'}${a.posicion?' · '+esc(a.posicion):''}</div>
      </div>
    </div>
    <div class="card-meta">
      ${a.nvs_program?`<span class="tag ${progClass}">${esc(a.nvs_program)}</span>`:''}
      ${a.tipo?`<span class="tag tag-type">${esc(a.tipo)}</span>`:''}
      ${a.budget?`<span class="tag" style="background:rgba(170,255,0,0.08);color:var(--green);border:1px solid rgba(170,255,0,0.15)">💰 ${esc(a.budget)}</span>`:''}
    </div>
    <div class="card-ft">
      <div class="card-info">
        <div class="fam-dot" style="background:${famC};box-shadow:0 0 5px ${famC}" title="Familia: ${a.family_status||'—'}"></div>
        ${a.start_year?`<span style="color:var(--m3);font-size:9px">${esc(a.start_year)}</span>`:''}
        ${a.working_with?`<span style="color:var(--purple);font-size:9px;font-weight:700">👤 ${esc(a.working_with.split(',')[0].trim())}</span>`:''}
      </div>
      ${a.digital_profile?`<a class="btn-profile" href="${esc(a.digital_profile)}" target="_blank" onclick="event.stopPropagation()">🎬 Perfil</a>`:''}
    </div>
    ${a.committed_university?`<div class="card-univ">✅ ${esc(a.committed_university)}</div>`:''}
  </div>`;
}

/* LIST */
function renderList(){
  q('#list-body').innerHTML=FLT.map(a=>{
    const col=S2C[a.commit_status]||'#888';
    const famC=FAM_COLORS[a.family_status]||'#555';
    return `<tr onclick="openDP(${a.id})">
      <td class="td-nm">${esc(a.nombre)}</td>
      <td>${spIco(a.deporte)} ${esc(a.deporte)||'—'}${a.posicion?' · <span style="color:var(--m2)">'+esc(a.posicion)+'</span>':''}</td>
      <td><span class="tag tag-prog-${a.nvs_program||'Standard'}">${esc(a.nvs_program)||'—'}</span></td>
      <td style="color:var(--m3);font-size:11px">${esc(a.tipo)||'—'}</td>
      <td style="color:var(--green);font-size:11px;font-weight:700">${esc(a.budget)||'—'}</td>
      <td style="color:var(--m3);font-size:11px">${esc(a.start_year)||'—'}</td>
      <td style="font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.committed_university?`<span style="color:var(--green);font-weight:700">${esc(a.committed_university)}</span>`:esc(a.universities_interested||'').split('\n')[0]||'—'}</td>
      <td style="color:var(--purple);font-size:11px">${esc((a.working_with||'').split(',')[0].trim())||'—'}</td>
      <td><div class="fam-dot" style="background:${famC};box-shadow:0 0 5px ${famC};margin:auto" title="${a.family_status||'—'}"></div></td>
    </tr>`;
  }).join('') || '<tr><td colspan="9" style="text-align:center;color:var(--m);padding:40px">Sin atletas</td></tr>';
}

/* DETAIL PANEL */
function openDP(id){
  const a=ALL.find(x=>x.id===id); if(!a)return;
  openId=id;
  const col=S2C[a.commit_status]||'#888';
  const avBg=PROG_COLORS[a.nvs_program]||'rgba(255,255,255,0.7)';
  const famC=FAM_COLORS[a.family_status]||'#555';
  const progClass='tag-prog-'+(a.nvs_program||'Standard');

  const univList = (a.universities_interested||'').split('\n').map(u=>u.trim()).filter(Boolean);
  const committed = (a.committed_university||'').trim();

  const univHTML = univList.length
    ? `<div class="dp-univ-list">${univList.map(u=>`<div class="dp-univ-item${u===committed?' committed':''}">${u===committed?'✅ ':''} ${esc(u)}</div>`).join('')}</div>`
    : (committed ? `<div class="dp-univ-list"><div class="dp-univ-item committed">✅ ${esc(committed)}</div></div>` : '<span style="color:var(--m);font-size:11px">—</span>');

  q('#dp').innerHTML=`
    <div class="dp-hd">
      <div class="dp-ava" style="background:${avBg}">${ini(a.nombre)}</div>
      <div style="flex:1;min-width:0">
        <div class="dp-nm">${esc(a.nombre)}</div>
        <div class="dp-sub">${spIco(a.deporte)} ${esc(a.deporte)||'—'}${a.posicion?' · '+esc(a.posicion):''}${a.nacionalidad?' · 🌎 '+esc(a.nacionalidad):''}</div>
        <div class="dp-tags">
          <span class="tag ${progClass}">${esc(a.nvs_program)||'—'}</span>
          ${a.tipo?`<span class="tag tag-type">${esc(a.tipo)}</span>`:''}
          <span class="tag" style="background:rgba(${famC.slice(1).match(/../g).map(h=>parseInt(h,16)).join(',')},0.12);color:${famC};border:1px solid ${famC}33">❤ ${a.family_status||'—'}</span>
        </div>
      </div>
      <button class="dp-x" onclick="closeDP()">×</button>
    </div>
    <div class="dp-body">
      <div class="dp-sec">
        <div class="dp-sec-lbl">Commit Status</div>
        <select class="dp-sel" onchange="updateStatus(${id},this.value)">
          ${STAGES.map(s=>`<option ${a.commit_status===s.k?'selected':''}>${s.k}</option>`).join('')}
        </select>
      </div>
      <div class="dp-sec">
        <div class="dp-sec-lbl">Placement</div>
        <div class="dp-row"><span class="dp-rl">Budget</span><span class="dp-rv" style="color:var(--green);font-weight:800">${esc(a.budget)||'—'}</span></div>
        <div class="dp-row"><span class="dp-rl">Start Year</span><span class="dp-rv">${esc(a.start_year)||'—'}</span></div>
        <div class="dp-row"><span class="dp-rl">Target End</span><span class="dp-rv">${esc(a.target_end_year)||'—'}</span></div>
        <div class="dp-row"><span class="dp-rl">Universidad comprometida</span><span class="dp-rv" style="color:var(--green)">${esc(committed)||'—'}</span></div>
      </div>
      <div class="dp-sec">
        <div class="dp-sec-lbl">Universidades Interesadas</div>
        ${univHTML}
      </div>
      <div class="dp-sec">
        <div class="dp-sec-lbl">Atleta</div>
        <div class="dp-row"><span class="dp-rl">GPA</span><span class="dp-rv">${esc(a.gpa)||'—'}</span></div>
        <div class="dp-row"><span class="dp-rl">Fecha de Nac.</span><span class="dp-rv">${esc(a.fecha_nacimiento)||'—'}</span></div>
        <div class="dp-row"><span class="dp-rl">Equipo Actual</span><span class="dp-rv">${esc(a.current_team)||'—'}</span></div>
        <div class="dp-row"><span class="dp-rl">Major Deseada</span><span class="dp-rv">${esc(a.desired_major)||'—'}</span></div>
        <div class="dp-row"><span class="dp-rl">Recruiter</span><span class="dp-rv" style="color:var(--purple)">${esc(a.working_with)||'—'}</span></div>
        ${a.digital_profile?`<div class="dp-row"><span class="dp-rl">Perfil Digital</span><span class="dp-rv"><a href="${esc(a.digital_profile)}" target="_blank">🎬 Ver perfil</a></span></div>`:''}
        ${a.notion_url?`<div class="dp-row"><span class="dp-rl">Notion</span><span class="dp-rv"><a href="${esc(a.notion_url)}" target="_blank">📎 Ver en Notion</a></span></div>`:''}
      </div>
      <div class="dp-sec">
        <div class="dp-sec-lbl">Notas</div>
        <textarea class="dp-notas" id="dp-notas-ta" onblur="saveNotas(${id})">${esc(a.notas||'')}</textarea>
      </div>
    </div>
    <div class="dp-ft">
      <button class="dp-btn p" onclick="closeDP()">Cerrar</button>
    </div>`;
  q('#dp').classList.add('open');q('#dp-ov').classList.add('open');
}
function closeDP(){q('#dp').classList.remove('open');q('#dp-ov').classList.remove('open');openId=null;}

async function updateStatus(id,ne){
  const {error}=await sb.from('placements').update({commit_status:ne}).eq('id',id);
  if(!error){const a=ALL.find(x=>x.id===id);if(a)a.commit_status=ne;applyFilters();toast('Estado actualizado ✓','ok');}
  else toast('Error','err');
}
async function saveNotas(id){
  const val=q('#dp-notas-ta')?.value||'';
  await sb.from('placements').update({notas:val}).eq('id',id);
  const a=ALL.find(x=>x.id===id);if(a)a.notas=val;
}

/* UTIL */
const q=s=>document.querySelector(s);
let _toastT=null;
function toast(msg,type='ok'){
  const el=q('#toast');el.textContent=msg;el.className='toast '+type+' show';
  clearTimeout(_toastT);_toastT=setTimeout(()=>el.classList.remove('show'),2500);
}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
