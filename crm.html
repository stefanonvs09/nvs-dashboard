<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVS · Athlete Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#AAFF00;--green-bg:rgba(170,255,0,0.09);--green-dk:#88CC00;
  --bg:#0a0a0a;--sb:#0d0d0d;--card:#111111;--card2:#161616;--card3:#1c1c1c;
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.12);
  --txt:#fff;--m:#555;--m2:#888;
  --red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--gray:#6b7280;--purple:#a78bfa;
  --red-bg:rgba(248,113,113,0.08);--amber-bg:rgba(251,191,36,0.08);
  --blue-bg:rgba(96,165,250,0.08);--gray-bg:rgba(107,114,128,0.08);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--txt);display:flex;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

/* ── LOGIN ── */
#login-ov{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.lbox{width:360px;background:var(--card);border:1px solid var(--b2);border-radius:20px;padding:40px 36px;}
.lbox-logo{font-family:'Anton',sans-serif;font-size:52px;text-align:center;letter-spacing:2px;}
.lbox-logo span{color:var(--green);}
.lbox-sub{text-align:center;font-size:9px;letter-spacing:2.5px;color:var(--m2);text-transform:uppercase;margin-bottom:30px;margin-top:4px;}
.lbox-err{color:var(--red);font-size:11px;text-align:center;min-height:16px;margin-bottom:6px;}
.lf label{display:block;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--m2);text-transform:uppercase;margin-bottom:5px;}
.lf{margin-bottom:14px;}
.fi{width:100%;background:var(--card2);border:1px solid var(--b);border-radius:9px;color:var(--txt);
  font-family:'Montserrat',sans-serif;font-size:13px;padding:10px 13px;outline:none;transition:border .15s;}
.fi:focus{border-color:rgba(255,255,255,0.22);}
.btn-g{background:var(--green);color:#000;border:none;border-radius:10px;padding:12px;width:100%;
  font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;cursor:pointer;margin-top:6px;transition:background .15s;}
.btn-g:hover{background:var(--green-dk);}

/* ── APP SHELL ── */
.app{display:flex;width:100%;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:215px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--b);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
}
.sb-top{padding:22px 16px 16px;border-bottom:1px solid var(--b);}
.sb-logo{font-family:'Anton',sans-serif;font-size:30px;letter-spacing:1px;}
.sb-logo span{color:var(--green);}
.sb-logo-tag{display:block;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--m2);text-transform:uppercase;margin-top:5px;}
.sb-body{flex:1;overflow-y:auto;padding:14px 10px;}
.sb-lbl{font-size:8px;font-weight:700;letter-spacing:1.8px;color:var(--m);text-transform:uppercase;padding:0 8px;margin:14px 0 7px;}
.sb-lbl:first-child{margin-top:0;}
.fsel{
  display:block;width:100%;margin-bottom:7px;background:var(--card2);border:1px solid var(--b);
  border-radius:8px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;
  padding:8px 10px;outline:none;cursor:pointer;transition:border .15s;
}
.fsel:focus{border-color:var(--b2);}
.sb-foot{padding:14px 16px;border-top:1px solid var(--b);}
.sb-foot a{color:var(--m2);font-size:11px;font-weight:700;text-decoration:none;transition:color .15s;display:flex;align-items:center;gap:6px;}
.sb-foot a:hover{color:var(--txt);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid var(--b);
  flex-shrink:0;background:rgba(13,13,13,0.95);backdrop-filter:blur(12px);
}
.tsearch{
  flex:1;background:var(--card2);border:1px solid var(--b);border-radius:9px;
  padding:9px 14px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:border .15s;
}
.tsearch:focus{border-color:var(--b2);}
.tcnt{font-size:11px;color:var(--m2);font-weight:600;white-space:nowrap;}
.btn-add{
  background:var(--green);color:#000;border:none;border-radius:9px;padding:9px 18px;
  font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:background .15s;
}
.btn-add:hover{background:var(--green-dk);}

/* STATS BAR */
.stats-bar{display:flex;gap:0;border-bottom:1px solid var(--b);flex-shrink:0;}
.stat{
  flex:1;padding:10px 8px;cursor:pointer;transition:background .15s;text-align:center;
  border-right:1px solid var(--b);position:relative;
}
.stat:last-child{border-right:none;}
.stat:hover{background:var(--card);}
.stat.sf{background:var(--card2);}
.stat.sf::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.stat.sf.s-all::after{background:var(--txt);}
.stat.sf.s-g::after{background:var(--green);}
.stat.sf.s-a::after{background:var(--amber);}
.stat.sf.s-r::after{background:var(--red);}
.stat.sf.s-b::after{background:var(--blue);}
.stat.sf.s-gr::after{background:var(--gray);}
.stat-n{font-family:'Anton',sans-serif;font-size:20px;line-height:1;}
.stat-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--m2);margin-top:2px;}
.s-g .stat-n{color:var(--green);}
.s-a .stat-n{color:var(--amber);}
.s-r .stat-n{color:var(--red);}
.s-b .stat-n{color:var(--blue);}
.s-gr .stat-n{color:var(--gray);}

/* KANBAN */
.kboard-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px;}
.kboard{display:flex;gap:11px;height:100%;min-width:max-content;}

.kol{
  width:255px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--card);border-radius:14px;border:1px solid var(--b);overflow:hidden;
  max-height:100%;
}
.kol-hd{
  padding:11px 13px;display:flex;align-items:center;gap:8px;flex-shrink:0;
  border-bottom:1px solid var(--b);
}
.kol-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.kol-nm{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;flex:1;}
.kol-cnt{background:rgba(255,255,255,0.05);color:var(--m2);font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;}
.kol-bd{
  flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent;
}
.kol-bd.dov{background:rgba(170,255,0,0.035);outline:1.5px dashed rgba(170,255,0,0.25);outline-offset:-3px;border-radius:8px;}
.kol-empty{display:flex;align-items:center;justify-content:center;flex:1;min-height:60px;
  color:var(--m);font-size:11px;font-weight:600;text-align:center;padding:16px;}

/* CARDS */
.card{
  background:var(--card2);border:1px solid var(--b);border-radius:10px;padding:11px;
  cursor:grab;transition:transform .12s,box-shadow .12s,border-color .12s;
  border-top-width:2.5px;position:relative;user-select:none;
}
.card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.45);}
.card.dragging{opacity:.25;cursor:grabbing;}
.card-top{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.ava{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:12px;color:#000;flex-shrink:0;letter-spacing:.5px;
}
.card-info{flex:1;min-width:0;}
.card-nm{font-size:12px;font-weight:700;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-sp{font-size:10px;color:var(--m2);margin-top:1px;}
.card-bdg{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.bdg{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;}
.bdg-plan{background:rgba(96,165,250,0.1);color:var(--blue);border:1px solid rgba(96,165,250,0.18);}
.bdg-serv{background:rgba(167,139,250,0.1);color:var(--purple);border:1px solid rgba(167,139,250,0.18);}
.bdg-serv.prem{background:rgba(251,191,36,0.1);color:var(--amber);border:1px solid rgba(251,191,36,0.18);}
.card-$$${display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.card-tot{font-family:'Anton',sans-serif;font-size:16px;}
.card-pg{font-size:9px;color:var(--m2);font-weight:600;text-align:right;max-width:130px;line-height:1.3;}
.card-ft{display:flex;align-items:center;gap:6px;}
.card-ref{font-size:9px;color:var(--m);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-wa{
  display:inline-flex;align-items:center;gap:3px;background:#1DB954;color:#fff;
  border:none;border-radius:6px;padding:4px 8px;font-size:9px;font-weight:700;
  cursor:pointer;text-decoration:none;flex-shrink:0;transition:background .15s;
}
.btn-wa:hover{background:#17a34a;}

/* DETAIL PANEL */
.dp-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;}
.dp-ov.open{display:block;}
.dp{
  position:fixed;top:0;right:-430px;width:400px;height:100vh;background:var(--sb);
  border-left:1px solid var(--b);z-index:101;transition:right .26s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.dp.open{right:0;}
.dp-hd{
  padding:18px 18px 14px;border-bottom:1px solid var(--b);display:flex;align-items:flex-start;gap:13px;
  flex-shrink:0;background:var(--card);
}
.dp-ava{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#000;flex-shrink:0;}
.dp-nm{font-weight:800;font-size:17px;line-height:1.2;}
.dp-sub{font-size:11px;color:var(--m2);margin-top:4px;}
.dp-x{margin-left:auto;background:none;border:none;color:var(--m2);font-size:22px;cursor:pointer;padding:0 4px;line-height:1;transition:color .15s;}
.dp-x:hover{color:var(--txt);}
.dp-body{flex:1;overflow-y:auto;padding:16px 18px;}
.dp-sec{margin-bottom:18px;}
.dp-sec-lbl{font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--m);text-transform:uppercase;margin-bottom:10px;}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b);}
.dp-row:last-child{border-bottom:none;}
.dp-rl{font-size:10px;color:var(--m2);font-weight:600;}
.dp-rv{font-size:11px;font-weight:700;text-align:right;max-width:56%;}
.dp-rv a{color:var(--green);text-decoration:none;}
.dp-sel{
  width:100%;background:var(--card2);border:1px solid var(--b);border-radius:8px;
  color:var(--txt);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;
  padding:8px 10px;outline:none;cursor:pointer;transition:border .15s;
}
.dp-sel:focus{border-color:var(--b2);}
.dp-ft{padding:14px 18px;border-top:1px solid var(--b);display:flex;gap:8px;flex-shrink:0;}
.dp-btn{
  flex:1;padding:10px;border-radius:9px;font-family:'Montserrat',sans-serif;
  font-weight:700;font-size:11px;cursor:pointer;border:none;transition:all .15s;
}
.dp-btn.p{background:var(--green);color:#000;}
.dp-btn.p:hover{background:var(--green-dk);}
.dp-btn.d{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.25);}
.dp-btn.d:hover{background:rgba(248,113,113,0.2);}

/* ONBOARDING TRACKER */
.ob-bar-wrap{height:5px;background:var(--card3);border-radius:99px;overflow:hidden;flex:1;}
.ob-bar{height:100%;background:var(--green);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.ob-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ob-pct{font-size:10px;font-weight:800;color:var(--green);flex-shrink:0;}
.ob-item{display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:7px;cursor:pointer;transition:background .12s;user-select:none;}
.ob-item:hover{background:var(--card3);}
.ob-chk{width:16px;height:16px;border-radius:50%;border:2px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;transition:all .15s;}
.ob-chk.on{background:var(--green);border-color:var(--green);color:#000;}
.ob-ico{font-size:13px;flex-shrink:0;}
.ob-lbl{font-size:11px;font-weight:600;color:var(--m2);flex:1;transition:color .15s;}
.ob-lbl.on{color:var(--txt);text-decoration:line-through;color:var(--m);}
.ob-date-row{padding:5px 6px;}
.ob-date{width:100%;background:var(--card2);border:1px solid var(--b);border-radius:7px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:11px;padding:7px 10px;outline:none;transition:border .15s;}
.ob-date:focus{border-color:rgba(170,255,0,.4);}
.ob-date-lbl{font-size:10px;color:var(--m2);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.ob-setup{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--amber);}
.ob-setup a{color:var(--amber);}
.ob-setup code{display:block;font-size:9px;background:var(--card2);border-radius:4px;padding:6px 8px;margin-top:6px;white-space:pre-wrap;word-break:break-all;color:var(--m2);}

/* MODAL */
.m-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;}
.m-ov.open{display:block;}
.modal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:530px;max-width:96vw;max-height:90vh;overflow-y:auto;
  background:var(--sb);border:1px solid var(--b2);border-radius:18px;z-index:201;display:none;
}
.modal.open{display:block;}
.m-hd{padding:18px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.m-ttl{font-weight:800;font-size:15px;}
.m-x{background:none;border:none;color:var(--m2);font-size:23px;cursor:pointer;line-height:1;}
.m-body{padding:20px;}
.mf{margin-bottom:13px;}
.mf label{display:block;font-size:8px;font-weight:700;letter-spacing:.8px;color:var(--m2);text-transform:uppercase;margin-bottom:4px;}
.mf-2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.m-ft{padding:13px 20px;border-top:1px solid var(--b);display:flex;gap:8px;justify-content:flex-end;}
.btn-cancel{background:var(--card2);border:1px solid var(--b);color:var(--m2);border-radius:9px;padding:9px 16px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}
.btn-save{background:var(--green);color:#000;border:none;border-radius:9px;padding:9px 22px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;cursor:pointer;}
.btn-save:hover{background:var(--green-dk);}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--card3);border:1px solid var(--b2);border-radius:10px;padding:10px 18px;
  font-size:12px;font-weight:700;z-index:999;transition:transform .25s;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{color:var(--green);}
.toast.err{color:var(--red);}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
  .stats-bar{flex-wrap:wrap;}
  .stat{flex:0 0 33.33%;}
  .kol{width:230px;}
  .dp{width:100%;right:-100%;}
  .dp.open{right:0;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-ov">
  <div class="lbox">
    <div class="lbox-logo">NV<span>S</span></div>
    <div class="lbox-sub">Athlete Dashboard</div>
    <div class="lbox-err" id="l-err"></div>
    <div class="lf"><label>Email</label><input class="fi" id="l-em" type="email" placeholder="tu@email.com"></div>
    <div class="lf"><label>Contraseña</label><input class="fi" id="l-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-g" onclick="doLogin()">Entrar →</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sb-top">
      <div class="sb-logo">NV<span>S</span><span class="sb-logo-tag">Athlete Dashboard</span></div>
    </div>
    <div class="sb-body">
      <div class="sb-lbl">Filtros</div>
      <select class="fsel" id="f-sport" onchange="applyFilters()"><option value="">🏅 Todos los deportes</option></select>
      <select class="fsel" id="f-plan" onchange="applyFilters()">
        <option value="">💳 Todos los planes</option>
        <option>1 PAYMENT</option><option>2 PAYMENTS</option><option>3 PAYMENTS</option>
        <option>4 PAYMENTS</option><option>QUARTERLY</option><option>MONTHLY</option>
        <option>ABONO + MENSUALIDAD</option>
      </select>
      <select class="fsel" id="f-serv" onchange="applyFilters()">
        <option value="">⭐ Todos los servicios</option>
        <option>ESTANDAR</option><option>PREMIUM</option><option>TRANSFER</option>
      </select>
    </div>
    <div class="sb-foot"><a href="index.html">← Volver al Hub</a></div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <input class="tsearch" id="search" placeholder="🔍  Buscar atleta, deporte, referido..." oninput="applyFilters()">
      <span class="tcnt" id="cnt"></span>
      <button class="btn-add" onclick="openAdd()">+ Atleta</button>
    </div>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat s-all sf" id="sf-all" onclick="sfClick('')">
        <div class="stat-n" id="st-tot">—</div><div class="stat-l">Total</div>
      </div>
      <div class="stat s-g" id="sf-act" onclick="sfClick('Activo')">
        <div class="stat-n" id="st-act">—</div><div class="stat-l">Activos</div>
      </div>
      <div class="stat s-a" id="sf-pen" onclick="sfClick('Pendiente')">
        <div class="stat-n" id="st-pen">—</div><div class="stat-l">Pendientes</div>
      </div>
      <div class="stat s-r" id="sf-deu" onclick="sfClick('Deudor')">
        <div class="stat-n" id="st-deu">—</div><div class="stat-l">Deudores</div>
      </div>
      <div class="stat s-b" id="sf-com" onclick="sfClick('Completado')">
        <div class="stat-n" id="st-com">—</div><div class="stat-l">Completados</div>
      </div>
      <div class="stat s-gr" id="sf-cer" onclick="sfClick('Cerrado')">
        <div class="stat-n" id="st-cer">—</div><div class="stat-l">Cerrados</div>
      </div>
    </div>

    <!-- KANBAN -->
    <div class="kboard-wrap">
      <div class="kboard" id="kboard"></div>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="dp-ov" id="dp-ov" onclick="closeDP()"></div>
<div class="dp" id="dp"></div>

<!-- MODAL -->
<div class="m-ov" id="m-ov" onclick="closeMod()"></div>
<div class="modal" id="modal">
  <div class="m-hd">
    <span class="m-ttl" id="m-ttl">Nuevo Atleta</span>
    <button class="m-x" onclick="closeMod()">×</button>
  </div>
  <div class="m-body">
    <div class="mf-2">
      <div class="mf"><label>Nombre</label><input class="fi" id="m-nombre" placeholder="Nombre completo"></div>
      <div class="mf"><label>Deporte</label><input class="fi" id="m-deporte" placeholder="Soccer, Volleyball..."></div>
    </div>
    <div class="mf-2">
      <div class="mf"><label>Servicio</label>
        <select class="fi" id="m-servicio"><option>ESTANDAR</option><option>PREMIUM</option><option>TRANSFER</option></select>
      </div>
      <div class="mf"><label>Plan de Pago</label>
        <select class="fi" id="m-plan">
          <option>1 PAYMENT</option><option>2 PAYMENTS</option><option>3 PAYMENTS</option>
          <option>4 PAYMENTS</option><option>QUARTERLY</option><option>MONTHLY</option>
          <option>ABONO + MENSUALIDAD</option>
        </select>
      </div>
    </div>
    <div class="mf-2">
      <div class="mf"><label>Total Contrato ($)</label><input class="fi" id="m-total" type="number" placeholder="0.00" step="0.01"></div>
      <div class="mf"><label>Cuota / Pago ($)</label><input class="fi" id="m-pago" type="number" placeholder="0.00" step="0.01"></div>
    </div>
    <div class="mf-2">
      <div class="mf"><label>Pagos Realizados</label><input class="fi" id="m-pagos" placeholder="1 out of 2"></div>
      <div class="mf"><label>Estado</label>
        <select class="fi" id="m-estado">
          <option>Activo</option><option>Pendiente</option><option>Deudor</option>
          <option>Completado</option><option>Cerrado</option>
        </select>
      </div>
    </div>
    <div class="mf-2">
      <div class="mf"><label>WhatsApp</label><input class="fi" id="m-wa" placeholder="507 6xxx-xxxx"></div>
      <div class="mf"><label>Referido Por</label><input class="fi" id="m-ref" placeholder="Nombre del referidor"></div>
    </div>
    <div class="mf"><label>Notas / Contacto de Pago</label><input class="fi" id="m-notas" placeholder="Ej: Rogelio Ramirez (padre) — Contacto para cobro"></div>
  </div>
  <div class="m-ft">
    <button class="btn-cancel" onclick="closeMod()">Cancelar</button>
    <button class="btn-save" onclick="saveAth()">Guardar Atleta</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ── CONFIG ── */
const SB_URL = 'https://mwefvjvvitsondqghgsx.supabase.co';
const SB_KEY = 'sb_publishable_GuFFI-viJquULQCSY_Bd6Q_WoLf0cZk';
const sb = supabase.createClient(SB_URL, SB_KEY);

const COLS = [
  {k:'Activo',     nm:'Activo',     c:'#AAFF00', av:'rgba(170,255,0,0.85)' },
  {k:'Pendiente',  nm:'Pendiente',  c:'#fbbf24', av:'rgba(251,191,36,0.85)'},
  {k:'Deudor',     nm:'Deudor',     c:'#f87171', av:'rgba(248,113,113,0.85)'},
  {k:'Completado', nm:'Completado', c:'#60a5fa', av:'rgba(96,165,250,0.85)' },
  {k:'Cerrado',    nm:'Cerrado',    c:'#6b7280', av:'rgba(107,114,128,0.85)'},
];
const C2COL = Object.fromEntries(COLS.map(c=>[c.k,c.c]));
const C2AV  = Object.fromEntries(COLS.map(c=>[c.k,c.av]));

const SP_EM = {
  Soccer:'⚽',Volleyball:'🏐',Volley:'🏐','Volley and Dance':'🏐',
  Basketball:'🏀',Baseball:'⚾','Flag Football':'🏈','Flag footbal':'🏈',
  'Flag Footbal':'🏈','Football Americano':'🏈',Gimnasia:'🤸',Tennis:'🎾',
  Atletismo:'🏃',Natacion:'🏊',Softbol:'🥎'
};
const spIco = d => SP_EM[d]||'🏅';
const fmt$ = n => n ? '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2}) : '—';
const ini  = n => (n||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();

/* ── STATE ── */
let ALL = [], FLT = [], SF = '', dragId = null, editId = null;

/* ── AUTH ── */
async function init(){
  const {data:{session}} = await sb.auth.getSession();
  if(session){ showApp(); }
  else { document.getElementById('login-ov').style.display='flex'; }
}

async function doLogin(){
  const e=q('#l-em').value.trim(), p=q('#l-pw').value;
  q('#l-err').textContent='';
  const {error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error){q('#l-err').textContent=error.message;}
  else showApp();
}

function showApp(){
  q('#login-ov').style.display='none';
  q('#app').style.display='flex';
  loadData();
  setupRT();
}

/* ── DATA ── */
async function loadData(){
  const {data,error}=await sb.from('atletas').select('*').order('nombre');
  if(error){console.error(error);return;}
  ALL = data||[];
  buildSportFilter();
  applyFilters();
}

function buildSportFilter(){
  const sel=q('#f-sport');
  const sp=[...new Set(ALL.map(a=>a.deporte).filter(Boolean))].sort();
  sel.innerHTML='<option value="">🏅 Todos los deportes</option>'+sp.map(s=>`<option>${s}</option>`).join('');
}

let _rt=null;
function setupRT(){
  sb.channel('crm-rt').on('postgres_changes',{event:'*',schema:'public',table:'atletas'},()=>{
    clearTimeout(_rt);_rt=setTimeout(loadData,800);
  }).subscribe();
}

/* ── FILTERS ── */
function sfClick(k){
  SF = SF===k?'':k;
  document.querySelectorAll('.stat').forEach(el=>el.classList.remove('sf'));
  const map={'':'sf-all','Activo':'sf-act','Pendiente':'sf-pen','Deudor':'sf-deu','Completado':'sf-com','Cerrado':'sf-cer'};
  q('#'+map[SF])?.classList.add('sf');
  applyFilters();
}

function applyFilters(){
  const qs=(q('#search')?.value||'').toLowerCase();
  const sp=q('#f-sport')?.value||'';
  const pl=q('#f-plan')?.value||'';
  const sv=q('#f-serv')?.value||'';
  FLT=ALL.filter(a=>{
    if(SF && a.estado!==SF) return false;
    if(sp && a.deporte!==sp) return false;
    if(pl && a.tipo_pago!==pl) return false;
    if(sv && a.servicio!==sv) return false;
    if(qs && !`${a.nombre} ${a.deporte} ${a.referido} ${a.notas}`.toLowerCase().includes(qs)) return false;
    return true;
  });
  renderStats();
  renderBoard();
  q('#cnt').textContent=`${FLT.length} atleta${FLT.length!==1?'s':''}`;
}

/* ── STATS ── */
function renderStats(){
  const cn=k=>ALL.filter(a=>a.estado===k).length;
  q('#st-tot').textContent=ALL.length;
  q('#st-act').textContent=cn('Activo');
  q('#st-pen').textContent=cn('Pendiente');
  q('#st-deu').textContent=cn('Deudor');
  q('#st-com').textContent=cn('Completado');
  q('#st-cer').textContent=cn('Cerrado');
}

/* ── KANBAN ── */
function renderBoard(){
  const bd=q('#kboard');
  bd.innerHTML=COLS.map(col=>{
    const cards=FLT.filter(a=>a.estado===col.k);
    return `<div class="kol">
      <div class="kol-hd">
        <div class="kol-dot" style="background:${col.c}"></div>
        <div class="kol-nm" style="color:${col.c}">${col.nm}</div>
        <div class="kol-cnt">${cards.length}</div>
      </div>
      <div class="kol-bd" id="col-${col.k}"
        ondragover="event.preventDefault();this.classList.add('dov')"
        ondragleave="this.classList.remove('dov')"
        ondrop="onDrop(event,'${col.k}')">
        ${cards.length?cards.map(a=>mkCard(a)).join(''):'<div class="kol-empty">Sin atletas</div>'}
      </div>
    </div>`;
  }).join('');
}

function mkCard(a){
  const col=C2COL[a.estado]||'#888';
  const av =C2AV[a.estado]||'rgba(255,255,255,0.7)';
  const waN=(a.whatsapp||'').replace(/\D/g,'');
  const isPrem=a.servicio==='PREMIUM';
  return `<div class="card" draggable="true" id="c-${a.id}"
    style="border-top-color:${col}"
    onclick="openDP(${a.id})"
    ondragstart="dragId=${a.id};this.classList.add('dragging')"
    ondragend="this.classList.remove('dragging')">
    <div class="card-top">
      <div class="ava" style="background:${av}">${ini(a.nombre)}</div>
      <div class="card-info">
        <div class="card-nm">${esc(a.nombre)||'—'}</div>
        <div class="card-sp">${spIco(a.deporte)} ${esc(a.deporte)||'—'}</div>
      </div>
    </div>
    <div class="card-bdg">
      <span class="bdg bdg-plan">${esc(a.tipo_pago)||'—'}</span>
      <span class="bdg bdg-serv${isPrem?' prem':''}">${esc(a.servicio)||'—'}</span>
    </div>
    <div class="card-$$$">
      <div class="card-tot" style="color:${col}">${fmt$(a.total)}</div>
      <div class="card-pg">${esc(a.pagos_hechos)||'—'}</div>
    </div>
    <div class="card-ft">
      <span class="card-ref">${a.referido?'↗ '+esc(a.referido):a.notas?'📞 '+esc(a.notas):''}</span>
      ${waN?`<a class="btn-wa" href="https://wa.me/${waN}" target="_blank" onclick="event.stopPropagation()">💬 WA</a>`:''}
    </div>
  </div>`;
}

/* ── DRAG & DROP ── */
async function onDrop(e, newEst){
  e.preventDefault();
  e.currentTarget.classList.remove('dov');
  if(!dragId||!newEst) return;
  const a=ALL.find(x=>x.id===dragId);
  if(!a||a.estado===newEst){dragId=null;return;}
  const {error}=await sb.from('atletas').update({estado:newEst,deudor:newEst==='Deudor'?'YES':'NO'}).eq('id',dragId);
  if(!error){
    a.estado=newEst;a.deudor=newEst==='Deudor'?'YES':'NO';
    applyFilters();
    if(q('#dp').classList.contains('open')) openDP(dragId);
    toast('Estado actualizado ✓','ok');
  } else toast('Error al actualizar','err');
  dragId=null;
}

/* ── DETAIL PANEL ── */
function openDP(id){
  const a=ALL.find(x=>x.id===id); if(!a) return;
  editId=id;
  const col=C2COL[a.estado]||'#888';
  const av =C2AV[a.estado]||'rgba(255,255,255,0.7)';
  const waN=(a.whatsapp||'').replace(/\D/g,'');
  q('#dp').innerHTML=`
    <div class="dp-hd">
      <div class="dp-ava" style="background:${av}">${ini(a.nombre)}</div>
      <div style="flex:1;min-width:0">
        <div class="dp-nm">${esc(a.nombre)||'—'}</div>
        <div class="dp-sub">${spIco(a.deporte)} ${esc(a.deporte)||'—'} · ${esc(a.servicio)||'—'}</div>
      </div>
      <button class="dp-x" onclick="closeDP()">×</button>
    </div>
    <div class="dp-body">
      <div class="dp-sec">
        <div class="dp-sec-lbl">Estado</div>
        <select class="dp-sel" onchange="updateEst(${id},this.value)">
          ${COLS.map(c=>`<option ${a.estado===c.k?'selected':''}>${c.k}</option>`).join('')}
        </select>
      </div>
      <div class="dp-sec">
        <div class="dp-sec-lbl">Financiero</div>
        <div class="dp-row"><span class="dp-rl">Plan</span><span class="dp-rv" style="color:var(--blue)">${esc(a.tipo_pago)||'—'}</span></div>
        <div class="dp-row"><span class="dp-rl">Total Contrato</span><span class="dp-rv" style="color:${col}">${fmt$(a.total)}</span></div>
        <div class="dp-row"><span class="dp-rl">Cuota</span><span class="dp-rv">${fmt$(a.pago)}</span></div>
        <div class="dp-row"><span class="dp-rl">Pagos Realizados</span><span class="dp-rv">${esc(a.pagos_hechos)||'—'}</span></div>
      </div>
      <div class="dp-sec">
        <div class="dp-sec-lbl">Contacto</div>
        <div class="dp-row"><span class="dp-rl">WhatsApp</span>
          <span class="dp-rv">${waN?`<a href="https://wa.me/${waN}" target="_blank">${esc(a.whatsapp)}</a>`:esc(a.whatsapp)||'—'}</span>
        </div>
        <div class="dp-row"><span class="dp-rl">Responsable Pago</span><span class="dp-rv">${esc(a.notas)||'—'}</span></div>
        <div class="dp-row"><span class="dp-rl">Referido Por</span><span class="dp-rv">${esc(a.referido)||'—'}</span></div>
      </div>
      <div class="dp-sec" style="border-top:1px solid var(--b);padding-top:16px;">
        <div class="dp-sec-lbl">🎓 Onboarding · Proceso</div>
        ${renderOnboarding(id, a.onboarding)}
      </div>
    </div>
    <div class="dp-ft">
      <button class="dp-btn p" onclick="openEdit(${id})">✏ Editar</button>
      <button class="dp-btn d" onclick="delAth(${id})">🗑 Eliminar</button>
    </div>`;
  q('#dp').classList.add('open');
  q('#dp-ov').classList.add('open');
}

function closeDP(){
  q('#dp').classList.remove('open');
  q('#dp-ov').classList.remove('open');
  editId=null;
}

async function updateEst(id, ne){
  const {error}=await sb.from('atletas').update({estado:ne,deudor:ne==='Deudor'?'YES':'NO'}).eq('id',id);
  if(!error){
    const a=ALL.find(x=>x.id===id);
    if(a){a.estado=ne;a.deudor=ne==='Deudor'?'YES':'NO';}
    applyFilters();
    toast('Estado actualizado ✓','ok');
  } else toast('Error: '+error.message,'err');
}

/* ── MODAL ── */
function openAdd(){
  editId=null;
  q('#m-ttl').textContent='Nuevo Atleta';
  ['nombre','deporte','pagos','wa','ref','notas'].forEach(f=>q('#m-'+f).value='');
  q('#m-total').value=''; q('#m-pago').value='';
  sel('#m-servicio','ESTANDAR'); sel('#m-plan','2 PAYMENTS'); sel('#m-estado','Activo');
  q('#m-ov').classList.add('open'); q('#modal').classList.add('open');
}

function openEdit(id){
  const a=ALL.find(x=>x.id===id); if(!a) return;
  editId=id;
  q('#m-ttl').textContent='Editar Atleta';
  q('#m-nombre').value=a.nombre||''; q('#m-deporte').value=a.deporte||'';
  q('#m-total').value=a.total||''; q('#m-pago').value=a.pago||'';
  q('#m-pagos').value=a.pagos_hechos||''; q('#m-wa').value=a.whatsapp||'';
  q('#m-ref').value=a.referido||''; q('#m-notas').value=a.notas||'';
  sel('#m-servicio',a.servicio||'ESTANDAR'); sel('#m-plan',a.tipo_pago||'2 PAYMENTS');
  sel('#m-estado',a.estado||'Activo');
  q('#m-ov').classList.add('open'); q('#modal').classList.add('open');
}

function closeMod(){
  q('#m-ov').classList.remove('open'); q('#modal').classList.remove('open');
}

async function saveAth(){
  const nombre=q('#m-nombre').value.trim();
  if(!nombre){toast('Ingresa el nombre','err');return;}
  const est=q('#m-estado').value;
  const payload={
    nombre, deporte:q('#m-deporte').value.trim(), servicio:q('#m-servicio').value,
    tipo_pago:q('#m-plan').value, total:parseFloat(q('#m-total').value)||0,
    pago:parseFloat(q('#m-pago').value)||0, pagos_hechos:q('#m-pagos').value.trim(),
    estado:est, referido:q('#m-ref').value.trim(), whatsapp:q('#m-wa').value.trim(),
    notas:q('#m-notas').value.trim(), deudor:est==='Deudor'?'YES':'NO',
  };
  let error;
  if(editId){
    ({error}=await sb.from('atletas').update(payload).eq('id',editId));
  } else {
    const maxId=ALL.reduce((m,a)=>Math.max(m,a.id||0),0);
    ({error}=await sb.from('atletas').insert({...payload,id:maxId+1}));
  }
  if(error){toast('Error: '+error.message,'err');return;}
  closeMod();
  await loadData();
  if(editId) openDP(editId);
  toast(editId?'Atleta actualizado ✓':'Atleta agregado ✓','ok');
}

async function delAth(id){
  if(!confirm('¿Eliminar este atleta permanentemente?')) return;
  const {error}=await sb.from('atletas').delete().eq('id',id);
  if(!error){closeDP();await loadData();toast('Atleta eliminado','ok');}
  else toast('Error: '+error.message,'err');
}

/* ── ONBOARDING TRACKER ── */
const ONBOARDING_STEPS=[
  {k:'highlights',       lbl:'Highlights creados',             ico:'🎬'},
  {k:'perfil_digital',   lbl:'Perfil digital publicado',       ico:'🌐'},
  {k:'examen_ingles',    lbl:'Examen de inglés realizado',     ico:'📝'},
  {k:'info_coaches',     lbl:'Info completa para coaches',     ico:'📋'},
  {k:'coaches_interes',  lbl:'Coaches interesados',            ico:'🎯'},
  {k:'proceso_escuela',  lbl:'Proceso con escuela iniciado',   ico:'🏫'},
  {k:'i20_recibido',     lbl:'I-20 recibido',                  ico:'📄'},
  {k:'entrevista_ok',    lbl:'Entrevista embajada completada', ico:'🏛️'},
  {k:'listo_usa',        lbl:'Listo para viajar a EE.UU.',     ico:'✈️'},
];

function renderOnboarding(id, ob){
  const d=ob||{};
  const done=ONBOARDING_STEPS.filter(s=>d[s.k]).length;
  const total=ONBOARDING_STEPS.length;
  const pct=Math.round(done/total*100);
  const items=ONBOARDING_STEPS.map(s=>{
    const on=!!d[s.k];
    return `<div class="ob-item" onclick="toggleOB(${id},'${s.k}',${!on})">
      <div class="ob-chk${on?' on':''}">${on?'✓':''}</div>
      <span class="ob-ico">${s.ico}</span>
      <span class="ob-lbl${on?' on':''}">${s.lbl}</span>
    </div>`;
  }).join('');
  const fechaVal=d.fecha_entrevista||'';
  return `<div class="ob-head">
      <div class="ob-bar-wrap"><div class="ob-bar" style="width:${pct}%"></div></div>
      <span class="ob-pct">${done}/${total}</span>
    </div>
    <div id="ob-items-${id}">${items}</div>
    <div class="ob-date-row">
      <div class="ob-date-lbl">📅 Fecha entrevista embajada</div>
      <input type="date" class="ob-date" value="${fechaVal}" onchange="saveOBDate(${id},this.value)" onclick="event.stopPropagation()">
    </div>`;
}

async function toggleOB(id, key, val){
  const a=ALL.find(x=>x.id===id); if(!a) return;
  const ob={...(a.onboarding||{}),[key]:val};
  const {error}=await sb.from('atletas').update({onboarding:ob}).eq('id',id);
  if(error){
    if(error.message&&error.message.includes('onboarding')){
      const el=document.getElementById('ob-items-'+id);
      if(el)el.innerHTML=`<div class="ob-setup">
        <strong>⚠️ Columna no creada aún.</strong> Ejecuta este SQL en
        <a href="https://supabase.com/dashboard/project/mwefvjvvitsondqghgsx/sql/new" target="_blank">Supabase SQL Editor →</a>
        <code>ALTER TABLE atletas
  ADD COLUMN IF NOT EXISTS onboarding jsonb DEFAULT '{}'::jsonb;</code>
      </div>`;
      return;
    }
    toast('Error: '+error.message,'err');return;
  }
  a.onboarding=ob;
  openDP(id);
}

async function saveOBDate(id, date){
  const a=ALL.find(x=>x.id===id); if(!a) return;
  const ob={...(a.onboarding||{}),fecha_entrevista:date||null};
  const {error}=await sb.from('atletas').update({onboarding:ob}).eq('id',id);
  if(!error){a.onboarding=ob;toast('Fecha guardada ✓','ok');}
  else toast('Error: '+error.message,'err');
}

/* ── UTIL ── */
const q  = s => document.querySelector(s);
const esc= s => (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sel= (id,v)=>{const e=q(id);if(e)e.value=v;};

let _toastT=null;
function toast(msg,type='ok'){
  const el=q('#toast');
  el.textContent=msg; el.className='toast '+type+' show';
  clearTimeout(_toastT);
  _toastT=setTimeout(()=>el.classList.remove('show'),2500);
}

window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
