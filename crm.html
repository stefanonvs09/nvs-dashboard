<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVS · APL Placements</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#AAFF00;--green-bg:rgba(170,255,0,0.10);--green-dk:#88CC00;--green-glow:rgba(170,255,0,0.15);
  --bg:#f8fafc;--sb:#ffffff;--card:#ffffff;--card2:#f1f5f9;--card3:#e2e8f0;
  --b:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.14);
  --txt:#0f172a;--m:#64748b;--m2:#64748b;--m3:#334155;
  --blue:#3b82f6;--amber:#d97706;--purple:#7c3aed;--red:#dc2626;--teal:#0d9488;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);display:flex;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px;}

/* LOGIN */
#login-ov{position:fixed;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(170,255,0,0.05) 0%,var(--bg) 55%);z-index:9999;display:flex;align-items:center;justify-content:center;}
.lbox{width:380px;background:rgba(14,14,14,0.96);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.09);border-radius:24px;padding:46px 42px;box-shadow:0 48px 96px rgba(0,0,0,.8);}
.lbox-logo{font-family:'Anton',sans-serif;font-size:58px;text-align:center;letter-spacing:2px;}
.lbox-logo span{color:var(--green);text-shadow:0 0 28px var(--green-glow);}
.lbox-sub{text-align:center;font-size:9px;letter-spacing:3px;color:var(--m2);text-transform:uppercase;margin-bottom:34px;margin-top:4px;}
.lbox-err{color:var(--red);font-size:11px;text-align:center;min-height:16px;margin-bottom:6px;}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--m2);text-transform:uppercase;margin-bottom:5px;}
.fi{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:10px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:13px;padding:11px 14px;outline:none;transition:border .15s,background .15s;}
.fi:focus{border-color:rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);}
.btn-g{background:var(--green);color:#000;border:none;border-radius:11px;padding:13px;width:100%;font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;cursor:pointer;margin-top:8px;transition:all .2s;box-shadow:0 0 28px var(--green-glow);}
.btn-g:hover{background:var(--green-dk);transform:translateY(-1px);}

/* APP */
.app{display:flex;width:100%;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:222px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--b);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.sb-top{padding:22px 18px 18px;border-bottom:1px solid var(--b);}
.sb-logo{font-family:'Anton',sans-serif;font-size:34px;letter-spacing:1px;}
.sb-logo span{color:var(--green);text-shadow:0 0 18px var(--green-glow);}
.sb-logo-tag{display:block;font-size:8px;font-weight:700;letter-spacing:2.5px;color:var(--m2);text-transform:uppercase;margin-top:5px;}
.sb-body{flex:1;overflow-y:auto;padding:16px 12px;}
.sb-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--m);text-transform:uppercase;padding:0 8px;margin:18px 0 8px;}
.sb-lbl:first-child{margin-top:0;}
.fsel{display:block;width:100%;margin-bottom:8px;background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:9px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;padding:9px 11px;outline:none;cursor:pointer;}
.fsel:focus{border-color:var(--b2);}
.sb-foot{padding:14px 18px;border-top:1px solid var(--b);}
.sb-foot a{color:var(--m2);font-size:11px;font-weight:700;text-decoration:none;transition:color .15s;}
.sb-foot a:hover{color:var(--txt);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--b);flex-shrink:0;background:rgba(8,8,8,0.97);backdrop-filter:blur(24px);}
.tsearch{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:10px;padding:9px 15px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:all .15s;}
.tsearch:focus{border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.06);}
.tcnt{font-size:11px;color:var(--m2);font-weight:600;white-space:nowrap;}
.view-btns{display:flex;gap:4px;}
.vbtn{background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:13px;transition:all .15s;}
.vbtn.active{background:var(--green-bg);border-color:rgba(170,255,0,0.25);}
.btn-add{background:var(--green);color:#000;border:none;border-radius:10px;padding:9px 20px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;box-shadow:0 0 22px var(--green-glow);}
.btn-add:hover{background:var(--green-dk);box-shadow:0 0 36px rgba(170,255,0,.42);transform:translateY(-1px);}

/* STATS BAR */
.stats-bar{display:flex;border-bottom:1px solid var(--b);flex-shrink:0;}
.stat{flex:1;padding:12px 8px;cursor:pointer;transition:background .15s;text-align:center;border-right:1px solid var(--b);position:relative;}
.stat:last-child{border-right:none;}
.stat:hover{background:rgba(255,255,255,0.02);}
.stat.sf{background:rgba(255,255,255,0.025);}
.stat.sf::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:2px;border-radius:2px 2px 0 0;background:currentColor;opacity:.5;}
.stat-n{font-family:'Anton',sans-serif;font-size:26px;line-height:1;letter-spacing:-.5px;}
.stat-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--m2);margin-top:3px;}

/* KANBAN */
.kboard-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px;}
.kboard{display:flex;gap:12px;height:100%;min-width:max-content;}
.kol{width:288px;flex-shrink:0;display:flex;flex-direction:column;background:rgba(13,13,13,0.85);backdrop-filter:blur(12px);border-radius:16px;border:1px solid rgba(255,255,255,0.055);overflow:hidden;max-height:100%;}
.kol-hd{padding:13px 15px;display:flex;align-items:center;gap:9px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.045);background:rgba(255,255,255,0.02);}
.kol-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.kol-nm{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;flex:1;}
.kol-cnt{background:rgba(255,255,255,0.07);color:var(--m3);font-size:9px;font-weight:800;padding:3px 9px;border-radius:99px;}
.kol-add{background:none;border:none;color:var(--m2);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:6px;transition:all .15s;line-height:1;}
.kol-add:hover{background:rgba(255,255,255,0.08);color:var(--txt);}
.kol-bd{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:7px;}
.kol-empty{display:flex;align-items:center;justify-content:center;flex:1;min-height:60px;color:var(--m);font-size:11px;font-weight:600;text-align:center;padding:16px;}

/* CARDS */
.card{background:linear-gradient(160deg,#1b1b1b 0%,#141414 100%);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:13px;cursor:grab;transition:transform .3s cubic-bezier(.34,1.5,.64,1),box-shadow .22s,border-color .2s;border-top-width:2.5px;user-select:none;position:relative;}
.card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-4px);box-shadow:0 24px 56px rgba(0,0,0,.65);}
.card.dragging{opacity:.35;transform:scale(.97);cursor:grabbing;}
.kol-bd.drag-over{background:rgba(170,255,0,.06);outline:2px dashed rgba(170,255,0,.4);outline-offset:-4px;border-radius:10px;}
.card:hover .card-edit-btn{opacity:1;}
.card-edit-btn{position:absolute;top:10px;right:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:var(--m3);font-size:10px;font-weight:700;border-radius:7px;padding:3px 8px;cursor:pointer;opacity:0;transition:all .15s;line-height:1.4;}
.card-edit-btn:hover{background:rgba(255,255,255,0.14);color:var(--txt);}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.ava{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#000;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.55);}
.card-nm{font-size:12px;font-weight:800;line-height:1.2;letter-spacing:-.1px;padding-right:38px;}
.card-pos{font-size:10px;color:var(--m2);margin-top:2px;font-weight:600;}
.card-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.tag{font-size:8px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;}
.tag-prog-Standard{background:rgba(255,255,255,0.07);color:var(--m3);border:1px solid rgba(255,255,255,0.1);}
.tag-prog-Scholarship{background:rgba(45,212,191,0.1);color:var(--teal);border:1px solid rgba(45,212,191,0.2);}
.tag-prog-Premium{background:rgba(251,191,36,0.1);color:var(--amber);border:1px solid rgba(251,191,36,0.2);}
.tag-type{background:rgba(96,165,250,0.08);color:var(--blue);border:1px solid rgba(96,165,250,0.15);}
.card-ft{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.card-info{font-size:9px;color:var(--m2);display:flex;align-items:center;gap:8px;}
.fam-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.btn-profile{display:inline-flex;align-items:center;gap:3px;background:rgba(170,255,0,0.1);color:var(--green);border:1px solid rgba(170,255,0,0.2);border-radius:6px;padding:4px 8px;font-size:9px;font-weight:700;cursor:pointer;text-decoration:none;flex-shrink:0;transition:all .15s;}
.btn-profile:hover{background:rgba(170,255,0,0.18);}
.card-univ{font-size:9px;color:var(--green);font-weight:700;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* LIST VIEW */
.list-wrap{flex:1;overflow:auto;padding:14px;}
.list-table{width:100%;border-collapse:collapse;}
.list-table th{background:rgba(255,255,255,0.03);backdrop-filter:blur(8px);padding:10px 14px;text-align:left;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--m2);border-bottom:1px solid var(--b);position:sticky;top:0;}
.list-table td{padding:10px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.035);vertical-align:middle;}
.list-table tr:hover td{background:rgba(255,255,255,0.02);cursor:pointer;}
.td-nm{font-weight:700;}

/* DETAIL PANEL */
.dp-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:100;display:none;}
.dp-ov.open{display:block;}
.dp{position:fixed;top:0;right:-720px;width:min(660px,94vw);height:100vh;background:var(--sb);border-left:1px solid var(--b);z-index:101;transition:right .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.dp.open{right:0;}
.dp-hd{padding:22px 20px 17px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:flex-start;gap:14px;flex-shrink:0;background:linear-gradient(160deg,#1e1e1e 0%,#171717 100%);}
.dp-ava{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;color:#000;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,.55);}
.dp-nm{font-weight:800;font-size:18px;line-height:1.2;letter-spacing:-.3px;}
.dp-sub{font-size:11px;color:var(--m2);margin-top:4px;}
.dp-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.dp-x{margin-left:auto;background:rgba(255,255,255,0.06);border:1px solid var(--b);color:var(--m2);font-size:17px;cursor:pointer;padding:4px 9px;line-height:1;transition:all .15s;border-radius:8px;flex-shrink:0;}
.dp-x:hover{color:var(--txt);background:rgba(255,255,255,0.1);}
.dp-body{flex:1;overflow-y:auto;padding:22px 28px;}
.dp-sec{margin-bottom:18px;}
.dp-sec-lbl{font-size:8px;font-weight:700;letter-spacing:1.8px;color:var(--m);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.04);}
.dp-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.035);}
.dp-row:last-child{border-bottom:none;}
.dp-rl{font-size:10px;color:var(--m2);font-weight:600;flex-shrink:0;margin-right:12px;}
.dp-rv{font-size:11px;font-weight:700;text-align:right;max-width:65%;word-break:break-word;}
.dp-rv a{color:var(--green);text-decoration:none;}
.dp-rv a:hover{text-decoration:underline;}
.dp-univ-list{background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:10px;padding:10px 12px;margin-top:8px;}
.dp-univ-item{font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--m3);}
.dp-univ-item:last-child{border-bottom:none;}
.dp-univ-item.committed{color:var(--green);font-weight:700;}
.dp-notas{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:9px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:12px;padding:10px;outline:none;resize:vertical;min-height:80px;margin-top:8px;transition:border .15s;line-height:1.5;}
/* Checklist del atleta */
.lt-prog{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.lt-prog-bar{flex:1;height:6px;background:rgba(0,0,0,0.09);border-radius:99px;overflow:hidden;}
.lt-prog-fill{height:100%;background:#22c55e;border-radius:99px;transition:width .2s;}
.lt-prog-lbl{font-size:11px;font-weight:800;color:#64748b;min-width:30px;text-align:right;}
.lt-list{display:flex;flex-direction:column;gap:6px;}
.lt-item{display:flex;align-items:center;gap:10px;padding:9px 11px;background:#f8fafc;border:1px solid rgba(0,0,0,0.08);border-radius:9px;}
.lt-item.done{background:rgba(34,197,94,0.07);border-color:rgba(34,197,94,0.2);}
.lt-cb{width:20px;height:20px;flex-shrink:0;border-radius:6px;border:1.5px solid rgba(0,0,0,0.2);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;transition:all .15s;padding:0;font-weight:700;}
.lt-cb.on{background:#22c55e;border-color:#22c55e;}
.lt-label{flex:1;font-size:13px;color:#0f172a;line-height:1.35;}
.lt-item.done .lt-label{text-decoration:line-through;color:#94a3b8;}
.lt-del{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:16px;line-height:1;padding:0 3px;}
.lt-del:hover{color:#ef4444;}
.lt-add{margin-top:8px;width:100%;background:none;border:1px dashed rgba(0,0,0,0.16);border-radius:8px;padding:8px;font-size:12px;font-weight:700;color:#64748b;cursor:pointer;transition:all .15s;}
.lt-add:hover{border-color:#22c55e;color:#0f172a;}
.tag-task{background:rgba(100,116,139,0.1);color:#475569;border:1px solid rgba(100,116,139,0.18);}
.tag-done{background:rgba(34,197,94,0.12);color:#16a34a;border:1px solid rgba(34,197,94,0.25);}
.lt-group{margin-bottom:16px;}
.lt-group-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;}
.lt-group-t{font-size:13px;font-weight:800;color:#0f172a;letter-spacing:.2px;}
.lt-group-d{font-size:11px;color:#94a3b8;margin-top:1px;}
.lt-group-c{font-size:11px;font-weight:800;color:#64748b;background:rgba(100,116,139,0.1);border-radius:99px;padding:3px 9px;flex-shrink:0;}
.lt-group-c.ok{color:#16a34a;background:rgba(34,197,94,0.12);}
/* Seguimiento (registro de actividad) */
.sg-last{font-size:12px;color:#334155;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.16);border-radius:8px;padding:8px 11px;margin-bottom:10px;}
.sg-last b{color:#16a34a;}
.sg-empty{font-size:12px;color:#94a3b8;font-style:italic;margin-bottom:10px;}
.sg-add{margin-bottom:12px;}
.sg-ta{width:100%;background:#f8fafc;border:1px solid rgba(0,0,0,0.1);border-radius:9px;color:#0f172a;font-family:inherit;font-size:13px;line-height:1.45;padding:10px;outline:none;resize:vertical;min-height:56px;}
.sg-ta:focus{border-color:#22c55e;background:#fff;}
.sg-btn{margin-top:7px;width:100%;background:#0f172a;color:#fff;border:none;border-radius:8px;padding:9px;font-size:12px;font-weight:800;cursor:pointer;transition:background .15s;}
.sg-btn:hover{background:#1e293b;}
.sg-log{display:flex;flex-direction:column;gap:8px;}
.sg-entry{background:#f8fafc;border:1px solid rgba(0,0,0,0.07);border-left:3px solid #22c55e;border-radius:8px;padding:9px 11px;}
.sg-entry-hd{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.sg-who{font-size:11px;font-weight:800;color:#0f172a;}
.sg-when{font-size:11px;color:#94a3b8;flex:1;}
.sg-edit{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:13px;line-height:1;padding:0 2px;}
.sg-edit:hover{color:#0f172a;}
.sg-del{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:15px;line-height:1;padding:0 2px;}
.sg-del:hover{color:#ef4444;}
.sg-entry.editing{border-left-color:#f59e0b;background:#fffdf7;}
.sg-edit-btns{display:flex;gap:7px;margin-top:7px;}
.sg-btn.sm{width:auto;flex:1;padding:7px;font-size:11px;}
.sg-btn.ghost{background:#e2e8f0;color:#334155;}
.sg-btn.ghost:hover{background:#cbd5e1;}
.sg-text{font-size:13px;color:#334155;line-height:1.45;white-space:pre-wrap;word-break:break-word;}
.tag-follow{background:rgba(100,116,139,0.1);color:#475569;border:1px solid rgba(100,116,139,0.18);}
.tag-stale{background:rgba(239,68,68,0.1);color:#dc2626;border:1px solid rgba(239,68,68,0.2);}
.tag-nofollow{background:rgba(245,158,11,0.1);color:#b45309;border:1px solid rgba(245,158,11,0.22);}
/* Recruiter chips */
.rec-chips{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end;}
.rec-chip{background:#f1f5f9;border:1px solid rgba(0,0,0,0.1);color:#334155;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;}
.rec-chip:hover{border-color:#a78bfa;color:#0f172a;}
.rec-chip.active{background:#7c3aed;border-color:#7c3aed;color:#fff;}
.rec-chip.clear{background:none;border:none;color:#cbd5e1;padding:4px 6px;}
.rec-chip.clear:hover{color:#ef4444;}
.dp-notas:focus{border-color:rgba(255,255,255,0.15);}
.dp-sel{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:9px;color:var(--txt);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;padding:9px 11px;outline:none;cursor:pointer;}
.dp-ft{padding:15px 20px;border-top:1px solid var(--b);display:flex;gap:8px;flex-shrink:0;}
.dp-btn{flex:1;padding:11px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;cursor:pointer;border:none;transition:all .18s;}
.dp-btn.p{background:var(--green);color:#000;box-shadow:0 0 18px var(--green-glow);}
.dp-btn.p:hover{background:var(--green-dk);}
.dp-btn.e{background:rgba(96,165,250,0.1);color:var(--blue);border:1px solid rgba(96,165,250,0.2);}
.dp-btn.e:hover{background:rgba(96,165,250,0.18);}
.dp-btn.d{background:rgba(248,113,113,0.08);color:var(--red);border:1px solid rgba(248,113,113,0.2);}

async function exportCSV(){
  const {data,error}=await sb.from('placements').select('*').order('nombre');
  if(error){ alert('Error al leer los atletas: '+error.message); return; }
  const rows=data||[];
  if(!rows.length){ alert('No hay atletas para exportar.'); return; }
  const cols=[
    ['nombre','Nombre'],['deporte','Deporte'],['posicion','Posición'],['nacionalidad','Nacionalidad'],
    ['fecha_nacimiento','Fecha nacimiento'],['nvs_program','Programa'],['tipo','Tipo'],
    ['commit_status','Estado commit'],['committed_university','Universidad comprometida'],
    ['current_team','Equipo actual'],['universities_interested','Universidades interesadas'],
    ['desired_major','Carrera deseada'],['gpa','GPA'],['budget','Presupuesto'],
    ['family_status','Relación familiar'],['working_with','Recruiter'],
    ['start_year','Año inicio'],['target_end_year','Año fin'],
    ['digital_profile','Perfil digital'],['notion_url','Notion'],['notas','Notas'],['created_at','Creado']
  ];
  const cell=v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const csv=[cols.map(c=>cell(c[1])).join(','), ...rows.map(r=>cols.map(c=>cell(r[c[0]])).join(','))].join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='apl-placements-backup.csv'; document.body.appendChild(a); a.click(); a.remove();
}

/* ── DRAG & DROP ── */
let _dragId=null;
let _wasDragging=false;

function dragStart(e,id){
  _dragId=id;
  _wasDragging=false;
  e.dataTransfer.effectAllowed='move';
  const card=e.currentTarget;
  setTimeout(()=>card.classList.add('dragging'),0);
}
function dragEnd(e){
  _wasDragging=true;
  setTimeout(()=>_wasDragging=false,250);
  document.querySelectorAll('.card.dragging').forEach(c=>c.classList.remove('dragging'));
  document.querySelectorAll('.kol-bd.drag-over').forEach(c=>c.classList.remove('drag-over'));
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over');
}
async function dropCard(e,stage){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id=_dragId; _dragId=null;
  if(!id) return;
  const a=ALL.find(x=>x.id===id);
  if(!a||a.commit_status===stage) return;
  a.commit_status=stage;
  applyFilters();
  const {error}=await sb.from('placements').update({commit_status:stage}).eq('id',id);
  if(error){toast('Error al mover','err');await loadData();}
  else toast('Movido a '+stage,'ok');
}

async function updateStatus(id,ne){
  const {error}=await sb.from('placements').update({commit_status:ne}).eq('id',id);
  if(!error){const a=ALL.find(x=>x.id===id);if(a){a.commit_status=ne;renderDP(a);}applyFilters();toast('Estado actualizado ✓','ok');}
  else toast('Error','err');
}
/* ── PROCESO DEL ATLETA (APL Placements) ── */
// Fases del proceso. Se puede ampliar; cada atleta puede tener tareas propias.
const TASK_GROUPS=[
  {id:'onb',  label:'① Onboarding',           desc:'Arranque del atleta con New Vision'},
  {id:'proc', label:'② Proceso / Aplicación',  desc:'Requisitos académicos y migratorios'},
  {id:'extra',label:'➕ Otras tareas',          desc:''},
];
const TASKS_TPL=[
  {id:'onb_call',    group:'onb', label:'Llamada de onboarding con Placement Coordinator'},
  {id:'perfil',      group:'onb', label:'Creación del perfil (software)'},
  {id:'highlights',  group:'onb', label:'Creación de highlights con Media Team'},
  {id:'duolingo',    group:'proc',label:'Demo Duolingo'},
  {id:'sat',         group:'proc',label:'SAT'},
  {id:'cartas_banco',group:'proc',label:'Cartas bancarias a la escuela'},
  {id:'visa_f1',     group:'proc',label:'Visa F-1'},
];
function taskList(a){
  const stored=Array.isArray(a.tasks)?a.tasks:[];
  const byId={}; stored.forEach(t=>{if(t&&t.id)byId[t.id]=t;});
  const list=TASKS_TPL.map(t=>({id:t.id,label:t.label,group:t.group,done:!!(byId[t.id]&&byId[t.id].done),tpl:true}));
  stored.filter(t=>t&&t.id&&!TASKS_TPL.some(x=>x.id===t.id))
        .forEach(t=>list.push({id:t.id,label:t.label||'(sin nombre)',group:'extra',done:!!t.done,tpl:false}));
  return list;
}
function taskBadge(a){
  const list=taskList(a), done=list.filter(t=>t.done).length, tot=list.length;
  if(!tot) return '';
  const all=done===tot;
  return `<span class="tag ${all?'tag-done':'tag-task'}" title="Checklist del atleta">${all?'✅':'☑'} ${done}/${tot}</span>`;
}
function tasksHtml(a){
  const id=a.id, list=taskList(a), done=list.filter(t=>t.done).length, tot=list.length;
  const pct=tot?Math.round(done/tot*100):0;
  let html=`<div class="lt-prog"><div class="lt-prog-bar"><div class="lt-prog-fill" style="width:${pct}%"></div></div><span class="lt-prog-lbl">${done}/${tot}</span></div>`;
  TASK_GROUPS.forEach(g=>{
    const items=list.filter(t=>(t.group||'extra')===g.id);
    if(!items.length) return;
    const gdone=items.filter(t=>t.done).length, gall=gdone===items.length;
    html+=`<div class="lt-group">
      <div class="lt-group-hd">
        <div><div class="lt-group-t">${g.label}</div>${g.desc?`<div class="lt-group-d">${g.desc}</div>`:''}</div>
        <span class="lt-group-c${gall?' ok':''}">${gdone}/${items.length}</span>
      </div>
      <div class="lt-list">
        ${items.map(t=>`
          <div class="lt-item${t.done?' done':''}">
            <button class="lt-cb${t.done?' on':''}" onclick="toggleTask(${id},'${t.id}')" title="${t.done?'Marcar pendiente':'Marcar hecho'}">${t.done?'✓':''}</button>
            <span class="lt-label">${esc(t.label)}</span>
            ${t.tpl?'':`<button class="lt-del" onclick="delTask(${id},'${t.id}')" title="Quitar tarea">×</button>`}
          </div>`).join('')}
      </div>
    </div>`;
  });
  html+=`<button class="lt-add" onclick="addTask(${id})">+ Agregar tarea</button>`;
  return html;
}
function _fullTasks(a){ return taskList(a).map(t=>({id:t.id,label:t.label,done:t.done})); }
async function _persistTasks(id,full){
  const a=ALL.find(x=>x.id===id); if(a)a.tasks=full;
  const box=q('#dp-tasks'); if(box&&a)box.innerHTML=tasksHtml(a);
  render(); // refresca el badge de la tarjeta (este módulo no tiene realtime)
  const {error}=await sb.from('placements').update({tasks:full}).eq('id',id);
  if(error)toast('No se pudo guardar el checklist: '+error.message,'err');
}
function toggleTask(id,taskId){
  const a=ALL.find(x=>x.id===id); if(!a)return;
  const full=_fullTasks(a); const it=full.find(t=>t.id===taskId); if(it)it.done=!it.done;
  _persistTasks(id,full);
}
function addTask(id){
  const label=(prompt('Nueva tarea para este atleta:')||'').trim(); if(!label)return;
  const a=ALL.find(x=>x.id===id); if(!a)return;
  const full=_fullTasks(a); full.push({id:'c_'+Math.random().toString(36).slice(2,9),label,done:false});
  _persistTasks(id,full);
}
function delTask(id,taskId){
  const a=ALL.find(x=>x.id===id); if(!a)return;
  const full=_fullTasks(a).filter(t=>t.id!==taskId);
  _persistTasks(id,full);
}
/* ── SEGUIMIENTO DEL ATLETA (registro compartido) ── */
function _sgName(email){ if(!email)return 'Equipo NVS'; const n=String(email).split('@')[0]; return n.charAt(0).toUpperCase()+n.slice(1); }
function _sgWhen(ts){
  if(!ts) return {rel:'',abs:'',hm:''};
  const d=new Date(ts), now=new Date();
  const a0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const b0=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((a0-b0)/86400000);
  let rel;
  if(diff<=0) rel='hoy';
  else if(diff===1) rel='ayer';
  else if(diff<30) rel='hace '+diff+' días';
  else { const m=Math.round(diff/30); rel='hace '+m+' mes'+(m>1?'es':''); }
  return {rel, abs:d.toLocaleDateString('es-PA',{day:'numeric',month:'short',year:'numeric'}), hm:d.toLocaleTimeString('es-PA',{hour:'2-digit',minute:'2-digit'})};
}
function activityList(a){
  const arr=Array.isArray(a.activity)?a.activity.slice():[];
  arr.sort((x,y)=>String(y.ts||'').localeCompare(String(x.ts||'')));
  return arr;
}
function followBadge(a){
  const arr=activityList(a);
  if(!arr.length) return `<span class="tag tag-nofollow" title="Aún sin seguimiento">🕒 Sin seg.</span>`;
  const w=_sgWhen(arr[0].ts);
  const diff=Math.round((new Date()-new Date(arr[0].ts))/86400000);
  return `<span class="tag ${diff>14?'tag-stale':'tag-follow'}" title="Último seguimiento: ${w.abs} · ${_sgName(arr[0].by)}">🕒 ${w.rel}</span>`;
}
function activityHtml(a){
  const id=a.id, arr=activityList(a);
  let html= arr.length
    ? `<div class="sg-last">Último seguimiento: <b>${_sgWhen(arr[0].ts).rel}</b> · ${_sgWhen(arr[0].ts).abs}${arr[0].by?` · por ${_sgName(arr[0].by)}`:''}</div>`
    : `<div class="sg-empty">Sin seguimiento registrado aún. Anota el primero abajo.</div>`;
  html+=`<div class="sg-add">
    <textarea class="sg-ta" id="sg-input" placeholder="¿Qué se conversó y en qué quedaron? Ej: Llamada — quedó en enviar notas del SAT esta semana, sigue interesado en NJCAA." onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter')addActivity(${id})"></textarea>
    <button class="sg-btn" onclick="addActivity(${id})">+ Registrar seguimiento</button>
  </div>`;
  if(arr.length){
    html+=`<div class="sg-log">`+arr.map(e=>{
      const w=_sgWhen(e.ts);
      if(sgEdit===e.id){
        return `<div class="sg-entry editing">
          <div class="sg-entry-hd"><span class="sg-who">${_sgName(e.by)}</span><span class="sg-when">${w.rel} · ${w.abs}</span></div>
          <textarea class="sg-ta" id="sg-edit-input" onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter')saveEditActivity(${id},'${e.id}')">${esc(e.text)}</textarea>
          <div class="sg-edit-btns">
            <button class="sg-btn sm" onclick="saveEditActivity(${id},'${e.id}')">Guardar</button>
            <button class="sg-btn sm ghost" onclick="cancelEditActivity(${id})">Cancelar</button>
          </div>
        </div>`;
      }
      return `<div class="sg-entry">
        <div class="sg-entry-hd">
          <span class="sg-who">${_sgName(e.by)}</span>
          <span class="sg-when" title="${w.abs} · ${w.hm}">${w.rel} · ${w.abs}${e.edited?' · editado':''}</span>
          <button class="sg-edit" onclick="editActivity(${id},'${e.id}')" title="Editar">✏</button>
          <button class="sg-del" onclick="delActivity(${id},'${e.id}')" title="Borrar nota">×</button>
        </div>
        <div class="sg-text">${esc(e.text)}</div>
      </div>`;
    }).join('')+`</div>`;
  }
  return html;
}
function editActivity(id,eid){
  sgEdit=eid;
  const a=ALL.find(x=>x.id===id), box=q('#dp-activity');
  if(box&&a){ box.innerHTML=activityHtml(a); const ta=q('#sg-edit-input'); if(ta){ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length);} }
}
function cancelEditActivity(id){
  sgEdit=null;
  const a=ALL.find(x=>x.id===id), box=q('#dp-activity');
  if(box&&a)box.innerHTML=activityHtml(a);
}
async function saveEditActivity(id,eid){
  const ta=q('#sg-edit-input'); const text=(ta&&ta.value||'').trim();
  if(!text){ if(ta)ta.focus(); return; }
  const a=ALL.find(x=>x.id===id); if(!a)return;
  const arr=Array.isArray(a.activity)?a.activity.slice():[];
  const e=arr.find(x=>x.id===eid); if(e){ e.text=text; e.edited=new Date().toISOString(); }
  a.activity=arr; sgEdit=null;
  const box=q('#dp-activity'); if(box)box.innerHTML=activityHtml(a);
  render();
  const {error}=await sb.from('placements').update({activity:arr}).eq('id',id);
  if(error)toast('No se pudo guardar la edición: '+error.message,'err'); else toast('Seguimiento actualizado ✓','ok');
}
async function addActivity(id){
  const el=q('#sg-input'); const text=(el&&el.value||'').trim();
  if(!text){ if(el)el.focus(); return; }
  const a=ALL.find(x=>x.id===id); if(!a)return;
  let by='';
  try{ const {data:{session}}=await sb.auth.getSession(); by=session&&session.user&&session.user.email||''; }catch(e){}
  const arr=Array.isArray(a.activity)?a.activity.slice():[];
  arr.push({id:'a_'+Math.random().toString(36).slice(2,9), ts:new Date().toISOString(), by, text});
  a.activity=arr;
  const box=q('#dp-activity'); if(box)box.innerHTML=activityHtml(a);
  render();
  const {error}=await sb.from('placements').update({activity:arr}).eq('id',id);
  if(error)toast('No se pudo guardar el seguimiento: '+error.message,'err'); else toast('Seguimiento registrado ✓','ok');
}
async function delActivity(id,eid){
  if(!confirm('¿Borrar esta nota de seguimiento?'))return;
  const a=ALL.find(x=>x.id===id); if(!a)return;
  const arr=(Array.isArray(a.activity)?a.activity:[]).filter(e=>e.id!==eid);
  a.activity=arr;
  const box=q('#dp-activity'); if(box)box.innerHTML=activityHtml(a);
  render();
  const {error}=await sb.from('placements').update({activity:arr}).eq('id',id);
  if(error)toast('No se pudo borrar','err');
}
/* ── RECRUITER (botones, sin escribir) ── */
const RECRUITERS=['Stefano Cano','Andrea Castillo','Julio Blanco','Otro'];
function recChips(cur,id){
  cur=(cur||'').trim();
  const known=RECRUITERS.includes(cur);
  let h=RECRUITERS.map(r=>`<button type="button" class="rec-chip${cur===r?' active':''}" onclick="assignRecruiter(${id},'${r.replace(/'/g,"\\'")}')">${esc(r)}</button>`).join('');
  if(cur&&!known) h+=`<button type="button" class="rec-chip active" onclick="assignRecruiterOtro(${id})">${esc(cur)}</button>`;
  if(cur) h+=`<button type="button" class="rec-chip clear" onclick="assignRecruiter(${id},'')" title="Quitar">×</button>`;
  return h;
}
function assignRecruiterOtro(id){ const raw=prompt('Nombre del recruiter:'); if(raw===null)return; assignRecruiter(id, raw.trim()); }
async function assignRecruiter(id,name){
  const a=ALL.find(x=>x.id===id); if(!a)return;
  a.working_with=name;
  const box=q('#dp-rec-chips'); if(box)box.innerHTML=recChips(name,id);
  render();
  const {error}=await sb.from('placements').update({working_with:name}).eq('id',id);
  if(error)toast('No se pudo asignar: '+error.message,'err'); else toast(name?`✓ Recruiter: ${name}`:'Recruiter quitado','ok');
}
async function saveNotas(id){
  const val=q('#dp-notas-ta')?.value||'';
  await sb.from('placements').update({notas:val}).eq('id',id);
  const a=ALL.find(x=>x.id===id);if(a)a.notas=val;
}
async function delAthlete(id){
  if(!confirm('¿Eliminar este atleta?'))return;
  const {error}=await sb.from('placements').delete().eq('id',id);
  if(!error){closeDP();await loadData();toast('Atleta eliminado','ok');}
  else toast('Error: '+error.message,'err');
}

/* MODAL */
function openModal(id, defaultStatus=null){
  editId=id;
  const a=id?ALL.find(x=>x.id===id):null;
  q('#m-ttl').textContent=a?'Editar Atleta':'Nuevo Atleta';

  // Reset / populate
  q('#m-nombre').value   = a?.nombre||'';
  setV('#m-deporte',     a?.deporte||'');
  q('#m-posicion').value = a?.posicion||'';
  q('#m-gpa').value      = a?.gpa||'';
  q('#m-dob').value      = a?.fecha_nacimiento||'';
  q('#m-team').value     = a?.current_team||'';
  q('#m-nac').value      = a?.nacionalidad||'';
  q('#m-profile').value  = a?.digital_profile||'';
  setV('#m-status',      a?.commit_status||(defaultStatus||'In Process'));
  setV('#m-prog',        a?.nvs_program||'Standard');
  setV('#m-tipo',        a?.tipo||'College Placement');
  setV('#m-budget',      a?.budget||'');
  q('#m-start').value    = a?.start_year||'';
  q('#m-end').value      = a?.target_end_year||'';
  q('#m-major').value    = a?.desired_major||'';
  q('#m-rec').value      = a?.working_with||'';
  q('#m-univs').value    = a?.universities_interested||'';
  q('#m-committed').value= a?.committed_university||'';
  setV('#m-fam',         a?.family_status||'');
  q('#m-notion').value   = a?.notion_url||'';
  q('#m-notas').value    = a?.notas||'';

  q('#m-ov').classList.add('open');q('#modal').classList.add('open');
  setTimeout(()=>q('#m-nombre').focus(),80);
}
function closeMod(){q('#m-ov').classList.remove('open');q('#modal').classList.remove('open');editId=null;}

async function saveAthlete(){
  const nombre=q('#m-nombre').value.trim();
  if(!nombre){toast('Ingresa el nombre del atleta','err');return;}
  const payload={
    nombre,
    deporte:               q('#m-deporte').value,
    posicion:              q('#m-posicion').value.trim(),
    gpa:                   q('#m-gpa').value.trim(),
    fecha_nacimiento:      q('#m-dob').value.trim(),
    current_team:          q('#m-team').value.trim(),
    nacionalidad:          q('#m-nac').value.trim(),
    digital_profile:       q('#m-profile').value.trim(),
    commit_status:         q('#m-status').value,
    nvs_program:           q('#m-prog').value,
    tipo:                  q('#m-tipo').value,
    budget:                q('#m-budget').value,
    start_year:            q('#m-start').value.trim(),
    target_end_year:       q('#m-end').value.trim(),
    desired_major:         q('#m-major').value.trim(),
    working_with:          q('#m-rec').value.trim(),
    universities_interested: q('#m-univs').value.trim(),
    committed_university:  q('#m-committed').value.trim(),
    family_status:         q('#m-fam').value,
    notion_url:            q('#m-notion').value.trim(),
    notas:                 q('#m-notas').value.trim(),
  };
  let error;
  if(editId){({error}=await sb.from('placements').update(payload).eq('id',editId));}
  else{({error}=await sb.from('placements').insert(payload));}
  if(error){toast('Error: '+error.message,'err');return;}
  closeMod();
  await loadData();
  if(editId) openDP(editId);
  toast(editId?'Atleta actualizado ✓':'Atleta agregado ✓','ok');
}

/* UTIL */
const q   = s=>document.querySelector(s);
const setV= (sel,v)=>{const e=q(sel);if(e)e.value=v;};
let _toastT=null;
function toast(msg,type='ok'){
  const el=q('#toast');el.textContent=msg;el.className='toast '+type+' show';
  clearTimeout(_toastT);_toastT=setTimeout(()=>el.classList.remove('show'),2600);
}
window.addEventListener('DOMContentLoaded',()=>{
  if(window.self!==window.top) document.body.classList.add('in-iframe');
  init();
});
</script>
