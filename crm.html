<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVS CRM — Atletas</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --green:#8AD500; --green-dim:rgba(138,213,0,0.1); --green-dark:#6aaa00;
  --bg:#0a0a0a; --sidebar:#0f0f0f; --card:#141414; --card2:#1a1a1a;
  --border:rgba(255,255,255,0.07); --text:#ffffff; --muted:#666; --muted2:#444;
}
body { font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }

/* SIDEBAR */
.sidebar { width:220px; min-height:100vh; background:var(--sidebar); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; z-index:50; padding:24px 0; }
.sb-logo { padding:0 20px 24px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.sb-logo-name { font-family:'Anton',sans-serif; font-size:28px; color:var(--green); letter-spacing:1px; }
.sb-logo-tag { display:inline-block; background:rgba(99,102,241,0.2); color:#818cf8; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; border-radius:4px; padding:2px 7px; margin-top:4px; }
.sb-nav { flex:1; padding:0 12px; }
.sb-item { display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:10px; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; margin-bottom:4px; border:none; background:none; width:100%; text-align:left; }
.sb-item:hover { background:var(--card2); color:#fff; }
.sb-item.active { background:var(--green-dim); color:var(--green); }
.sb-item-icon { font-size:16px; width:20px; text-align:center; }
.sb-footer { padding:0 12px; border-top:1px solid var(--border); padding-top:16px; margin-top:8px; }
.sb-footer a { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px; font-weight:600; text-decoration:none; padding:10px 12px; border-radius:10px; transition:all .15s; }
.sb-footer a:hover { color:#fff; background:var(--card2); }

/* MAIN */
.main { margin-left:220px; flex:1; min-height:100vh; display:flex; flex-direction:column; }
.topbar { padding:16px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:rgba(10,10,10,0.92); position:sticky; top:0; z-index:40; backdrop-filter:blur(10px); }
.topbar-left { display:flex; align-items:center; gap:12px; }
.topbar-title { font-family:'Anton',sans-serif; font-size:22px; letter-spacing:0.5px; }
.topbar-right { display:flex; gap:10px; align-items:center; }
.btn-primary { background:var(--green); color:#0a0a0a; border:none; border-radius:9px; padding:9px 18px; font-family:'Montserrat',sans-serif; font-weight:700; font-size:13px; cursor:pointer; transition:background .15s; white-space:nowrap; }
.btn-primary:hover { background:var(--green-dark); }
.btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:9px; padding:9px 16px; font-size:13px; font-family:'Montserrat',sans-serif; cursor:pointer; transition:all .15s; white-space:nowrap; }
.btn-ghost:hover { border-color:#444; color:#fff; }
.content { padding:24px 28px; flex:1; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:28px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
.stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-bottom:6px; }
.stat-val { font-family:'Anton',sans-serif; font-size:26px; }

/* PIPELINE */
.pipeline-wrap { overflow-x:auto; padding-bottom:12px; }
.pipeline-board { display:flex; gap:14px; min-width:max-content; }
.pipeline-col { width:230px; background:var(--card); border-radius:14px; overflow:hidden; flex-shrink:0; display:flex; flex-direction:column; }
.pipeline-col-header { padding:13px 14px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); }
.pipeline-col-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pipeline-col-name { font-weight:700; font-size:12px; }
.pipeline-col-count { background:rgba(255,255,255,0.07); color:var(--muted); font-size:10px; font-weight:700; padding:2px 8px; border-radius:99px; margin-left:auto; }
.pipeline-cards { padding:10px; display:flex; flex-direction:column; gap:8px; flex:1; min-height:60px; }
.pipeline-card { background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; cursor:pointer; transition:all .15s; }
.pipeline-card:hover { border-color:rgba(255,255,255,0.15); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,0.3); }
.pc-name { font-weight:700; font-size:13px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pc-sport { font-size:11px; color:var(--muted); margin-bottom:10px; }
.pc-footer { display:flex; align-items:center; justify-content:space-between; gap:6px; }
.svc-badge { font-size:9px; font-weight:800; padding:2px 7px; border-radius:99px; text-transform:uppercase; letter-spacing:0.5px; }
.svc-std  { background:rgba(138,213,0,0.12); color:#8AD500; }
.svc-prm  { background:rgba(99,102,241,0.18); color:#818cf8; }
.svc-trf  { background:rgba(245,158,11,0.15); color:#f59e0b; }
.pc-wa { width:26px; height:26px; background:rgba(37,211,102,0.12); border:none; border-radius:6px; color:#25d366; font-size:13px; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pc-wa:hover { background:rgba(37,211,102,0.25); }
.pipeline-empty { text-align:center; padding:24px 10px; color:#2a2a2a; font-size:12px; }

/* STAGE BADGE COLORS */
.stage-prospecto  { background:rgba(99,102,241,0.15); color:#818cf8; }
.stage-contactado { background:rgba(59,130,246,0.15); color:#60a5fa; }
.stage-propuesta  { background:rgba(245,158,11,0.15); color:#fbbf24; }
.stage-activo     { background:rgba(138,213,0,0.15);  color:#8AD500; }
.stage-pendiente  { background:rgba(249,115,22,0.15); color:#fb923c; }
.stage-cerrado    { background:rgba(107,114,128,0.15);color:#9ca3af; }

/* DIRECTORY */
.dir-toolbar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
.dir-search { flex:1; min-width:200px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:#fff; font-size:13px; font-family:'Montserrat',sans-serif; outline:none; transition:border .2s; }
.dir-search:focus { border-color:var(--green); }
.dir-filter { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:#fff; font-size:13px; font-family:'Montserrat',sans-serif; cursor:pointer; outline:none; }
.dir-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
.dir-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; cursor:pointer; transition:all .15s; }
.dir-card:hover { border-color:rgba(255,255,255,0.15); transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,0.3); }
.dc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
.dc-avatar { width:42px; height:42px; border-radius:11px; background:var(--green-dim); display:flex; align-items:center; justify-content:center; font-family:'Anton',sans-serif; font-size:17px; color:var(--green); flex-shrink:0; }
.dc-stage { font-size:10px; font-weight:700; padding:3px 9px; border-radius:99px; text-transform:uppercase; letter-spacing:0.5px; }
.dc-name { font-weight:700; font-size:15px; margin-bottom:3px; }
.dc-sport { font-size:12px; color:var(--muted); margin-bottom:12px; }
.dc-actions { display:flex; gap:6px; }
.dc-btn { flex:1; padding:7px 10px; border:1px solid var(--border); border-radius:8px; background:transparent; color:var(--muted); font-size:11px; font-family:'Montserrat',sans-serif; font-weight:600; cursor:pointer; transition:all .15s; }
.dc-btn:hover { border-color:#444; color:#fff; }
.dc-btn.wa { border-color:rgba(37,211,102,0.25); color:#25d366; }
.dc-btn.wa:hover { background:rgba(37,211,102,0.1); }

/* EMPTY */
.empty-state { text-align:center; padding:64px 20px; color:var(--muted); }
.empty-icon { font-size:52px; margin-bottom:14px; opacity:.3; }
.empty-label { font-size:14px; }

/* ATHLETE MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.82); display:none; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(5px); padding:20px; }
.modal-overlay.open { display:flex; }
.modal-box { background:#111; border:1px solid rgba(255,255,255,0.1); border-radius:20px; width:680px; max-width:100%; max-height:90vh; overflow:hidden; display:flex; flex-direction:column; }
.modal-head { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; flex-wrap:wrap; gap:10px; }
.modal-avatar { width:46px; height:46px; border-radius:12px; background:var(--green-dim); display:flex; align-items:center; justify-content:center; font-family:'Anton',sans-serif; font-size:18px; color:var(--green); flex-shrink:0; }
.modal-head-info { flex:1; min-width:120px; }
.modal-name { font-family:'Anton',sans-serif; font-size:19px; }
.modal-sub  { font-size:12px; color:var(--muted); margin-top:2px; }
.modal-head-btns { display:flex; gap:8px; flex-wrap:wrap; }
.modal-body { flex:1; overflow-y:auto; padding:22px 24px; display:grid; grid-template-columns:1fr 1fr; gap:22px; }
.msec-title { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; font-weight:700; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.mfield { margin-bottom:10px; }
.mfield label { display:block; font-size:10px; color:var(--muted); margin-bottom:4px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.mfield .val { font-size:13px; font-weight:600; color:#ddd; }
.mfield select { width:100%; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px; padding:9px 12px; color:#fff; font-size:13px; font-family:'Montserrat',sans-serif; outline:none; cursor:pointer; transition:border .2s; }
.mfield select:focus { border-color:var(--green); }

/* ACTIVITY */
.act-section { grid-column:1/-1; padding-top:4px; }
.act-add { display:flex; gap:8px; margin-bottom:12px; }
.act-add-sel { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px; padding:9px 10px; color:#fff; font-size:12px; font-family:'Montserrat',sans-serif; cursor:pointer; outline:none; flex-shrink:0; }
.act-add-input { flex:1; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px; padding:9px 12px; color:#fff; font-size:13px; font-family:'Montserrat',sans-serif; outline:none; transition:border .2s; }
.act-add-input:focus { border-color:var(--green); }
.act-list { display:flex; flex-direction:column; gap:7px; max-height:180px; overflow-y:auto; }
.act-item { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; background:var(--card2); border-radius:8px; }
.act-icon { font-size:15px; flex-shrink:0; padding-top:1px; }
.act-body { flex:1; min-width:0; }
.act-desc { font-size:13px; margin-bottom:2px; }
.act-meta { font-size:11px; color:var(--muted); }
.act-del { background:none; border:none; color:#2a2a2a; font-size:13px; cursor:pointer; padding:2px 4px; transition:color .15s; flex-shrink:0; }
.act-del:hover { color:#e53e3e; }
.act-empty { text-align:center; padding:20px; color:var(--muted2); font-size:13px; }

/* ADD PROSPECT MODAL */
.form-grid { padding:22px 24px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-grid .full { grid-column:1/-1; }
.flabel { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:700; display:block; margin-bottom:5px; }
.finput { width:100%; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:9px; padding:10px 13px; color:#fff; font-size:13px; font-family:'Montserrat',sans-serif; outline:none; transition:border .2s; }
.finput:focus { border-color:var(--green); }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }

/* MOBILE */
@media (max-width:768px) {
  .sidebar { display:none; }
  .main { margin-left:0; padding-bottom:80px; }
  .content { padding:14px 14px; }
  .topbar { padding:12px 14px; }
  .topbar-title { font-size:18px; }
  .stats-row { grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:18px; }
  .stat-card { padding:12px 12px; }
  .stat-val { font-size:22px; }
  .stat-label { font-size:9px; }
  .pipeline-col { width:195px; }
  .dir-grid { grid-template-columns:1fr; }
  .modal-body { grid-template-columns:1fr; }
  .form-grid { grid-template-columns:1fr; }
  .modal-box { border-radius:20px 20px 0 0; max-height:92vh; width:100%; }
  .modal-overlay { align-items:flex-end; padding:0; }
  .mobile-nav { display:flex !important; }
}
.mobile-nav {
  display:none; position:fixed; bottom:0; left:0; right:0;
  background:#111; border-top:1px solid var(--border);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index:100; justify-content:space-around; align-items:center;
}
.mnav-item { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--muted); font-size:9px; font-family:'Montserrat',sans-serif; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; cursor:pointer; padding:0 14px; -webkit-tap-highlight-color:transparent; }
.mnav-item svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.8; }
.mnav-item.active { color:var(--green); }
.mnav-fab { background:var(--green); border-radius:50%; width:52px; height:52px; color:#0a0a0a; font-size:26px; font-weight:300; box-shadow:0 4px 18px rgba(138,213,0,0.35); padding:0; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-name">NVS</div>
    <div class="sb-logo-tag">CRM Atletas</div>
  </div>
  <div class="sb-nav">
    <button class="sb-item active" id="nav-pipeline" onclick="showView('pipeline')">
      <span class="sb-item-icon">⚡</span> Pipeline
    </button>
    <button class="sb-item" id="nav-directorio" onclick="showView('directorio')">
      <span class="sb-item-icon">📋</span> Directorio
    </button>
  </div>
  <div class="sb-footer">
    <a href="index.html">← Volver al Hub</a>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="view-title">Pipeline</div>
    </div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openAddProspect()">+ Prospecto</button>
    </div>
  </div>

  <div class="content">
    <!-- Stats strip -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total atletas</div><div class="stat-val" id="s-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Activos</div><div class="stat-val" id="s-activos" style="color:var(--green)">—</div></div>
      <div class="stat-card"><div class="stat-label">Prospectos</div><div class="stat-val" id="s-prospectos" style="color:#818cf8">—</div></div>
      <div class="stat-card"><div class="stat-label">Pendientes</div><div class="stat-val" id="s-pendientes" style="color:#fb923c">—</div></div>
      <div class="stat-card"><div class="stat-label">Cerrados</div><div class="stat-val" id="s-cerrados" style="color:#555">—</div></div>
    </div>

    <!-- Pipeline view -->
    <div id="view-pipeline">
      <div class="pipeline-wrap">
        <div class="pipeline-board" id="pipeline-board">
          <div style="color:var(--muted);padding:40px;font-size:13px">Cargando pipeline…</div>
        </div>
      </div>
    </div>

    <!-- Directorio view -->
    <div id="view-directorio" style="display:none">
      <div class="dir-toolbar">
        <input class="dir-search" id="dir-q" placeholder="🔍  Buscar por nombre o deporte…" oninput="renderDirectory()">
        <select class="dir-filter" id="dir-sport" onchange="renderDirectory()">
          <option value="">Todos los deportes</option>
        </select>
        <select class="dir-filter" id="dir-stage" onchange="renderDirectory()">
          <option value="">Todos los estados</option>
          <option>Prospecto</option><option>Contactado</option><option>Propuesta</option>
          <option>Activo</option><option>Pendiente</option><option>Cerrado</option>
        </select>
      </div>
      <div class="dir-grid" id="dir-grid"></div>
    </div>
  </div>
</div>

<!-- ATHLETE MODAL -->
<div class="modal-overlay" id="athlete-modal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-avatar" id="m-av">—</div>
      <div class="modal-head-info">
        <div class="modal-name" id="m-name">—</div>
        <div class="modal-sub"  id="m-sub">—</div>
      </div>
      <div class="modal-head-btns">
        <button class="btn-ghost" id="m-wa" onclick="waCurrentAtleta()" style="display:none">💬 WA</button>
        <button class="btn-primary" onclick="saveStage()">Guardar etapa</button>
        <button class="btn-ghost" onclick="closeAthleteModal()" style="padding:9px 12px">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div>
        <div class="msec-title">Información</div>
        <div class="mfield">
          <label>Etapa del pipeline</label>
          <select id="m-stage">
            <option value="Prospecto">🔍 Prospecto</option>
            <option value="Contactado">📞 Contactado</option>
            <option value="Propuesta">📋 Propuesta</option>
            <option value="Activo">⚡ Activo</option>
            <option value="Pendiente">⏳ Pendiente</option>
            <option value="Cerrado">🔒 Cerrado</option>
          </select>
        </div>
        <div class="mfield"><label>Deporte</label><div class="val" id="m-deporte">—</div></div>
        <div class="mfield"><label>Servicio</label><div class="val" id="m-servicio">—</div></div>
        <div class="mfield"><label>WhatsApp</label><div class="val" id="m-whatsapp">—</div></div>
        <div class="mfield"><label>Referido por</label><div class="val" id="m-referido">—</div></div>
        <div class="mfield"><label>Notas</label><div class="val" id="m-notas" style="font-size:12px;color:#999;line-height:1.5">—</div></div>
      </div>
      <div>
        <div class="msec-title">Contrato</div>
        <div class="mfield"><label>Total contrato</label><div class="val" id="m-total">—</div></div>
        <div class="mfield"><label>Cuota</label><div class="val" id="m-cuota">—</div></div>
        <div class="mfield"><label>Pagos realizados</label><div class="val" id="m-pagos">—</div></div>
        <div class="mfield"><label>Tipo de pago</label><div class="val" id="m-tipopago">—</div></div>
        <div class="mfield"><label>Deudor legal</label><div class="val" id="m-deudor">—</div></div>
      </div>

      <!-- Activity log -->
      <div class="act-section">
        <div class="msec-title">Actividad <span id="act-count" style="color:var(--muted);font-weight:400;font-size:10px;text-transform:none;letter-spacing:0"></span></div>
        <div class="act-add">
          <select class="act-add-sel" id="act-tipo">
            <option value="Nota">📝 Nota</option>
            <option value="Llamada">📞 Llamada</option>
            <option value="Reunión">🤝 Reunión</option>
            <option value="WhatsApp">💬 WhatsApp</option>
            <option value="Contrato">📋 Contrato</option>
          </select>
          <input class="act-add-input" id="act-desc" placeholder="Registrar actividad…" onkeydown="if(event.key==='Enter')addActivity()">
          <button class="btn-primary" onclick="addActivity()">+</button>
        </div>
        <div class="act-list" id="act-list">
          <div class="act-empty">Sin actividad registrada.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD PROSPECT MODAL -->
<div class="modal-overlay" id="prospect-modal">
  <div class="modal-box" style="max-width:520px">
    <div class="modal-head">
      <div style="font-family:'Anton',sans-serif;font-size:20px;flex:1">Nuevo Prospecto</div>
      <button class="btn-ghost" onclick="closeAddProspect()" style="padding:9px 12px">✕</button>
    </div>
    <div class="form-grid">
      <div><label class="flabel">Nombre completo *</label><input class="finput" id="p-nombre" placeholder="Nombre del atleta"></div>
      <div><label class="flabel">Deporte</label><input class="finput" id="p-deporte" placeholder="Fútbol, Básquet…"></div>
      <div><label class="flabel">WhatsApp</label><input class="finput" id="p-whatsapp" placeholder="+507 6000-0000"></div>
      <div><label class="flabel">Referido por</label><input class="finput" id="p-referido" placeholder=""></div>
      <div>
        <label class="flabel">Etapa</label>
        <select class="finput" id="p-stage">
          <option value="Prospecto">🔍 Prospecto</option>
          <option value="Contactado">📞 Contactado</option>
          <option value="Propuesta">📋 Propuesta</option>
        </select>
      </div>
      <div>
        <label class="flabel">Servicio</label>
        <select class="finput" id="p-servicio">
          <option value="ESTANDAR">Estándar</option>
          <option value="PREMIUM">Premium</option>
          <option value="TRANSFER">Transfer</option>
        </select>
      </div>
      <div class="full"><label class="flabel">Notas</label><textarea class="finput" id="p-notas" rows="2" placeholder="Primera impresión, origen del contacto…" style="resize:vertical"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeAddProspect()">Cancelar</button>
      <button class="btn-primary" onclick="saveProspect()">Crear prospecto</button>
    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<nav class="mobile-nav" id="mobile-nav">
  <button class="mnav-item active" id="mnav-pipeline" onclick="showView('pipeline')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="18" rx="1.5"/><rect x="10" y="7" width="5" height="14" rx="1.5"/><rect x="17" y="10" width="4" height="11" rx="1.5"/></svg>
    Pipeline
  </button>
  <button class="mnav-item mnav-fab" onclick="openAddProspect()">+</button>
  <button class="mnav-item" id="mnav-directorio" onclick="showView('directorio')">
    <svg viewBox="0 0 24 24"><path d="M9 6h11M9 12h11M9 18h11M4.5 6v.01M4.5 12v.01M4.5 18v.01" stroke-linecap="round"/></svg>
    Directorio
  </button>
</nav>

<script>
const SUPABASE_URL      = 'https://mwefvjvvitsondqghgsx.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GuFFI-viJquULQCSY_Bd6Q_WoLf0cZk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STAGES = [
  { key:'Prospecto',  label:'Prospecto',  dot:'#818cf8' },
  { key:'Contactado', label:'Contactado', dot:'#60a5fa' },
  { key:'Propuesta',  label:'Propuesta',  dot:'#fbbf24' },
  { key:'Activo',     label:'Activo',     dot:'#8AD500' },
  { key:'Pendiente',  label:'Pendiente',  dot:'#fb923c' },
  { key:'Cerrado',    label:'Cerrado',    dot:'#6b7280' },
];
const TIPO_ICON = { Nota:'📝', Llamada:'📞', Reunión:'🤝', WhatsApp:'💬', Contrato:'📋' };

let atletasData = [];
let currentAtleta = null;
let currentActs = [];

/* ── INIT ── */
async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  if(!session) { window.location.href='index.html'; return; }
  await loadAtletas();
  renderAll();
}

async function loadAtletas() {
  const { data } = await sb.from('atletas').select('*').order('nombre');
  atletasData = (data||[]).map(mapA);
}

function mapA(r) {
  return {
    id:r.id, nombre:r.nombre||'', deporte:r.deporte||'',
    servicio:r.servicio||'ESTANDAR', tipoPago:r.tipo_pago||'',
    total:r.total||0, pago:r.pago||0, pagosHechos:r.pagos_hechos||'',
    estado:r.estado||'Activo', referido:r.referido||'',
    deudor:r.deudor||'', whatsapp:r.whatsapp||'', notas:r.notas||''
  };
}

/* ── RENDER ALL ── */
function renderAll() { renderStats(); renderPipeline(); renderDirectory(); populateSports(); }

function renderStats() {
  document.getElementById('s-total').textContent      = atletasData.length;
  document.getElementById('s-activos').textContent    = atletasData.filter(a=>a.estado==='Activo').length;
  document.getElementById('s-prospectos').textContent = atletasData.filter(a=>['Prospecto','Contactado','Propuesta'].includes(a.estado)).length;
  document.getElementById('s-pendientes').textContent = atletasData.filter(a=>a.estado==='Pendiente').length;
  document.getElementById('s-cerrados').textContent   = atletasData.filter(a=>a.estado==='Cerrado').length;
}

function renderPipeline() {
  const board = document.getElementById('pipeline-board');
  board.innerHTML = STAGES.map(s => {
    const cards = atletasData.filter(a => a.estado === s.key);
    return `<div class="pipeline-col">
      <div class="pipeline-col-header">
        <div class="pipeline-col-dot" style="background:${s.dot}"></div>
        <div class="pipeline-col-name">${s.label}</div>
        <div class="pipeline-col-count">${cards.length}</div>
      </div>
      <div class="pipeline-cards">
        ${cards.length===0
          ? '<div class="pipeline-empty">—</div>'
          : cards.map(a=>`
          <div class="pipeline-card" onclick="openAthlete(${a.id})">
            <div class="pc-name">${esc(a.nombre)}</div>
            <div class="pc-sport">${esc(a.deporte)||'Sin deporte'}</div>
            <div class="pc-footer">
              <span class="svc-badge ${svcCls(a.servicio)}">${a.servicio}</span>
              ${a.whatsapp&&a.whatsapp!=='—'?`<button class="pc-wa" onclick="event.stopPropagation();waOpen('${esc(a.whatsapp)}')">💬</button>`:''}
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderDirectory() {
  const q     = (document.getElementById('dir-q').value||'').toLowerCase();
  const sport = document.getElementById('dir-sport').value;
  const stage = document.getElementById('dir-stage').value;
  let list = atletasData;
  if(q)     list = list.filter(a=>(a.nombre+a.deporte).toLowerCase().includes(q));
  if(sport) list = list.filter(a=>a.deporte===sport);
  if(stage) list = list.filter(a=>a.estado===stage);
  const grid = document.getElementById('dir-grid');
  if(!list.length) { grid.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-label">Sin resultados</div></div>'; return; }
  grid.innerHTML = list.map(a=>`
    <div class="dir-card" onclick="openAthlete(${a.id})">
      <div class="dc-top">
        <div class="dc-avatar">${initials(a.nombre)}</div>
        <span class="dc-stage ${stageCls(a.estado)}">${a.estado}</span>
      </div>
      <div class="dc-name">${esc(a.nombre)}</div>
      <div class="dc-sport">${esc(a.deporte)||'Sin deporte'}</div>
      <div class="dc-actions">
        ${a.whatsapp&&a.whatsapp!=='—'?`<button class="dc-btn wa" onclick="event.stopPropagation();waOpen('${esc(a.whatsapp)}')">💬 WhatsApp</button>`:''}
        <button class="dc-btn" onclick="event.stopPropagation();openAthlete(${a.id})">Ver perfil</button>
      </div>
    </div>`).join('');
}

function populateSports() {
  const sports = [...new Set(atletasData.map(a=>a.deporte).filter(Boolean))].sort();
  const sel = document.getElementById('dir-sport');
  while(sel.options.length>1) sel.remove(1);
  sports.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
}

/* ── VIEWS ── */
function showView(v) {
  ['pipeline','directorio'].forEach(t=>{
    document.getElementById('view-'+t).style.display = t===v?'':'none';
    document.getElementById('nav-'+t).classList.toggle('active',t===v);
    const mn=document.getElementById('mnav-'+t); if(mn) mn.classList.toggle('active',t===v);
  });
  document.getElementById('view-title').textContent = v==='pipeline'?'Pipeline':'Directorio';
}

/* ── ATHLETE MODAL ── */
async function openAthlete(id) {
  currentAtleta = atletasData.find(a=>a.id===id); if(!currentAtleta) return;
  const a = currentAtleta;
  document.getElementById('m-av').textContent       = initials(a.nombre);
  document.getElementById('m-name').textContent     = a.nombre;
  document.getElementById('m-sub').textContent      = (a.deporte||'Sin deporte')+' · '+a.servicio;
  document.getElementById('m-stage').value          = a.estado;
  document.getElementById('m-deporte').textContent  = a.deporte||'—';
  document.getElementById('m-servicio').textContent = a.servicio;
  document.getElementById('m-whatsapp').textContent = a.whatsapp||'—';
  document.getElementById('m-referido').textContent = a.referido||'—';
  document.getElementById('m-notas').textContent    = a.notas||'—';
  document.getElementById('m-total').textContent    = fmtM(a.total);
  document.getElementById('m-cuota').textContent    = fmtM(a.pago);
  document.getElementById('m-pagos').textContent    = a.pagosHechos||'—';
  document.getElementById('m-tipopago').textContent = a.tipoPago||'—';
  document.getElementById('m-deudor').textContent   = a.deudor||'—';
  document.getElementById('m-wa').style.display     = a.whatsapp&&a.whatsapp!=='—'?'':'none';
  document.getElementById('act-desc').value         = '';
  await loadActs(id);
  document.getElementById('athlete-modal').classList.add('open');
}

function closeAthleteModal() { document.getElementById('athlete-modal').classList.remove('open'); currentAtleta=null; }

async function saveStage() {
  if(!currentAtleta) return;
  const estado = document.getElementById('m-stage').value;
  const { error } = await sb.from('atletas').update({ estado }).eq('id', currentAtleta.id);
  if(!error) {
    atletasData.find(a=>a.id===currentAtleta.id).estado = estado;
    renderAll(); closeAthleteModal();
  }
}

function waCurrentAtleta() { if(currentAtleta) waOpen(currentAtleta.whatsapp); }

/* ── ACTIVITIES ── */
async function loadActs(atletaId) {
  try {
    const { data } = await sb.from('actividades').select('*').eq('atleta_id', atletaId).order('created_at',{ascending:false});
    currentActs = data||[];
  } catch(e) { currentActs=[]; }
  renderActs();
}

function renderActs() {
  const list = document.getElementById('act-list');
  document.getElementById('act-count').textContent = currentActs.length ? `(${currentActs.length})` : '';
  if(!currentActs.length) { list.innerHTML='<div class="act-empty">Sin actividad registrada aún.</div>'; return; }
  list.innerHTML = currentActs.map(a=>`
    <div class="act-item">
      <div class="act-icon">${TIPO_ICON[a.tipo]||'📝'}</div>
      <div class="act-body">
        <div class="act-desc">${esc(a.descripcion)}</div>
        <div class="act-meta">${a.tipo} · ${fmtDate(a.fecha)}</div>
      </div>
      <button class="act-del" onclick="deleteAct(${a.id})" title="Eliminar">✕</button>
    </div>`).join('');
}

async function addActivity() {
  if(!currentAtleta) return;
  const desc = document.getElementById('act-desc').value.trim();
  if(!desc) return;
  const tipo = document.getElementById('act-tipo').value;
  try {
    const { data, error } = await sb.from('actividades').insert({ atleta_id:currentAtleta.id, tipo, descripcion:desc, fecha:new Date().toISOString().slice(0,10) }).select().single();
    if(!error&&data) { currentActs.unshift(data); renderActs(); document.getElementById('act-desc').value=''; }
  } catch(e) { alert('Activa la tabla actividades en Supabase para usar esta función.'); }
}

async function deleteAct(id) {
  await sb.from('actividades').delete().eq('id',id);
  currentActs = currentActs.filter(a=>a.id!==id);
  renderActs();
}

/* ── ADD PROSPECT ── */
function openAddProspect()  { document.getElementById('prospect-modal').classList.add('open'); }
function closeAddProspect() { document.getElementById('prospect-modal').classList.remove('open'); }

async function saveProspect() {
  const nombre = document.getElementById('p-nombre').value.trim();
  if(!nombre) { alert('El nombre es obligatorio'); return; }
  const row = {
    id: Date.now(), nombre,
    deporte:  document.getElementById('p-deporte').value.trim(),
    whatsapp: document.getElementById('p-whatsapp').value.trim(),
    referido: document.getElementById('p-referido').value.trim(),
    estado:   document.getElementById('p-stage').value,
    servicio: document.getElementById('p-servicio').value,
    notas:    document.getElementById('p-notas').value.trim(),
    total:0, pago:0, pagos_hechos:'', tipo_pago:'', deudor:''
  };
  const { error } = await sb.from('atletas').insert(row);
  if(!error) {
    await loadAtletas(); renderAll(); closeAddProspect();
    ['p-nombre','p-deporte','p-whatsapp','p-referido','p-notas'].forEach(i=>document.getElementById(i).value='');
  } else { alert('Error: '+error.message); }
}

/* ── HELPERS ── */
function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(n){ return (n||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?'; }
function fmtM(n)  { return n?'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'—'; }
function fmtDate(d){ if(!d)return'—'; try{ return new Date(d+'T12:00:00').toLocaleDateString('es-PA',{day:'2-digit',month:'short',year:'numeric'}); }catch{ return d; } }
function svcCls(s){ return s==='PREMIUM'?'svc-prm':s==='TRANSFER'?'svc-trf':'svc-std'; }
function stageCls(s){ return 'stage-'+(s||'activo').toLowerCase(); }
function waOpen(wa){ const n=String(wa||'').replace(/[^0-9]/g,''); if(n) window.open('https://wa.me/'+n,'_blank'); }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
