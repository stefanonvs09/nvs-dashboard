<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVS · Pagos</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#AAFF00;--green-bg:rgba(170,255,0,0.10);--green-dk:#88CC00;
  --bg:#f8fafc;--sb:#ffffff;--card:#ffffff;--card2:#f1f5f9;--card3:#e2e8f0;
  --b:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.14);
  --txt:#0f172a;--m:#64748b;--m2:#94a3b8;--m3:#334155;
  --red:#dc2626;--red-bg:rgba(220,38,38,0.08);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,0.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.08);
  --purple:#7c3aed;--teal:#0d9488;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);display:flex;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px;}

/* ── LOGIN ── */
#login-ov{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.lbox{width:360px;background:#fff;border:1px solid var(--b);border-radius:20px;padding:44px 40px;box-shadow:0 8px 40px rgba(0,0,0,0.08);}
.lbox-logo{font-family:'Anton',sans-serif;font-size:52px;text-align:center;letter-spacing:2px;color:#0f172a;}
.lbox-logo span{color:var(--green);}
.lbox-sub{text-align:center;font-size:9px;letter-spacing:3px;color:var(--m);text-transform:uppercase;margin-bottom:32px;margin-top:4px;}
.lbox-err{color:var(--red);font-size:11px;text-align:center;min-height:16px;margin-bottom:6px;}
.lf{margin-bottom:12px;}
.lf label{display:block;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--m);text-transform:uppercase;margin-bottom:5px;}
.fi{width:100%;background:var(--card2);border:1px solid var(--b);border-radius:10px;color:var(--txt);font-family:'Inter',sans-serif;font-size:13px;padding:11px 14px;outline:none;transition:border .15s,background .15s;}
.fi:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(170,255,0,0.10);}
.btn-g{background:var(--green);color:#000;border:none;border-radius:11px;padding:13px;width:100%;font-family:'Inter',sans-serif;font-weight:800;font-size:14px;cursor:pointer;margin-top:8px;transition:background .2s;}
.btn-g:hover{background:var(--green-dk);}

/* ── APP SHELL ── */
.app{display:flex;width:100%;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--b);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.sb-top{padding:22px 18px 18px;border-bottom:1px solid var(--b);}
.sb-logo{font-family:'Anton',sans-serif;font-size:32px;letter-spacing:1px;color:#0f172a;}
.sb-logo span{color:var(--green);}
.sb-tag{display:block;font-size:8px;font-weight:700;letter-spacing:2.5px;color:var(--m);text-transform:uppercase;margin-top:4px;}
.sb-body{flex:1;overflow-y:auto;padding:16px 12px;}
.sb-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--m2);text-transform:uppercase;padding:0 8px;margin:18px 0 8px;}
.sb-lbl:first-child{margin-top:0;}
.sb-nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;color:var(--m3);text-decoration:none;transition:all .15s;margin-bottom:2px;}
.sb-nav a:hover{background:rgba(0,0,0,0.04);color:var(--txt);}
.sb-nav a.active{background:var(--green-bg);color:#0f172a;box-shadow:inset 0 0 0 1px rgba(170,255,0,0.2);}
.sb-nav a svg{width:15px;height:15px;flex-shrink:0;opacity:.7;}
.sb-foot{padding:14px 18px;border-top:1px solid var(--b);}
.sb-foot a{color:var(--m);font-size:11px;font-weight:700;text-decoration:none;transition:color .15s;}
.sb-foot a:hover{color:var(--txt);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}
.topbar{background:#fff;border-bottom:1px solid var(--b);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 0 rgba(0,0,0,0.04);}
.topbar-left h2{font-family:'Anton',sans-serif;font-size:22px;font-weight:400;letter-spacing:.5px;color:#0f172a;}
.topbar-left .sub{font-size:11px;color:var(--m);margin-top:2px;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.content{flex:1;overflow-y:auto;padding:28px 28px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif;}
.btn-primary{background:var(--green);color:#000;}
.btn-primary:hover{background:var(--green-dk);}
.btn-outline{background:#fff;border:1px solid var(--b);color:var(--m3);}
.btn-outline:hover{border-color:var(--b2);color:var(--txt);}
.btn-sm{padding:6px 13px;font-size:12px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;border:1px solid var(--b);border-radius:12px;padding:10px 22px;font-size:12px;font-weight:700;z-index:999;transition:transform .28s cubic-bezier(.34,1.5,.64,1);white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.10);color:var(--txt);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{color:#3a6b00;}
.toast.err{color:var(--red);}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--m);}
.empty-state .icon{font-size:48px;opacity:.4;}
.empty-state h3{font-family:'Anton',sans-serif;font-size:22px;font-weight:400;color:var(--m2);letter-spacing:.5px;}
.empty-state p{font-size:13px;color:var(--m2);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-ov">
  <div class="lbox">
    <div class="lbox-logo">NV<span>S</span></div>
    <div class="lbox-sub">Módulo de Pagos</div>
    <div class="lbox-err" id="l-err"></div>
    <div class="lf"><label>Email</label><input class="fi" id="l-em" type="email" placeholder="tu@email.com" autocomplete="email"></div>
    <div class="lf"><label>Contraseña</label><input class="fi" id="l-pw" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-g" onclick="doLogin()">ENTRAR</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-logo">NV<span>S</span></div>
      <span class="sb-tag">Módulo de Pagos</span>
    </div>
    <div class="sb-body">
      <div class="sb-lbl">Secciones</div>
      <nav class="sb-nav">
        <a class="active" onclick="showTab('proveedores')" id="nav-proveedores">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
          Proveedores
        </a>
        <a onclick="showTab('payroll')" id="nav-payroll">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Payroll
        </a>
      </nav>
    </div>
    <div class="sb-foot">
      <a href="index.html">← Volver al Hub</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h2 id="page-title">Proveedores</h2>
        <div class="sub" id="page-sub">Pagos a proveedores</div>
      </div>
      <div class="topbar-right">
        <a href="index.html" class="btn btn-outline btn-sm" style="text-decoration:none">⌂ Hub</a>
        <button class="btn btn-primary" id="btn-add" onclick="openAdd()">+ Nuevo Pago</button>
      </div>
    </div>

    <div class="content">
      <div id="tab-proveedores">
        <div class="empty-state">
          <div class="icon">🏢</div>
          <h3>Proveedores</h3>
          <p>Aquí irán los pagos a proveedores</p>
        </div>
      </div>
      <div id="tab-payroll" style="display:none">
        <div class="empty-state">
          <div class="icon">👥</div>
          <h3>Payroll</h3>
          <p>Aquí irá el pago al equipo</p>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://mwefvjvvitsondqghgsx.supabase.co';
const SUPA_KEY='sb_publishable_GuFFI-viJquULQCSY_Bd6Q_WoLf0cZk';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
const q=s=>document.querySelector(s);

/* LOGIN */
async function doLogin(){
  q('#l-err').textContent='';
  const {error}=await sb.auth.signInWithPassword({email:q('#l-em').value.trim(),password:q('#l-pw').value});
  if(error){q('#l-err').textContent=error.message;}
  else{q('#login-ov').style.display='none';q('#app').style.display='flex';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&q('#login-ov').style.display!=='none')doLogin();});

/* TABS */
function showTab(t){
  ['proveedores','payroll'].forEach(id=>{
    q('#tab-'+id).style.display=id===t?'block':'none';
    q('#nav-'+id)?.classList.toggle('active',id===t);
  });
  const titles={proveedores:['Proveedores','Pagos a proveedores'],payroll:['Payroll','Pagos al equipo']};
  q('#page-title').textContent=titles[t][0];
  q('#page-sub').textContent=titles[t][1];
}

/* PLACEHOLDER */
function openAdd(){toast('Próximamente','ok');}

/* TOAST */
function toast(msg,type='ok'){
  const t=q('#toast');t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(()=>t.classList.remove('show'),2800);
}

/* INIT */
sb.auth.getSession().then(({data:{session}})=>{
  if(session){q('#login-ov').style.display='none';q('#app').style.display='flex';}
});
</script>
</body>
</html>
