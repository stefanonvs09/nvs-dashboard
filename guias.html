<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVS · Guías</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#AAFF00;--green-dim:rgba(170,255,0,0.12);--green-dk:#88CC00;
  --bg:#f8fafc;--card:#fff;--card2:#f1f5f9;--border:rgba(0,0,0,0.08);
  --muted:#64748b;--txt:#0f172a;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#login-overlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 15% 50%,rgba(170,255,0,.06) 0%,transparent 60%);}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);}
.login-box{position:relative;z-index:1;width:360px;max-width:92vw;animation:fadeUp .5s both;}
.login-logo-wrap{text-align:center;margin-bottom:28px;}
.login-logo{font-family:'Anton',sans-serif;font-size:56px;color:#0f172a;letter-spacing:3px;}
.login-logo span{color:var(--green);}
.login-sub{font-size:10px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-top:6px;}
.login-card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:18px;padding:26px 22px;box-shadow:0 4px 20px rgba(0,0,0,.06);}
.lf{width:100%;background:#f8fafc;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:12px 14px;color:var(--txt);font-size:13px;font-family:'Inter',sans-serif;margin-bottom:10px;outline:none;transition:border .2s;}
.lf:focus{border-color:var(--green);background:#fff;}
.lf::placeholder{color:#94a3b8;}
.login-btn{width:100%;background:var(--green);color:#0f172a;border:none;border-radius:10px;padding:13px;font-family:'Anton',sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer;margin-top:4px;transition:background .2s;}
.login-btn:hover{background:var(--green-dk);}
.login-error{color:#dc2626;font-size:12px;margin-top:8px;min-height:14px;text-align:center;font-weight:600;}
.login-spinner{width:16px;height:16px;border:2px solid rgba(15,23,42,.15);border-top-color:#0f172a;border-radius:50%;animation:spin .7s linear infinite;display:none;margin:8px auto 0;}

/* SHELL */
#app{display:none;height:100vh;flex-direction:column;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:52px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;z-index:50;}
.tb-left{display:flex;align-items:center;gap:9px;}
.tb-back{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;padding:5px 9px;border-radius:7px;transition:all .15s;text-decoration:none;}
.tb-back:hover{background:var(--card2);color:var(--txt);}
.tb-divider{width:1px;height:16px;background:var(--border);}
.tb-title{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:.5px;}
.tb-title span{color:var(--green);}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-user{display:flex;align-items:center;gap:7px;padding:5px 11px;background:var(--card2);border:1px solid var(--border);border-radius:99px;}
.tb-avatar{width:20px;height:20px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#3a6b00;}
.tb-uname{font-size:11px;font-weight:600;color:var(--txt);}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:5px 12px;font-size:11px;cursor:pointer;transition:all .15s;font-weight:600;font-family:'Inter',sans-serif;}
.btn-logout:hover{border-color:rgba(0,0,0,.18);color:var(--txt);}

/* SPLIT */
.split{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:230px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid var(--border);}
.sb-head-title{font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.3px;margin-bottom:2px;}
.sb-head-sub{font-size:10px;color:var(--muted);}
.sb-cats{flex:1;overflow-y:auto;padding:8px;}
.sb-cat-lbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;padding:10px 8px 6px;}
.sb-cat-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:all .14s;font-size:12px;font-weight:600;color:var(--muted);border:1px solid transparent;margin-bottom:1px;}
.sb-cat-item:hover{background:var(--card2);color:var(--txt);}
.sb-cat-item.active{background:var(--green-dim);color:#3a6b00;border-color:rgba(170,255,0,.25);}
.sb-cat-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.sb-cat-badge{margin-left:auto;font-size:9px;font-weight:800;background:rgba(170,255,0,.2);color:#3a6b00;padding:2px 6px;border-radius:99px;}

/* MAIN */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.main-head{padding:18px 28px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:#fff;}
.main-head-row{display:flex;align-items:center;justify-content:space-between;}
.main-head-title{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:.3px;}
.main-head-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.guides-wrap{flex:1;overflow-y:auto;padding:24px 28px 48px;}

/* EMPTY STATE */
.guides-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:80px 20px;color:#94a3b8;animation:fadeIn .3s both;}
.guides-empty-icon{font-size:48px;opacity:.3;}
.guides-empty-title{font-size:14px;font-weight:700;color:#cbd5e1;}
.guides-empty-sub{font-size:12px;color:#cbd5e1;text-align:center;max-width:260px;line-height:1.6;}
.guides-empty-badge{background:var(--green-dim);color:#3a6b00;border-radius:99px;padding:5px 14px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}

/* ── GUIDE CARD ── */
.guide-card{background:#fff;border:1px solid var(--border);border-radius:16px;margin-bottom:20px;overflow:hidden;animation:fadeUp .3s both;}
.guide-card-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;}
.guide-card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.guide-card-title{font-family:'Anton',sans-serif;font-size:19px;letter-spacing:.3px;margin-bottom:4px;}
.guide-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.guide-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;}

/* STEPS */
.guide-body{padding:20px 24px;}
.steps-title{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;margin-bottom:14px;}
.step-item{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start;}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--green-dim);color:#3a6b00;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;border:1px solid rgba(170,255,0,.3);}
.step-num.active{background:var(--green);color:#0f172a;}
.step-content{flex:1;}
.step-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:3px;}
.step-desc{font-size:12px;color:var(--muted);line-height:1.6;}
.step-link{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;font-weight:700;color:#4f46e5;text-decoration:none;padding:4px 10px;background:rgba(99,102,241,.08);border-radius:6px;transition:all .15s;}
.step-link:hover{background:rgba(99,102,241,.15);color:#3730a3;}
.step-link-green{color:#3a6b00;background:var(--green-dim);}
.step-link-green:hover{background:rgba(170,255,0,.2);}
.step-fee{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:11px;font-weight:800;color:#92400e;background:rgba(245,158,11,.12);padding:4px 10px;border-radius:6px;}

/* SECTION DIVIDER */
.guide-section{padding:0 24px 20px;}
.guide-section-title{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;margin-bottom:12px;padding-top:16px;border-top:1px solid var(--border);}

/* DOCS CHECKLIST */
.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.doc-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card2);border-radius:8px;font-size:11px;font-weight:600;color:var(--txt);}
.doc-item::before{content:'📎';font-size:12px;flex-shrink:0;}
.doc-item.required::before{content:'⚠️';}

/* FEES TABLE */
.fees-table{width:100%;border-collapse:collapse;font-size:12px;}
.fees-table th{text-align:left;padding:8px 12px;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#94a3b8;border-bottom:1px solid var(--border);}
.fees-table td{padding:10px 12px;border-bottom:1px solid var(--card2);color:var(--txt);font-weight:500;}
.fees-table tr:last-child td{border-bottom:none;font-weight:800;color:#0f172a;}
.fees-table .fee-amt{font-weight:800;color:#3a6b00;}
.fees-table .fee-total{color:#3a6b00;font-family:'Anton',sans-serif;font-size:15px;}

/* ALERTS */
.guide-alert{display:flex;gap:12px;padding:14px 16px;border-radius:10px;margin-bottom:12px;font-size:12px;line-height:1.6;}
.guide-alert.yellow{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
.guide-alert.blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}
.guide-alert.green{background:var(--green-dim);border:1px solid rgba(170,255,0,.3);color:#3a6b00;}
.guide-alert.red{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
.guide-alert-icon{font-size:16px;flex-shrink:0;}
.guide-alert strong{display:block;font-weight:700;margin-bottom:2px;}

.guide-download-btn{display:inline-flex;align-items:center;gap:6px;margin-left:auto;padding:7px 14px;background:#0f172a;color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;flex-shrink:0;}
.guide-download-btn:hover{background:#1e293b;}
.guide-download-btn svg{flex-shrink:0;}

@media(max-width:640px){
  .sidebar{display:none;}
  .main-head,.guides-wrap{padding-left:16px;padding-right:16px;}
  .doc-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-bg"><div class="login-grid"></div></div>
  <div class="login-box">
    <div class="login-logo-wrap">
      <div class="login-logo">NV<span>S</span></div>
      <div class="login-sub">Guías · New Vision Sports</div>
    </div>
    <div class="login-card">
      <input id="login-email" class="lf" type="email" placeholder="Email" autocomplete="email">
      <input id="login-password" class="lf" type="password" placeholder="Contraseña" autocomplete="current-password">
      <button class="login-btn" id="login-btn" onclick="doLogin()">ENTRAR</button>
      <div class="login-error" id="login-error"></div>
      <div class="login-spinner" id="login-spinner"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <a class="tb-back" href="index.html">← Módulos</a>
      <div class="tb-divider"></div>
      <div class="tb-title">NV<span>S</span> · Guías</div>
    </div>
    <div class="tb-right">
      <div class="tb-user">
        <div class="tb-avatar" id="tb-avatar">—</div>
        <span class="tb-uname" id="tb-uname">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Salir →</button>
    </div>
  </div>

  <div class="split">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-head">
        <div class="sb-head-title">Biblioteca de Guías</div>
        <div class="sb-head-sub">Recursos para el equipo NVS</div>
      </div>
      <div class="sb-cats">
        <div class="sb-cat-lbl">Categorías</div>
        <div class="sb-cat-item" id="cat-todas" onclick="setCategory('todas')">
          <span class="sb-cat-icon">📚</span> Todas
        </div>
        <div class="sb-cat-item" id="cat-elegibilidad" onclick="setCategory('elegibilidad')">
          <span class="sb-cat-icon">✅</span> Elegibilidad
          <span class="sb-cat-badge">3</span>
        </div>
        <div class="sb-cat-item active" id="cat-visado" onclick="setCategory('visado')">
          <span class="sb-cat-icon">✈️</span> Visado
          <span class="sb-cat-badge">3</span>
        </div>
        <div class="sb-cat-item" id="cat-onboarding" onclick="setCategory('onboarding')">
          <span class="sb-cat-icon">🎓</span> Onboarding
          <span class="sb-cat-badge">2</span>
        </div>
        <div class="sb-cat-item" id="cat-contratos" onclick="setCategory('contratos')">
          <span class="sb-cat-icon">📄</span> Contratos
          <span class="sb-cat-badge">8</span>
        </div>
        <div class="sb-cat-item" id="cat-pagos" onclick="setCategory('pagos')">
          <span class="sb-cat-icon">💸</span> Pagos
        </div>
        <div class="sb-cat-item" id="cat-general" onclick="setCategory('general')">
          <span class="sb-cat-icon">📁</span> General
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main-area">
      <div class="main-head">
        <div class="main-head-title" id="main-title">Visado</div>
        <div class="main-head-sub" id="main-sub">Documentación y procesos de visa estudiantil para EE.UU.</div>
      </div>

      <div class="guides-wrap" id="guides-wrap">
        <!-- Content rendered by JS -->
      </div>
    </div>
  </div>
</div>

<script>
const sb=supabase.createClient('https://mwefvjvvitsondqghgsx.supabase.co','sb_publishable_GuFFI-viJquULQCSY_Bd6Q_WoLf0cZk');
let CURRENT_CAT='visado';

const CATS={
  todas:     {label:'Todas las Guías',       sub:'Recursos, procesos y documentación del equipo'},
  elegibilidad:{label:'Elegibilidad',         sub:'Requisitos y criterios para atletas'},
  visado:    {label:'Visado',                 sub:'Documentación y procesos de visa estudiantil para EE.UU.'},
  onboarding:{label:'Onboarding',             sub:'Teléfono, banco y primeros pasos al llegar a EE.UU.'},
  contratos: {label:'Contratos',              sub:'Modelos y guías de contratos NVS'},
  pagos:     {label:'Pagos',                  sub:'Procesos y métodos de pago'},
  general:   {label:'General',               sub:'Recursos y documentación general'},
};

/* ── AUTH ── */
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-password').value;
  const err=document.getElementById('login-error');
  const spin=document.getElementById('login-spinner');
  const btn=document.getElementById('login-btn');
  err.textContent='';
  if(!email||!pass){err.textContent='Ingresa email y contraseña.';return;}
  btn.style.opacity='.6';btn.style.pointerEvents='none';spin.style.display='block';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  spin.style.display='none';btn.style.opacity='';btn.style.pointerEvents='';
  if(error){err.textContent='Credenciales incorrectas.';return;}
  initApp(data.user);
}
async function doLogout(){await sb.auth.signOut();location.reload();}
async function initApp(user){
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('app').style.display='flex';
  const name=user.email.split('@')[0];
  const d=name.charAt(0).toUpperCase()+name.slice(1);
  document.getElementById('tb-uname').textContent=d;
  document.getElementById('tb-avatar').textContent=d.charAt(0).toUpperCase();
  setCategory('visado');
}

/* ── CATEGORIES ── */
function setCategory(cat){
  CURRENT_CAT=cat;
  document.querySelectorAll('.sb-cat-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('cat-'+cat);
  if(el)el.classList.add('active');
  const c=CATS[cat]||CATS.todas;
  document.getElementById('main-title').textContent=c.label;
  document.getElementById('main-sub').textContent=c.sub;
  renderContent(cat);
}

/* ── RENDER ── */
function renderContent(cat){
  const wrap=document.getElementById('guides-wrap');
  if(cat==='visado'||cat==='todas'){
    wrap.innerHTML=renderVisadoGuide()+renderCanadaGuide()+renderMexicoGuide();
    if(cat==='todas') wrap.innerHTML+=renderElegibilidadSection()+renderOnboardingSection()+renderContratosSection()+emptyOtherCats();
  } else if(cat==='contratos'){
    wrap.innerHTML=renderContratosSection();
  } else if(cat==='elegibilidad'){
    wrap.innerHTML=renderElegibilidadSection();
  } else if(cat==='onboarding'){
    wrap.innerHTML=renderOnboardingSection();
  } else {
    wrap.innerHTML=emptyState(cat);
  }
}

function emptyState(cat){
  return`<div class="guides-empty">
    <div class="guides-empty-icon">📖</div>
    <div class="guides-empty-title">Sin guías aún</div>
    <div class="guides-empty-sub">El contenido para esta sección se agregará próximamente.</div>
    <div class="guides-empty-badge">Próximamente</div>
  </div>`;
}
function emptyOtherCats(){
  return`<div style="margin-top:8px;padding:16px 20px;background:var(--card2);border-radius:12px;font-size:12px;color:var(--muted);text-align:center;">
    Más guías de Pagos se agregarán próximamente.
  </div>`;
}

function renderOnboardingSection(){
  return`

  <!-- ══ TELÉFONO AMERICANO ══ -->
  <div class="guide-card">
    <div class="guide-card-header">
      <div class="guide-card-icon" style="background:rgba(99,102,241,.1);">📱</div>
      <div>
        <div class="guide-card-title">Número de Teléfono Americano — Primera vez en EE.UU.</div>
        <div class="guide-card-meta">
          <span class="guide-tag" style="background:rgba(99,102,241,.1);color:#4f46e5;">Prepago · Sin SSN</span>
          <span class="guide-tag" style="background:var(--green-dim);color:#3a6b00;">Boarding School · College</span>
          <span class="guide-tag" style="background:rgba(245,158,11,.1);color:#92400e;">Paso esencial</span>
        </div>
      </div>
    </div>

    <div class="guide-body">
      <div class="guide-alert green">
        <span class="guide-alert-icon">📌</span>
        <div><strong>¿Por qué necesitas un número americano?</strong>
        Coaches, staff universitario y compañeros de equipo se comunican exclusivamente por número de EE.UU. (SMS/iMessage). Además, la mayoría de plataformas universitarias, apps de pagos (Venmo, Zelle, Apple Pay), el portal de becas y cualquier cuenta americana requieren un número local. Sin un número americano, quedarás fuera de grupos de equipo, notificaciones y comunicados del athletic department desde el primer día.</div>
      </div>

      <div class="guide-alert blue">
        <span class="guide-alert-icon">ℹ️</span>
        <div><strong>¿Necesito SSN para sacar un número?</strong>
        <strong>No.</strong> Los planes prepago no requieren Social Security Number. Solo necesitas tu pasaporte. Esto los hace perfectos para recién llegados — puedes tener número el mismo día que aterrizas.</div>
      </div>

      <div class="steps-title">OPCIONES RECOMENDADAS (SIN SSN)</div>

      <div class="step-item">
        <div class="step-num active">1</div>
        <div class="step-content">
          <div class="step-title">T-Mobile Prepaid — La opción más rápida al llegar</div>
          <div class="step-desc">T-Mobile tiene la mejor cobertura nacional y el proceso más sencillo para estudiantes internacionales. Puedes comprar una SIM prepago en cualquier T-Mobile Store, Target, Walmart o Best Buy. Solo necesitas el pasaporte. El plan "Simply Prepaid" ($40/mes) incluye datos ilimitados + llamadas y mensajes ilimitados a EE.UU.</div>
          <div class="step-fee">💰 SIM gratis · Plan desde $40/mes (ilimitado)</div>
          <a class="step-link step-link-green" href="https://prepaid.t-mobile.com" target="_blank" rel="noopener">📱 T-Mobile Prepaid →</a>
          <a class="step-link" href="https://www.walmart.com/browse/cell-phones/t-mobile-prepaid" target="_blank" rel="noopener">🛒 SIM en Walmart →</a>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">2</div>
        <div class="step-content">
          <div class="step-title">Visible (Verizon) — $25/mes, todo online</div>
          <div class="step-desc">Visible es una marca de Verizon 100% digital. Funciona con pasaporte extranjero y una tarjeta de crédito/débito. No requiere visitar una tienda — todo se gestiona por app. Plan único: $25/mes con datos, llamadas y mensajes ilimitados. Red Verizon = excelente cobertura en áreas rurales y pequeñas ciudades donde están muchas universidades.</div>
          <div class="step-fee">💰 $25/mes todo incluido</div>

          <div class="step-desc">Una vez que el Eligibility Center recibe todos los documentos, procesa la certificación. La universidad (a través de su Compliance Office) recibe el resultado. Solo cuando el atleta tiene certificación aprobada la universidad puede hacer oficial la beca deportiva y el atleta puede entrenar y competir oficialmente.</div>

      <div class="guide-alert" style="background:rgba(248,113,113,.06);border-color:rgba(248,113,113,.2);">
        <span class="guide-alert-icon">⚠️</span>
        <div><strong>Regla 40-60-80 (D1) — Progreso Académico Continuo</strong><br>
        Una vez en la universidad, para mantener la elegibilidad debes completar: 40% de los créditos requeridos para graduarte al final del 2° año, 60% al final del 3°, y 80% al final del 4°. Si no cumples, pierdes el derecho a competir.</div>

  </div>

  <!-- ══ NAIA ══ -->
  <div class="guide-card">
    <div class="guide-card-header">
      <div class="guide-card-icon" style="background:rgba(234,88,12,.1);">🏅</div>
      <div>
        <div class="guide-card-title">Elegibilidad NAIA — National Association of Intercollegiate Athletics</div>
        <div class="guide-card-meta">
          <span class="guide-tag" style="background:rgba(234,88,12,.1);color:#ea580c;">PlayNAIA</span>
          <span class="guide-tag" style="background:rgba(234,88,12,.08);color:#c2410c;">InCred Evaluation</span>
          <span class="guide-tag" style="background:rgba(245,158,11,.1);color:#92400e;">$160–170 USD + $95 InCred</span>
        </div>
      </div>
    </div>
    <div class="guide-body">

      <div class="guide-alert blue">
        <span class="guide-alert-icon">ℹ️</span>
        <div><strong>¿Qué es la NAIA?</strong><br>
        La NAIA es una asociación con más de 250 universidades pequeñas. Su proceso de elegibilidad es más flexible y accesible que la NCAA. Para atletas internacionales, toda la evaluación académica pasa por InCred Evaluations, empresa integrada directamente con el sistema PlayNAIA.</div>
      </div>

      <div class="steps-title">PROCESO PASO A PASO — NAIA ELIGIBILITY CENTER</div>

      <div class="step-item">
        <div class="step-num active">1</div>
        <div class="step-content">
          <div class="step-title">Registrarse en PlayNAIA.org</div>
          <div class="step-desc">Ingresa a PlayNAIA.org, crea tu cuenta con tu email y completa tu perfil. Este es el portal central donde vas a trackear todo tu proceso de elegibilidad. El registro toma solo unos minutos.</div>
          <a class="step-link step-link-green" href="https://play.mynaia.org" target="_blank" rel="noopener">🔗 PlayNAIA — Registro oficial →</a>
          <a class="step-link" href="https://www.naia.org/findyourpath/international/index" target="_blank" rel="noopener">🌍 Guía para estudiantes internacionales →</a>
          <div class="step-fee">💰 $160 USD (a partir de septiembre 2025: $170 USD) — no reembolsable</div>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">2</div>
        <div class="step-content">
          <div class="step-title">Registrarse en InCred Evaluations</div>
          <div class="step-desc">Todos los atletas internacionales DEBEN completar una evaluación de credenciales a través de InCred. InCred analiza tus notas del bachillerato y las convierte al sistema GPA americano. Ve a InCredEvals.org, crea tu cuenta y selecciona la evaluación de high school básica.</div>
          <a class="step-link step-link-green" href="https://www.incredevals.org/students/" target="_blank" rel="noopener">🔗 InCred Evaluations — Portal de estudiantes →</a>
          <div class="step-fee">💰 Basic Evaluation: $95 USD · Expedito 5 días: $75 adicional · Expedito 2 días: $150 adicional</div>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">3</div>
        <div class="step-content">
          <div class="step-title">Subir documentos académicos a InCred</div>
          <div class="step-desc">Sube tus transcripts en formato PDF o Word directamente al portal de InCred. Si tus documentos no están en inglés, debes incluir una traducción al inglés. InCred acepta documentos electrónicos, lo que agiliza el proceso. Una vez recibido el expediente completo (documentos + pago), InCred completa la evaluación en aproximadamente 10 días hábiles.</div>
          <div class="step-fee">⚠️ Envía los documentos lo antes posible — 2 meses antes del inicio del semestre si puedes</div>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">4</div>
        <div class="step-content">
          <div class="step-title">Requisitos académicos para ser elegible (Freshmen)</div>
          <div class="step-desc">Eres elegible automáticamente si tienes <strong>GPA 2.3 o superior</strong> (en escala americana). Si tu GPA está entre 2.0 y 2.29, debes cumplir al menos 2 de estos 3 criterios:</div>
          <div style="margin:8px 0 4px;padding:10px 14px;background:var(--green-dim);border-radius:8px;font-size:12px;">
            ✅ <strong>Puntaje ACT 18+</strong> o <strong>SAT 970+</strong><br>
            ✅ <strong>GPA mínimo 2.0</strong> (en escala americana)<br>
            ✅ <strong>Top 50%</strong> de tu clase de graduación
          </div>
          <div class="step-fee">📌 InCred convierte tu GPA al sistema americano automáticamente</div>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">5</div>
        <div class="step-content">
          <div class="step-title">Declarar historial deportivo completo</div>
          <div class="step-desc">En tu perfil de PlayNAIA debes declarar todos los equipos, ligas, eventos y competencias en los que has participado, sin importar el nivel. Esto es fundamental para que la NAIA determine si ya usaste alguna temporada de elegibilidad previamente.</div>
          <div class="step-fee">⚠️ No ocultes ningún equipo — la NAIA verifica esta información y ocultarla puede costarte la elegibilidad</div>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">6</div>

        </div>
      </div>

      <div class="guide-alert" style="background:rgba(170,255,0,.06);border-color:rgba(170,255,0,.2);">
        <span class="guide-alert-icon">📌</span>
        <div><strong>Temporadas de elegibilidad NAIA</strong><br>

      </div>
    </div>
    <div class="guide-body">

      <div class="guide-alert blue">
        <span class="guide-alert-icon">ℹ️</span>
        <div><strong>¿Qué es la NJCAA?</strong><br>
        La NJCAA agrupa más de 500 junior colleges y community colleges. A diferencia de NCAA y NAIA, no tiene un portal centralizado de elegibilidad — el proceso se hace directamente con el Athletic Department (AD) de la escuela. Es la opción más accesible académicamente y una excelente puerta de entrada al sistema universitario americano.</div>
      </div>

      <div class="guide-alert" style="background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.25);">
        <span class="guide-alert-icon">⚠️</span>
        <div><strong>Importante para atletas internacionales</strong><br>
        La NJCAA permite solo <strong>2 temporadas de competición</strong> por deporte. Cualquier participación en un partido oficial (aunque sea una sola jugada) cuenta como temporada consumida. Si solo te vistes pero no juegas, no se consume temporada.</div>
      </div>

      <div class="steps-title">PROCESO PASO A PASO — NJCAA</div>

      <div class="step-item">
        <div class="step-num active">1</div>
        <div class="step-content">
          <div class="step-title">Contactar directamente al Athletic Department de la escuela</div>
          <div class="step-desc">No hay portal único de registro. Una vez que el coach te ofrece un lugar en el equipo, trabajas directamente con el Athletic Director (AD) de esa escuela. El AD es quien gestiona y certifica tu elegibilidad ante la NJCAA. Pregúntale exactamente qué documentos necesitan.</div>
          <a class="step-link step-link-green" href="https://www.njcaa.org/eligibility/index" target="_blank" rel="noopener">🔗 NJCAA — Información de elegibilidad oficial →</a>
          <a class="step-link" href="https://www.njcaa.org/compete/faqs" target="_blank" rel="noopener">❓ NJCAA FAQs de elegibilidad →</a>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">2</div>
        <div class="step-content">
          <div class="step-title">Entregar diploma de high school y transcripts</div>
          <div class="step-desc">Debes demostrar que eres graduado de bachillerato con diploma académico reconocido. Para atletas internacionales: transcripts de los años 9° en adelante, traducidos al inglés. La traducción corre por cuenta del atleta. Si también asististe a una universidad fuera de EE.UU., debes entregar también esos transcripts universitarios.</div>
          <div class="step-fee">⚠️ Los transcripts deben mostrar notas, materias y año de graduación claramente</div>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">3</div>
        <div class="step-content">
          <div class="step-title">Inscribirse a tiempo completo (mínimo 12 créditos)</div>
          <div class="step-desc">Para competir en la NJCAA debes estar inscrito como estudiante de tiempo completo en la institución. La NJCAA define tiempo completo como 12 o más créditos por semestre. Puedes combinar distintas modalidades de cursos (regular, fast track, mini-term) dentro del mismo semestre para alcanzar los 12 créditos.</div>
          <div class="step-fee">📌 Debes estar inscrito ANTES de la primera competición de la temporada</div>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">4</div>
        <div class="step-content">
          <div class="step-title">Verificar temporadas de elegibilidad disponibles</div>
          <div class="step-desc">La NJCAA permite exactamente 2 temporadas de elegibilidad por deporte. Si competiste a nivel universitario o intercolegial fuera de EE.UU., es posible que ya hayas usado 1 temporada. Discute tu historial deportivo con el AD para saber cuántas temporadas te quedan disponibles.</div>
          <div class="step-fee">⚠️ Una sola participación en partido oficial (hasta 1 turno al bate, 1 jugada) = 1 temporada consumida</div>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">5</div>
        <div class="step-content">
          <div class="step-title">Status de Amateur — obligatorio desde los 19 años</div>
          <div class="step-desc">Debes mantener estatus de amateur. Esto se vuelve obligatorio desde que cumples 19 años O desde el momento en que te inscribes por primera vez en una universidad (lo que ocurra primero). Antes de ese punto, haber jugado en ligas semiprofesionales o recibido pagos puede ser permitido dependiendo del deporte y el contexto.</div>
        </div>
      </div>

      <div class="step-item">
        <div class="step-num active">6</div>
        <div class="step-content">
          <div class="step-title">El AD certifica tu elegibilidad ante la NJCAA</div>
          <div class="step-desc">Una vez completados todos los pasos, el Athletic Director de tu escuela envía la documentación a la NJCAA y certifica formalmente tu elegibilidad. A partir de ese momento puedes entrenar y competir oficialmente representando a la institución.</div>
          <a class="step-link" href="https://www.njcaa.org/governance/handbook/index" target="_blank" rel="noopener">📄 NJCAA Handbook 2025-26 →</a>
          <a class="step-link" href="mailto:compliance@njcaa.org">📧 Contacto directo NJCAA Compliance →</a>
        </div>
      </div>

      <div class="guide-alert" style="background:rgba(170,255,0,.06);border-color:rgba(170,255,0,.2);">
        <span class="guide-alert-icon">🎯</span>
        <div><strong>NJCAA como trampolín</strong><br>
        Muchos atletas internacionales usan 1-2 años en una NJCAA school para adaptarse al sistema americano, mejorar su inglés y nivel académico, y luego transferirse a una universidad NCAA D1/D2 o NAIA. La NJCAA es un punto de entrada excelente para quienes no califican académicamente para NCAA desde el inicio.</div>
      </div>

    </div>
  </div>`;
}

          <a class="step-link step-link-green" href="https://embamex.sre.gob.mx/panama/" target="_blank" rel="noopener">🏛️ Embajada México en Panamá →</a>
          <a class="step-link" href="https://www.gob.mx/sre" target="_blank" rel="noopener">🌐 Secretaría de Relaciones Exteriores →</a>
        </div>
      </div>

        </div>
      </div>

      </div>

      <div class="step-item">
        <div class="step-num active">4</div>
        <div class="step-content">

        </div>

function printGuide(type){
  const g=PDF_CONTENT[type];if(!g)return;
  const today=new Date().toLocaleDateString('es-PA',{year:'numeric',month:'long',day:'numeric'});
  const noteColors={warning:'#fff7ed',alert:'#fef2f2',info:'#eff6ff',tip:'#f0fdf4'};
  const noteBorder={warning:'#fb923c',alert:'#f87171',info:'#93c5fd',tip:'#86efac'};
  const noteLabel={warning:'⚠️ Importante',alert:'🚫 Atención',info:'ℹ️ Ten en cuenta',tip:'💡 Consejo NVS'};
  const stepsHtml=g.steps.map(s=>`
    <div style="display:flex;gap:14px;margin-bottom:18px;page-break-inside:avoid;">
      <div style="width:28px;height:28px;border-radius:50%;background:#AAFF00;color:#0f172a;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${s.n}</div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:4px;">${s.title}</div><div style="font-size:11.5px;color:#475569;line-height:1.75;">${s.body}</div></div>
    </div>`).join('');
  const feesHtml=`<table style="width:100%;border-collapse:collapse;font-size:11.5px;margin-top:8px;">
    <tr style="background:#f8fafc;"><th style="text-align:left;padding:8px 10px;font-size:9px;font-weight:800;letter-spacing:1px;color:#94a3b8;border-bottom:1px solid #e2e8f0;">CONCEPTO</th><th style="text-align:left;padding:8px 10px;font-size:9px;font-weight:800;letter-spacing:1px;color:#94a3b8;border-bottom:1px solid #e2e8f0;">MONTO</th><th style="text-align:left;padding:8px 10px;font-size:9px;font-weight:800;letter-spacing:1px;color:#94a3b8;border-bottom:1px solid #e2e8f0;">PAGAR EN</th></tr>
    ${g.fees.map((f,i)=>`<tr style="${i===g.fees.length-1?'background:#f0fdf4;font-weight:800;':''}"><td style="padding:9px 10px;border-bottom:1px solid #f1f5f9;">${f[0]}</td><td style="padding:9px 10px;border-bottom:1px solid #f1f5f9;color:#16a34a;font-weight:700;">${f[1]}</td><td style="padding:9px 10px;border-bottom:1px solid #f1f5f9;color:#475569;">${f[2]}</td></tr>`).join('')}
  </table>`;
  const notesHtml=g.notes.map(n=>`
    <div style="background:${noteColors[n.type]};border-left:4px solid ${noteBorder[n.type]};border-radius:0 8px 8px 0;padding:11px 14px;margin-bottom:9px;page-break-inside:avoid;">
      <div style="font-size:11px;font-weight:800;color:#0f172a;margin-bottom:3px;">${noteLabel[n.type]}: ${n.title}</div>
      <div style="font-size:11px;color:#475569;line-height:1.7;">${n.body}</div>
    </div>`).join('');
  const countriesHtml=g.countries?`
    <div style="font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;border-bottom:1px solid #e2e8f0;padding-bottom:8px;margin:22px 0 12px;">
      ${g.countriesTitle||'Links por país'}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">
      ${g.countries.map(c=>`<a href="${c.url}" target="_blank" style="display:flex;align-items:center;gap:7px;padding:8px 10px;background:#f8fafc;border-radius:7px;text-decoration:none;color:#0f172a;font-size:11px;font-weight:600;border:1px solid #e2e8f0;">
        <span style="font-size:16px;">${c.flag}</span>
        <span style="flex:1;">${c.name}</span>
        <span style="color:#94a3b8;font-size:10px;">→</span>
      </a>`).join('')}
    </div>`:'' ;

  const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>NVS · ${g.title}</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:Arial,Helvetica,sans-serif;background:#fff;color:#0f172a;font-size:12px;}
    a{color:#4f46e5;}
    @page{margin:15mm 14mm 18mm 14mm;size:A4;}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}.no-print{display:none!important;}}
    .page{max-width:740px;margin:0 auto;padding:20px 24px;}
    .section-title{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;border-bottom:1px solid #e2e8f0;padding-bottom:8px;margin:20px 0 12px;}
    .print-btn{position:fixed;bottom:18px;right:18px;background:#0f172a;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.2);}
  </style></head><body>
  <div class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #AAFF00;padding-bottom:14px;margin-bottom:18px;">
      <div>
        <div style="font-size:30px;font-weight:900;letter-spacing:3px;">NV<span style="color:#AAFF00;">S</span></div>
        <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#64748b;margin-top:2px;">New Vision Sports · Agencia de Colocación Deportiva</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:20px;">${g.flag}</div>
        <div style="font-size:11px;font-weight:700;color:#0f172a;">${g.country}</div>
        <div style="font-size:9px;color:#94a3b8;margin-top:2px;">${today}</div>
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <div style="font-size:21px;font-weight:900;color:#0f172a;letter-spacing:.3px;">${g.title}</div>
      <div style="font-size:11px;color:#64748b;margin-top:3px;">${g.subtitle}</div>
    </div>

    <div style="background:#f8fafc;border-radius:10px;padding:13px 15px;font-size:11.5px;color:#475569;line-height:1.75;margin-bottom:4px;">${g.intro}</div>

    <div class="section-title">Pasos del proceso</div>
    ${stepsHtml}

    <div class="section-title">Documentos requeridos</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
      ${g.docs.map(d=>`<div style="display:flex;align-items:flex-start;gap:7px;padding:7px 9px;background:#f8fafc;border-radius:6px;font-size:11px;color:#0f172a;"><span style="color:#16a34a;font-weight:900;flex-shrink:0;">✓</span>${d}</div>`).join('')}
    </div>

    <div class="section-title">Resumen de costos</div>
    ${feesHtml}

    <div class="section-title">Notas importantes</div>
    ${notesHtml}

    ${countriesHtml}

    <div style="margin-top:28px;padding-top:12px;border-top:2px solid #AAFF00;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:10px;font-weight:700;color:#0f172a;">New Vision Sports · playwithnewvision.com</div>
        <div style="font-size:9px;color:#94a3b8;margin-top:2px;">Documento orientativo — verificar siempre requisitos vigentes con las autoridades migratorias.</div>
      </div>
      <div style="text-align:right;font-size:9px;color:#94a3b8;">
        <div>info@playwithnewvision.com</div>
        <div>stefano@playwithnewvision.com</div>
      </div>
    </div>
  </div>
  <button class="print-btn no-print" onclick="window.print()">⬇ Guardar como PDF</button>
  <script>setTimeout(()=>window.print(),700);<\/script>
  </body></html>`;

  const win=window.open('','_blank','width=860,height=960');
  win.document.write(html);win.document.close();
}

  const {data:{session}}=await sb.auth.getSession();
  if(session)initApp(session.user);
  else document.getElementById('login-overlay').style.display='flex';
});
